      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="recipe-card-name">${nameHtml}</div>
        ${overrideCount > 0 ? `<span style="display:inline-flex;align-items:center;gap:4px;background:#a0622a;color:white;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;">✎ ${overrideCount} Korrektur${overrideCount !== 1 ? 'en' : ''}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;">
        <span class="badge badge-gray">${ingCount} Zutaten</span>
        <span class="badge badge-gray">Basis: ${recipe.basePeople} Pers.</span>
        ${factorBadge}
        ${recipe.noServingsInfo ? '<span class="badge" style="background:#fff3cd;color:#7d5a00;border:1px solid #f0d060;" title="Keine Portionsangabe im Rezept">⚠️ keine Portionsangabe</span>' : ''}
        ${(recipe.tags || []).map(tag => `<span class="badge" style="background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;">🏷️ ${escHtml(tag)}</span>`).join('')}
        ${renderDietBadges(recipe.dietOptions, recipe.customAllergens)}
        ${recipe.notes ? '<span class="badge" style="background:#fff8e1;color:#f57c00;border:1px solid #ffe082;" title="' + escHtml(recipe.notes) + '">📝</span>' : ''}
        ${(() => { 
          const m = parseCooklang(recipe.rawText).metadata; 
          const n = recipe.nutrition || {};
          const pairs = [['time','⏱'],['calories','🔥'],['protein','💪 Protein'],['carbs','🌾 Kohlenhydrate'],['fat','🥑 Fett']]; 
          return pairs.filter(([k]) => getMeta(m,k) || (n[k] && n[k] !== '')).map(([k,icon]) => {
            const val = getMeta(m,k) || (n[k] ? n[k] + (k === 'calories' ? ' kcal' : ' g') : '');
            return '<span class="badge badge-gray">' + icon + ' ' + escHtml(val) + '</span>';
          }).join(''); 
        })()}
        \
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <div class="person-stepper">
        <button type="button" data-action="dec" data-id="${rid}">−</button>
        <input type="number" min="1" value="${recipe.targetPeople}" data-action="set" data-id="${rid}" style="width:52px;">
        <button type="button" data-action="inc" data-id="${rid}">+</button>
      </div>
      <span style="font-size:12px;color:var(--text3);">Pers.</span>
      <button type="button" class="btn btn-ghost btn-sm" data-action="steps" data-id="${rid}" style="color:var(--accent2);border-color:var(--border);">📋 Zubereitung</button>
      <button type="button" class="btn btn-outline btn-sm" data-action="edit" data-id="${rid}">✏️ Bearbeiten</button>
      <button type="button" class="btn btn-danger btn-sm" data-action="delete" data-id="${rid}">🗑</button>
    </div>
  `;

  // Attach events via data attributes to avoid inline onclick issues with IDs
  header.querySelector('.recipe-select-cb').addEventListener('change', function() {
    toggleRecipeSelected(recipe.id);
  });
  header.querySelector('[data-action="dec"]').addEventListener('click', function(e) {
    e.stopPropagation(); changeTarget(recipe.id, -1);
  });
  header.querySelector('[data-action="inc"]').addEventListener('click', function(e) {
    e.stopPropagation(); changeTarget(recipe.id, 1);
  });
  header.querySelector('[data-action="set"]').addEventListener('change', function(e) {
    e.stopPropagation(); setTarget(recipe.id, this.value);
  });
  header.querySelector('[data-action="steps"]').addEventListener('click', function(e) {
    e.stopPropagation(); showRecipeSteps(recipe.id);
  });
  header.querySelector('[data-action="edit"]').addEventListener('click', function(e) {
    e.stopPropagation(); showView('recipe-edit', recipe.id);
  });
  header.querySelector('[data-action="delete"]').addEventListener('click', function(e) {
    e.stopPropagation(); deleteRecipe(recipe.id);
  });

  card.appendChild(header);
  return card;
}

function toggleRecipeSelected(id) {
  const r = STATE.recipes.find(r => String(r.id) === String(id));
  if (r) { r.selectedForList = !r.selectedForList; saveState(); renderView(); }
}

function selectAll(val) {
  STATE.recipes.forEach(r => r.selectedForList = val);
  saveState(); renderView();
}

function changeTarget(id, delta) {
  const r = STATE.recipes.find(r => String(r.id) === String(id));
  if (r) { r.targetPeople = Math.max(1, r.targetPeople + delta); r.manualOverrides = {}; saveState(); renderView(); }
}

function setTarget(id, val) {
  const n = parseInt(val);
  if (!n || n < 1) return;
  const r = STATE.recipes.find(r => String(r.id) === String(id));
  if (r) { r.targetPeople = n; r.manualOverrides = {}; saveState(); renderView(); }
}

}

function confirmDeleteRecipe(id) {
  STATE.recipes = STATE.recipes.filter(r => String(r.id) !== String(id));

}

function showRecipeSteps(id) {
  const recipe = STATE.recipes.find(r => String(r.id) === String(id));
  if (!recipe) return;

  const scaled = getScaledIngredients(recipe);

  // Sort alphabetically, only show ingredients with a real amount separately from "nach Bedarf"
  const withAmount = [...scaled].filter(i => i.scaledAmount !== null).sort((a,b) => a.name.localeCompare(b.name, 'de'));
  const withoutAmount = [...scaled].filter(i => i.scaledAmount === null).sort((a,b) => a.name.localeCompare(b.name, 'de'));
  const sortedIng = [...withAmount, ...withoutAmount];

  const ingGridItems = sortedIng.map(ing => {
    if (ing.scaledAmount !== null) {
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);gap:10px;">
        <span style="font-style:italic;color:var(--text);">${escHtml(ing.name)}</span>
        <strong style="color:var(--accent);white-space:nowrap;">${formatAmt(ing.scaledAmount)}${ing.scaledUnit ? ' ' + ing.scaledUnit : ''}</strong>
      </div>`;
    } else {
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);gap:10px;">
        <span style="font-style:italic;color:var(--text);">${escHtml(ing.name)}</span>
        <span style="color:var(--text3);font-size:12px;">nach Bedarf</span>
      </div>`;
    }
  }).join('');

  // Build steps — highlight ingredients WITH scaled amounts inline
  // Build a lookup: ingredient name (lowercase) → scaled display string
  const ingLookup = {};
  for (const ing of sortedIng) {
    const k = ing.name.toLowerCase().trim();
    ingLookup[k] = ing.scaledAmount !== null ? ' (' + formatAmt(ing.scaledAmount) + (ing.scaledUnit ? ' ' + ing.scaledUnit : '') + ')' : '';
  }
  const lines = recipe.rawText.split('\n');
  const steps = [];
  for (const line of lines) {
    const t = line.trim();
    if (!t || t.startsWith('--')) continue;
    // Skip all >> metadata lines
    if (t.startsWith('>>') || /^servings:/i.test(t)) continue;
    const cleaned = t
      .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, (_, name) => {
        const amtStr = ingLookup[name.trim().toLowerCase()] || '';
        return '<strong style="color:var(--accent2);">' + escHtml(name.trim()) + '</strong>'
          + (amtStr ? '<span style="color:var(--accent);font-size:0.88em;">' + amtStr + '</span>' : '');
      })
      .replace(/@([^{@#~\n\s,\.!?;]+)/g, (_, name) => {
        const amtStr = ingLookup[name.trim().toLowerCase()] || '';
        return '<strong style="color:var(--accent2);">' + escHtml(name.trim()) + '</strong>'
          + (amtStr ? '<span style="color:var(--accent);font-size:0.88em;">' + amtStr + '</span>' : '');
      })
      .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
      .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1');
    if (cleaned.trim()) steps.push(cleaned.trim());
  }

  const stepsHtml = steps.length === 0
    ? '<p style="color:var(--text3);font-style:italic;padding:12px 0;">Keine Zubereitungsschritte vorhanden.</p>'
    : steps.map((s, i) => `
      <div style="display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border2);align-items:flex-start;">
        <div style="min-width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fdf6ec;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;">${i+1}</div>
        <div style="flex:1;line-height:1.75;font-size:14.5px;">${s}</div>
      </div>`).join('');

  const { metadata: recipeMeta } = parseCooklang(recipe.rawText);
  const metaIcons = { time:'&#9201;', temp:'&#127777;', calories:'&#128293;', protein:'Protein', carbs:'Kohlenhydrate', fat:'Fett' };
  const metaBadges = ['time','temp','calories','protein','carbs','fat']
    .filter(k => getMeta(recipeMeta,k))
    .map(k => '<span class="badge badge-gray">' + metaIcons[k] + ' ' + escHtml(getMeta(recipeMeta,k)) + '</span>').join('');

  showModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:${metaBadges ? '10px' : '22px'};padding-bottom:16px;border-bottom:${metaBadges ? 'none' : '2px solid var(--border2)'}">
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-style:italic;color:var(--accent);flex:1;">${escHtml(recipe.name)}</div>
      <span class="badge badge-green">für ${recipe.targetPeople} Personen</span>
      <span class="badge badge-gray">Basis: ${recipe.basePeople} Pers.</span>
    </div>
    ${metaBadges ? '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:16px;border-bottom:2px solid var(--border2);">' + metaBadges + '</div>' : ''}
    <div style="margin-bottom:24px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:10px;">Zutaten</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0 32px;">${ingGridItems}</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:4px;">Zubereitung</div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:10px;">Zutaten sind <strong style="color:var(--accent2);">hervorgehoben</strong></p>
      ${stepsHtml}
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border2);">
      <button class="btn btn-primary" onclick="closeModal()">Schließen</button>
    </div>
  `);
}

function addFolderModal() {
  const val = document.getElementById('new-folder-input')?.value?.trim();
  if (!val || STATE.groups.includes(val)) return;
  STATE.groups.push(val);
  document.getElementById('new-folder-input').value = '';
  saveState();
  if (window._renderFolderList) window._renderFolderList();
}

function deleteFolderModal(group) {
  const count = STATE.recipes.filter(r => r.group === group).length;
  if (count > 0) {
    // Move recipes to first remaining group or Sonstiges
    const fallback = STATE.groups.find(g => g !== group) || 'Sonstiges';
    STATE.recipes.forEach(r => { if (r.group === group) r.group = fallback; });
  }
  STATE.groups = STATE.groups.filter(g => g !== group);
  saveState();
  if (window._renderFolderList) window._renderFolderList();
}

let editorState = {};
let mealPlanEditorState = {};
let editingMealPlanRecipe = null; // {planId, mealKey, recipeId}

function renderRecipeEditor() {
  // Prüfe ob wir im Wochenplan-Modus sind
  const isMealPlanMode = editingMealPlanRecipe !== null;
  let mealPlanInfo = null;
  let mealRecipe = null;
  
  if (isMealPlanMode) {
    const { planId, mealKey, recipeId } = editingMealPlanRecipe;
    const plan = STATE.mealPlans.find(p => p.id === planId);
    if (!plan || !plan.meals[mealKey]) {
      editingMealPlanRecipe = null;
      showView('mealplanner');
      return;
    }
    mealRecipe = plan.meals[mealKey].recipes.find(r => r.id === recipeId);
    if (!mealRecipe) {
      editingMealPlanRecipe = null;
      showView('mealplan-edit', planId);
      return;
    }
    mealPlanInfo = { plan, mealKey, mealRecipe };
    // Setze editingRecipeId für den Rest der Funktion
    editingRecipeId = recipeId;
  }
  
  const isNew = editingRecipeId === null && !isMealPlanMode;
  const existing = isNew ? null : STATE.recipes.find(r => String(r.id) === String(editingRecipeId));

  if (isNew || !editorState._loaded || editorState._id !== editingRecipeId || (isMealPlanMode && editorState._mealPlanMode !== true)) {
    // Im Wochenplan-Modus: Verwende angepasste Daten
    let initialRawText = existing?.rawText || '';
    let initialTargetPeople = existing?.targetPeople || 4;
    
    if (isMealPlanMode && mealRecipe) {
      initialTargetPeople = mealRecipe.portions || existing?.basePeople || 4;
      // Wenn customRawText existiert, verwende diesen
      if (mealRecipe.customRawText) {
        initialRawText = mealRecipe.customRawText;
      } else if (mealRecipe.overrides && Object.keys(mealRecipe.overrides).length > 0) {
        // Wende Overrides auf rawText an
        initialRawText = existing?.rawText || '';
        for (const [ingName, override] of Object.entries(mealRecipe.overrides)) {
          if (override.amount !== undefined || override.unit !== undefined) {
            const regex = new RegExp(`@${ingName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\{[^}]*\\}`, 'gi');
            const newAmount = override.amount !== null ? override.amount : '';
            const newUnit = override.unit || '';
            const replacement = `@${ingName}{${newAmount}${newUnit ? '%' + newUnit : ''}}`;
            initialRawText = initialRawText.replace(regex, replacement);
          }
        }
      }
    }
    
    editorState = {
      _loaded: true,
      _id: editingRecipeId,
      _mealPlanMode: isMealPlanMode,
      name: existing?.name || '',
      group: existing?.group || STATE.groups[0] || 'Hauptgerichte',
      basePeople: existing?.basePeople || 4,
      targetPeople: initialTargetPeople,
      rawText: initialRawText,
      originalRawText: existing?.rawText || '',
      manualOverrides: { ...(existing?.manualOverrides || {}) },
      selectedForList: existing?.selectedForList ?? true,
      tags: existing?.tags || [],
      dietOptions: existing?.dietOptions || [],
      customAllergens: existing?.customAllergens || [],
      notes: existing?.notes || '',
      tab: existing?.simpleMode ? 'simple' : 'edit',
      editingOverrideKey: null,
      // Simple mode fields
      simpleMode: existing?.simpleMode || false,
      simpleIngredients: existing?.simpleIngredients || [],
      simpleSteps: existing?.simpleSteps || '',
      nutrition: existing?.nutrition || { calories: '', protein: '', carbs: '', fat: '' }
    };
  }

  // Topbar je nach Modus
  if (isMealPlanMode && mealPlanInfo) {
    const { plan, mealKey } = mealPlanInfo;
    const [day, time] = mealKey.split('_');
    setTopbar(`${editorState.name} (${plan.name})`, `
      <button class="btn btn-outline btn-sm" onclick="editingMealPlanRecipe=null;showView('mealplan-edit',${plan.id})">← Zurück zum Plan</button>
      <button class="btn btn-outline btn-sm" onclick="applyMealPlanChangesToOriginal()">📋 Auf Original übertragen</button>
      <button class="btn btn-primary btn-sm" onclick="saveMealPlanRecipe()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Für Plan speichern
      </button>
    `);

    setTopbar(isNew ? 'Neues Rezept' : 'Rezept bearbeiten', `

        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        .cook Export

  if (isMealPlanMode) {
    // Vereinfachte Meta-Card für Wochenplan-Modus

        <div class="field" style="margin:0;">
          <label class="field-label">Rezeptname</label>
          <input type="text" id="ed-name" value="${escHtml(editorState.name)}" disabled style="background:#f5f5f5;color:var(--text2);">
        </div>

          <label class="field-label">Ziel-Portionen</label>

        </div>

    `;
  } else {
    meta.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:end;">
        <div class="field" style="margin:0;">
          <label class="field-label">Rezeptname</label>
          <input type="text" id="ed-name" value="${escHtml(editorState.name)}" placeholder="z.B. Pasta Bolognese">
        </div>

          <label class="field-label">Ordner</label>
          <select id="ed-group">

          </select>
        </div>

            <button type="button" class="btn btn-outline btn-sm" onclick="addCustomAllergen()" style="white-space:nowrap;">+ Hinzufügen</button>
          </div>
          <div id="custom-allergens-editor" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;">

          <label class="field-label">Tags <span style="font-weight:normal;color:var(--text3);">(mit Komma trennen)</span></label>

          <label class="field-label">Notizen</label>

  tabBar.innerHTML = `
    <button class="tab ${editorState.tab === 'simple' ? 'active' : ''}" onclick="switchEditorTab('simple')">📝 Einfacher Modus</button>
    <button class="tab ${editorState.tab === 'edit' ? 'active' : ''}" onclick="switchEditorTab('edit')">🔧 Cooklang Editor</button>
    <button class="tab ${editorState.tab === 'preview' ? 'active' : ''}" onclick="switchEditorTab('preview')">📐 Vorschau & Korrekturen</button>
    <button class="tab ${editorState.tab === 'steps' ? 'active' : ''}" onclick="switchEditorTab('steps')">📋 Zubereitung</button>
    <button class="tab ${editorState.tab === 'costs' ? 'active' : ''}" onclick="switchEditorTab('costs')">💰 Kosten</button>
    <button class="tab ${editorState.tab === 'url-import' ? 'active' : ''}" onclick="switchEditorTab('url-import')" style="margin-left:auto;background:#e8f5e9;border-color:#4caf50;color:#2e7d32;">🌐 URL Import</button>
  `;
  c.appendChild(tabBar);

  const tabContent = document.createElement('div');
  tabContent.id = 'editor-tab-content';
  c.appendChild(tabContent);

  renderEditorTab();
}

function switchEditorTab(tab) {
  syncEditorFields();
  editorState.tab = tab;
  
  // Update tab button active states
  const tabs = document.querySelectorAll('.tabs .tab');
  tabs.forEach(t => {
    t.classList.remove('active');
    if (t.textContent.includes('Einfacher') && tab === 'simple') t.classList.add('active');
    if (t.textContent.includes('Cooklang') && tab === 'edit') t.classList.add('active');
    if (t.textContent.includes('Vorschau') && tab === 'preview') t.classList.add('active');
    if (t.textContent.includes('Zubereitung') && tab === 'steps') t.classList.add('active');
    if (t.textContent.includes('Kosten') && tab === 'costs') t.classList.add('active');
    if (t.textContent.includes('URL Import') && tab === 'url-import') t.classList.add('active');
  });
  
  renderEditorTab();
}

function syncEditorFields() {
  const name = document.getElementById('ed-name');
  const group = document.getElementById('ed-group');
  const base = document.getElementById('ed-base');
  const target = document.getElementById('ed-target');
  const rawText = document.getElementById('ed-rawtext');
  const tags = document.getElementById('ed-tags');
  const notes = document.getElementById('ed-notes');
  const simpleSteps = document.getElementById('simple-steps-textarea');
  
  if (name) editorState.name = name.value;
  if (group) editorState.group = group.value;
  if (base) editorState.basePeople = parseInt(base.value) || 4;
  if (target) editorState.targetPeople = parseInt(target.value) || 4;
  if (rawText) editorState.rawText = rawText.value;
  if (tags) editorState.tags = tags.value.split(',').map(t => t.trim()).filter(t => t.length > 0);
  if (notes) editorState.notes = notes.value;
  if (simpleSteps) editorState.simpleSteps = simpleSteps.value;
  
  // If in simple mode, convert to Cooklang for compatibility
  if (editorState.simpleMode) {
    syncSimpleModeToRawText();
  }
}

      </div>

function renderEditorTab() {
  const tc = document.getElementById('editor-tab-content');
  if (!tc) return;
  tc.innerHTML = '';

  if (editorState.tab === 'simple') {
    renderSimpleModeTab(tc);
  } else if (editorState.tab === 'edit') {
    const div = document.createElement('div');
    div.style.display = 'grid';
    div.style.gridTemplateColumns = '1fr 260px';
    div.style.gap = '16px';
    div.innerHTML = `
      <div>
        <textarea class="code-editor" id="ed-rawtext" placeholder="-- Rezeptname\n\n@Zutat{Menge%Einheit} Zubereitungstext...">${escHtml(editorState.rawText)}</textarea>
      </div>
      <div>
        <div class="syntax-hint">
          <div class="comment">-- Kommentare</div>

          <div style="margin-top:12px;color:#8a7060;font-size:11px;">EINHEITEN:</div>
          <div style="color:#a09080;font-size:11px;line-height:1.8;">g · kg · ml · l<br>EL · TL<br>Stück · Prise<br>Bund · Packung<br>Dose · Glas</div>
          <div style="margin-top:10px;color:#8a7060;font-size:11px;">g → kg ab 1000g<br>ml → l ab 1000ml</div>
        </div>
      </div>
    `;
    tc.appendChild(div);

  } else if (editorState.tab === 'preview') {
    syncEditorFields();
    const { ingredients } = parseCooklang(editorState.rawText);
    const scaled = ingredients.map((ing, i) => scaleIngredient(ing, editorState.basePeople, editorState.targetPeople, editorState.manualOverrides, i));
    const overrideCount = Object.keys(editorState.manualOverrides).length;
    const factor = editorState.targetPeople / editorState.basePeople;

      tc.innerHTML = `<div class="empty-state"><div class="icon">🧪</div><h3>Keine Zutaten erkannt</h3><p>Füge im Editor Zutaten mit @ hinzu.</p></div>`;

    div.className = 'card';

    let headerHtml = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">

        <button class="btn btn-ghost btn-xs" onclick="clearAllOverrides()">Alle zurücksetzen</button>` : ''}
    </div>`;

    let tableHtml = `<table>
      <thead><tr>
        <th>Zutat</th>
        <th style="text-align:right;">1 Person</th>
        <th style="text-align:right;">${editorState.targetPeople} Personen</th>
        <th>Status</th>
        <th>Korrektur</th>
      </tr></thead><tbody>`;

    for (const ing of scaled) {
      const onePAmt = ing.amount !== null ? (() => {
        const a = ing.amount / editorState.basePeople;
        const { amount, unit } = smartUnit(a, ing.unit);
        return `${formatAmt(amount)}${unit ? ' ' + unit : ''}`;
      })() : '—';

      const scaledStr = ing.scaledAmount !== null ? `${formatAmt(ing.scaledAmount)}${ing.scaledUnit ? ' ' + ing.scaledUnit : ''}` : '—';

        .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, '<strong>$1</strong>')
        .replace(/@([^{@#~\n\s]+)/g, '<strong>$1</strong>')
        .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
        .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1');

    // Hilfsfunktion um Preis zu finden (auch mit Variationen)
    function findPriceData(name) {
      const nameLower = name.toLowerCase().trim();
      if (prices[nameLower]) return prices[nameLower];
      
      // Suche nach Variationen
      for (const key of Object.keys(prices)) {
        if (key.toLowerCase() === nameLower || 
            nameLower.includes(key.toLowerCase()) || 
            key.toLowerCase().includes(nameLower)) {
          return prices[key];
        }
      }
      return null;
    }
    
    // Berechne Kosten für jede Zutat

    for (const ing of ingredients) {
      const scaledAmount = ing.amount !== null ? ing.amount * factor : null;

      ingredientCosts.push({
        name: ing.name,
        amount: scaledAmount,
        unit: ing.unit,
        cost: cost,
        priceData: priceData,
        hasCost: cost !== null
      });

        totalCost += cost;

              <td colspan="3" style="padding:12px 8px;font-weight:600;">Gesamt (${editorState.targetPeople} Personen)</td>

    }
    
    // Zusammenfassung Sidebar
    const missingCount = ingredientCosts.filter(ic => !ic.hasCost && ic.amount !== null).length;

    container.innerHTML = `
      <div class="card">
        <h3 style="font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--accent);margin-bottom:16px;">
          💰 Kosten pro Zutat
        </h3>
        ${tableHtml}

      <div style="display:flex;flex-direction:column;gap:16px;">

          <div class="card" style="background:#e8f5e9;border-color:#a5d6a7;">

              <span style="font-size:24px;">✅</span>
              <div style="color:#2e7d32;font-weight:500;">Alle Preise vorhanden</div>
            </div>
          </div>
        `}
        <div class="card">
          <div style="font-size:13px;color:var(--text3);">
            <div style="font-weight:600;margin-bottom:8px;">💡 Hinweis</div>
            <p style="line-height:1.5;margin:0;">Die Kosten werden basierend auf den Preisen in der Zutatendatenbank und den Einheiten-Umrechnungen berechnet.</p>
            <button class="btn btn-ghost btn-sm" style="margin-top:10px;" onclick="showView('unit-conversions')">

    tc.appendChild(container);
  } else if (editorState.tab === 'url-import') {

function startOverride(key) {
  editorState.editingOverrideKey = key;
  renderEditorTab();
}

function cancelOverride() {
  editorState.editingOverrideKey = null;
  renderEditorTab();
}

function saveOverride(key) {
  const amt = parseFloat(document.getElementById('ov-amt').value);
  const unit = document.getElementById('ov-unit').value;
  if (!isNaN(amt)) {
    editorState.manualOverrides[key] = { amount: amt, unit };
    // Also write live to STATE so shopping list / Zubereitung reflect it immediately
    if (editingRecipeId) {
      const r = STATE.recipes.find(r => String(r.id) === String(editingRecipeId));
      if (r) { r.manualOverrides = { ...editorState.manualOverrides }; saveState(); }
    }
  }
  editorState.editingOverrideKey = null;
  renderEditorTab();
}

function clearOverride(key) {
  delete editorState.manualOverrides[key];
  if (editingRecipeId) {
    const r = STATE.recipes.find(r => String(r.id) === String(editingRecipeId));
    if (r) { r.manualOverrides = { ...editorState.manualOverrides }; saveState(); }
  }
  renderEditorTab();
}

function clearAllOverrides() {
  editorState.manualOverrides = {};
  if (editingRecipeId) {
    const r = STATE.recipes.find(r => String(r.id) === String(editingRecipeId));
    if (r) { r.manualOverrides = {}; saveState(); }
  }
  renderEditorTab();
}


// Queue for new ingredients that need to be added to database
let newIngredientQueue = [];
let pendingRecipeSave = null;

function checkAndAddNewIngredients(recipe, callback) {
  // Parse ingredients from the recipe
  const { ingredients } = parseCooklang(recipe.rawText);
  
  // Find ingredients not in the database
  const newIngredients = [];
  for (const ing of ingredients) {
    const key = ing.name.toLowerCase().trim();
    if (!STATE.ingredientDB[key] && !STATE.ingredientDB[ing.name]) {
      // Check if already in newIngredients list
      if (!newIngredients.find(n => n.name.toLowerCase() === key)) {
        newIngredients.push({
          name: ing.name,
          unit: ing.unit || '',
          amount: ing.amount,
          recipeName: recipe.name
        });
      }
    }
  }
  
  if (newIngredients.length === 0) {
    // No new ingredients, proceed with callback
    callback();
    return;
  }
  
  // Store the queue, recipe reference, and callback
  newIngredientQueue = newIngredients;
  pendingRecipeSave = callback;
  window._currentIngredientRecipe = recipe;
  
  // Show dialog for first ingredient
  showNewIngredientDialog(0);
}

  if (index >= newIngredientQueue.length) {

// Find similar ingredients in database
function findSimilarIngredients(name) {
  const lower = name.toLowerCase().trim();
  const similar = [];
  
  for (const key of Object.keys(STATE.ingredientDB)) {
    const keyLower = key.toLowerCase();
    // Check if one contains the other or if they share significant parts
    if (keyLower !== lower) {
      // Check for partial match
      if (keyLower.includes(lower) || lower.includes(keyLower)) {
        similar.push(key);
      } else {
        // Check for word overlap
        const words1 = lower.split(/\s+/);
        const words2 = keyLower.split(/\s+/);
        const overlap = words1.filter(w => words2.some(w2 => w2.includes(w) || w.includes(w2)));
        if (overlap.length > 0 && overlap.some(w => w.length > 3)) {
          similar.push(key);
        }
      }
    }
  }
  
  return similar.slice(0, 5); // Max 5 suggestions
}

// Use existing ingredient (replace in recipe)
function useExistingIngredient(index, existingName) {
  const ing = newIngredientQueue[index];
  const editor = document.getElementById('ingredient-recipe-editor');
  
  if (editor && ing) {
    // Replace the ingredient name in the recipe
    const regex = new RegExp('@' + escapeRegex(ing.name), 'gi');
    editor.value = editor.value.replace(regex, '@' + existingName);
    
    // Update the recipe
    const recipe = window._currentIngredientRecipe;
    if (recipe) {
      recipe.rawText = editor.value;
    }
    
    // Skip this ingredient (it's now using an existing one)
    closeModal();
    showNewIngredientDialog(index + 1);
  }
}

// Highlight ingredient in editor (for ingredient dialog)
function highlightIngredientInEditor2(ingredientName) {
  const editor = document.getElementById('ingredient-recipe-editor');
  if (!editor) return;
  
  const text = editor.value;
  const searchPattern = '@' + ingredientName;
  const idx = text.toLowerCase().indexOf(searchPattern.toLowerCase());
  
  if (idx !== -1) {
    let endIdx = text.indexOf('}', idx);
    if (endIdx === -1) endIdx = idx + searchPattern.length;
    else endIdx += 1;
    
    editor.focus();
    editor.setSelectionRange(idx, endIdx);
    
    const lineHeight = 20;
    const linesBeforeSelection = text.substring(0, idx).split('\n').length - 1;
    editor.scrollTop = linesBeforeSelection * lineHeight - 50;
  }
}

// Apply ingredient editor changes
function applyIngredientEditorChanges(index) {
  const editor = document.getElementById('ingredient-recipe-editor');
  const recipe = window._currentIngredientRecipe;
  
  if (editor && recipe) {
    recipe.rawText = editor.value;
    
    // Re-parse to check if this ingredient still exists
    const { ingredients } = parseCooklang(recipe.rawText);
    const ing = newIngredientQueue[index];
    
    // Check if the ingredient name was changed
    const stillExists = ingredients.some(i => 
      i.name.toLowerCase() === ing.name.toLowerCase()
    );
    
    if (!stillExists) {
      // Ingredient was renamed, skip it
      closeModal();
      showNewIngredientDialog(index + 1);
      return;
    }
  }
  
  // Continue with normal save
  closeModal();
  showNewIngredientDialog(index);
}



function saveNewIngredient(index, name) {
  const category = document.getElementById('new-ing-category').value;
  const price = parseFloat(document.getElementById('new-ing-price').value) || 0;
  const priceUnit = document.getElementById('new-ing-price-unit').value;
  
  // Add to ingredient database
  STATE.ingredientDB[name] = {
    category: category,
    displayName: name
  };
  
  // Add price if provided
  if (price > 0) {
    if (!STATE.ingredientPrices) STATE.ingredientPrices = {};
    STATE.ingredientPrices[name] = { price: price, unit: priceUnit };
  }
  
  saveState();
  closeModal();
  
  // Process next ingredient
  showNewIngredientDialog(index + 1);
}

function skipNewIngredient(index) {
  const ing = newIngredientQueue[index];
  
  // Add to database with default category (no price)
  STATE.ingredientDB[ing.name] = 'Sonstiges';
  saveState();
  
  closeModal();
  
  // Process next ingredient
  showNewIngredientDialog(index + 1);
}

function skipAllNewIngredients() {
  // Add all remaining ingredients with default category
  for (let i = 0; i < newIngredientQueue.length; i++) {
    const ing = newIngredientQueue[i];
    if (!STATE.ingredientDB[ing.name.toLowerCase()] && !STATE.ingredientDB[ing.name]) {
      STATE.ingredientDB[ing.name] = 'Sonstiges';
    }
  }
  saveState();
  
  closeModal();
  newIngredientQueue = [];
  
  // Complete the save
  if (pendingRecipeSave) {
    pendingRecipeSave();
    pendingRecipeSave = null;
  }
}


function saveRecipe() {
  syncEditorFields();
  if (!editorState.name.trim()) { alert('Bitte einen Rezeptnamen eingeben.'); return; }
  
  // For simple mode, check ingredients instead of rawText
  if (editorState.simpleMode) {
    if (!editorState.simpleIngredients || editorState.simpleIngredients.length === 0) {
      alert('Bitte mindestens eine Zutat hinzufügen.'); 
      return;
    }
    // Generate rawText from simple mode
    syncSimpleModeToRawText();
  } else {
    if (!editorState.rawText.trim()) { alert('Bitte Rezepttext eingeben.'); return; }
  }

  const recipe = {
    id: editingRecipeId || Date.now(),
    name: editorState.name.trim(),
    group: editorState.group,
    basePeople: editorState.basePeople,
    targetPeople: editorState.targetPeople,
    rawText: editorState.rawText,
    manualOverrides: editorState.manualOverrides,
    selectedForList: editorState.selectedForList,
    tags: editorState.tags || [],
    dietOptions: editorState.dietOptions || [],
    customAllergens: editorState.customAllergens || [],
    notes: editorState.notes || '',
    // Simple mode fields
    simpleMode: editorState.simpleMode || false,
    simpleIngredients: editorState.simpleIngredients || [],
    simpleSteps: editorState.simpleSteps || '',
    nutrition: editorState.nutrition || null
  };

  // First check for unknown units, then check for new ingredients
  checkUnknownUnits(recipe, function(recipeWithNormalizedUnits) {
    // Then check for new ingredients and add them to database
    checkAndAddNewIngredients(recipeWithNormalizedUnits, function() {
      // This callback runs after all checks are processed
      if (editingRecipeId) {
        const idx = STATE.recipes.findIndex(r => r.id === editingRecipeId);
        if (idx !== -1) STATE.recipes[idx] = recipeWithNormalizedUnits;
      } else {
        STATE.recipes.push(recipeWithNormalizedUnits);
      }
      editorState = {};
      saveState();
      showView('overview');
    });
  });
}

function saveMealPlanRecipe() {
  if (!editingMealPlanRecipe) return;
  
  const { planId, mealKey, recipeId } = editingMealPlanRecipe;
  const plan = STATE.mealPlans.find(p => p.id === planId);
  if (!plan || !plan.meals[mealKey]) return;
  
  const mealRecipe = plan.meals[mealKey].recipes.find(r => r.id === recipeId);
  if (!mealRecipe) return;
  
  const recipe = STATE.recipes.find(r => r.id === recipeId);
  if (!recipe) return;
  
  // Lese aktuelle Werte aus dem Editor
  const rawText = document.getElementById('ed-raw')?.value || editorState.rawText;
  const targetPeople = parseInt(document.getElementById('ed-target')?.value) || editorState.targetPeople;
  
  // Speichere Portionen
  mealRecipe.portions = targetPeople;
  
  // Prüfe ob rawText geändert wurde
  if (rawText !== recipe.rawText) {
    // Parse beide Versionen und vergleiche Zutaten
    const originalIngredients = parseCooklang(recipe.rawText).ingredients;
    const modifiedIngredients = parseCooklang(rawText).ingredients;
    
    // Erstelle Overrides für geänderte Zutaten
    const overrides = {};
    for (const modIng of modifiedIngredients) {
      const origIng = originalIngredients.find(i => i.name.toLowerCase() === modIng.name.toLowerCase());
      if (origIng) {
        if (modIng.amount !== origIng.amount || modIng.unit !== origIng.unit) {
          overrides[modIng.name] = { amount: modIng.amount, unit: modIng.unit };
        }
      } else {
        // Neue Zutat
        overrides[modIng.name] = { amount: modIng.amount, unit: modIng.unit, isNew: true };
      }
    }
    
    mealRecipe.overrides = overrides;
    mealRecipe.customRawText = rawText;
  } else {
    // Keine Änderungen am Text
    mealRecipe.overrides = {};
    mealRecipe.customRawText = null;
  }
  
  updateMealPlanModified(planId);
  saveState();
  
  // Zurück zum Plan
  editingMealPlanRecipe = null;
  editorState = {};
  showView('mealplan-edit', planId);
}

function applyMealPlanChangesToOriginal() {
  if (!editingMealPlanRecipe) return;
  
  const { recipeId } = editingMealPlanRecipe;
  const recipe = STATE.recipes.find(r => r.id === recipeId);
  if (!recipe) return;
  
  // Lese aktuelle Werte aus dem Editor
  const rawText = document.getElementById('ed-raw')?.value || editorState.rawText;
  const basePeople = parseInt(document.getElementById('ed-base')?.value) || editorState.basePeople;
  const targetPeople = parseInt(document.getElementById('ed-target')?.value) || editorState.targetPeople;

  renderView();
}


function importCookFiles(input) {
  handleDroppedFiles(input.files);
}

function handleDroppedFiles(files) {
  const cookFiles = [...files].filter(f => f.name.endsWith('.cook'));
  if (cookFiles.length === 0) { alert('Keine .cook Dateien gefunden.'); return; }
  const pending = [];
  let loaded = 0;
  for (const file of cookFiles) {
    const reader = new FileReader();
    reader.onload = e => {
      const name = file.name.replace(/\.cook$/, '').replace(/-/g, ' ').replace(/_/g, ' ');
      const parsed = parseCooklang(e.target.result);
      pending.push({ name, rawText: e.target.result, servings: parsed.servings || null });
      loaded++;
      if (loaded === cookFiles.length) showImportFolderDialog(pending);
    };
    reader.readAsText(file);
  }
}

function showImportFolderDialog(pending) {
  const listHtml = pending.map(p => '<li style="padding:2px 0;font-style:italic;color:var(--text2);">' + escHtml(p.name) + '</li>').join('');
  const btnHtml = STATE.groups.map(g =>
    '<button class="btn btn-outline" style="text-align:left;justify-content:flex-start;width:100%;" onclick="doImportRecipes(' + "'pending_import'" + ', ' + "'"+g+"'" + ')">' + escHtml(g) + '</button>'
  ).join('');
  // Store pending on window temporarily
  window._importPending = pending;
  showModal(
    '<div class="modal-title">In welchen Ordner?</div>' +
    '<p style="color:var(--text3);font-size:13px;margin-bottom:10px;">' + pending.length + ' Rezept' + (pending.length !== 1 ? 'e' : '') + ' bereit:</p>' +
    '<ul style="margin:0 0 16px 18px;font-size:13px;">' + listHtml + '</ul>' +
    '<div style="display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;">' + btnHtml + '</div>' +
    '<div class="modal-actions" style="margin-top:14px;"><button class="btn btn-outline" onclick="closeModal()">Abbrechen</button></div>'
  );
}

function doImportRecipes(_, group) {
  const pending = window._importPending || [];
  const recipes = [];
  
  for (const item of pending) {
    const bp = item.servings || 1;
    recipes.push({
      id: Date.now() + Math.random(),
      name: item.name, group,
      basePeople: bp, targetPeople: bp,
      noServingsInfo: !item.servings,
      rawText: item.rawText,
      manualOverrides: {}, selectedForList: true
    });
  }
  
  window._importPending = null;
  closeModal();
  
  // First, collect all unknown units from all recipes
  const allUnknownUnits = [];
  for (const recipe of recipes) {
    const { ingredients } = parseCooklang(recipe.rawText);
    for (const ing of ingredients) {
      if (ing.unit && !isKnownUnit(ing.unit)) {
        if (!allUnknownUnits.find(u => u.original.toLowerCase() === ing.unit.toLowerCase())) {
          const context = findIngredientContext(recipe.rawText, ing.name);
          allUnknownUnits.push({
            original: ing.unit,
            ingredient: ing.name,
            suggestion: findSimilarUnit(ing.unit),
            recipeName: recipe.name,
            context: context
          });
        }
      }
    }
  }
  
  // Function to continue after unit check
  function continueAfterUnitCheck() {
    // Normalize units in all recipes
    for (const recipe of recipes) {
      recipe.rawText = normalizeAllUnitsInRecipe(recipe.rawText);
    }
    
    // Collect all new ingredients from all imported recipes
    const allNewIngredients = [];
    for (const recipe of recipes) {
      const { ingredients } = parseCooklang(recipe.rawText);
      for (const ing of ingredients) {
        const key = ing.name.toLowerCase().trim();
        if (!STATE.ingredientDB[key] && !STATE.ingredientDB[ing.name]) {
          if (!allNewIngredients.find(n => n.name.toLowerCase() === key)) {
            allNewIngredients.push({
              name: ing.name,
              unit: ing.unit || '',
              amount: ing.amount
            });
          }
        }
      }
    }
    
    if (allNewIngredients.length === 0) {
      // No new ingredients, save recipes directly
      STATE.recipes.push(...recipes);
      saveState();
      renderView();
      return;
    }
    
    // Store recipes and show ingredient dialogs
    newIngredientQueue = allNewIngredients;
    pendingRecipeSave = function() {
      STATE.recipes.push(...recipes);
      saveState();
      renderView();
    };
    
    showNewIngredientDialog(0);
  }
  
  if (allUnknownUnits.length === 0) {
    // No unknown units, continue directly
    continueAfterUnitCheck();
    return;
  }
  
  // Show unit dialogs first
  unknownUnitQueue = allUnknownUnits;
  window._pendingRecipesForUnits = recipes;
  pendingUnitCallback = function() {
    window._pendingRecipesForUnits = null;
    continueAfterUnitCheck();
  };
  
  showUnknownUnitDialog(0);
}

// Normalize ingredient name for grouping (handles singular/plural)
// Returns normalized key for grouping - we'll use the original names for display

// Normalize unit strings for comparison
function normalizeUnit(unit) {
  if (!unit) return null;
  const u = unit.toLowerCase().trim();
  
  // Piece units
  if (u === 'stk' || u === 'stk.' || u === 'st' || u === 'st.' || u === 'stück' || u === 'stueck') return 'Stück';
  
  // Weight units
  if (u === 'gramm') return 'g';
  if (u === 'kilogramm') return 'kg';
  
  // Volume units
  if (u === 'milliliter') return 'ml';
  if (u === 'liter') return 'l';
  
  // Spoon units
  if (u === 'teelöffel' || u === 'teeloeffel') return 'TL';
  if (u === 'esslöffel' || u === 'essloeffel') return 'EL';
  
  // Packung
  if (u === 'pkg' || u === 'pkg.' || u === 'pack' || u === 'packung') return 'Packung';
  
  // Bund
  if (u === 'bd' || u === 'bd.') return 'Bund';
  
  // Dose
  if (u === 'ds' || u === 'ds.') return 'Dose';
  
  return unit; // Return original if no normalization needed
}


function normalizeForGrouping(name) {
  const lower = name.toLowerCase().trim();
  
  // Special cases first (exact matches)
  const specialCases = {
    'eier': 'ei', 'ei': 'ei',
    'zwiebeln': 'zwiebel', 'zwiebel': 'zwiebel',
    'tomaten': 'tomate', 'tomate': 'tomate',
    'kartoffeln': 'kartoffel', 'kartoffel': 'kartoffel',
    'karotten': 'karotte', 'karotte': 'karotte',
    'möhren': 'möhre', 'möhre': 'möhre',
    'gurken': 'gurke', 'gurke': 'gurke',
    'paprika': 'paprika', 'paprikas': 'paprika',
    'zitronen': 'zitrone', 'zitrone': 'zitrone',
    'orangen': 'orange', 'orange': 'orange',
    'äpfel': 'apfel', 'apfel': 'apfel',
    'birnen': 'birne', 'birne': 'birne',
    'bananen': 'banane', 'banane': 'banane',
    'knoblauchzehen': 'knoblauchzehe', 'knoblauchzehe': 'knoblauchzehe',
    'knoblauch': 'knoblauch',
    'champignons': 'champignon', 'champignon': 'champignon',
    'pilze': 'pilz', 'pilz': 'pilz',
    'nudeln': 'nudel', 'nudel': 'nudel',
    'schalotten': 'schalotte', 'schalotte': 'schalotte',
    'frühlingszwiebeln': 'frühlingszwiebel', 'frühlingszwiebel': 'frühlingszwiebel',
    'lauchzwiebeln': 'lauchzwiebel', 'lauchzwiebel': 'lauchzwiebel'
  };
  
  if (specialCases[lower]) {
    return specialCases[lower];
  }
  
  // Generic plural handling
  // -eln ending (Zwiebeln -> Zwiebel, Nudeln -> Nudel, Kartoffeln -> Kartoffel)
  if (lower.endsWith('eln') && lower.length > 4) {
    return lower.slice(0, -1); // Remove just the 'n'
  }
  // -en ending (Bananen -> Banan, Tomaten -> Tomat)
  if (lower.endsWith('en') && lower.length > 4) {
    return lower.slice(0, -1); // Remove just 'n' to keep the 'e'
  }
  // -n ending after vowel+l (Kartoffeln already handled above)
  if (lower.endsWith('n') && lower.length > 3) {
    const beforeN = lower.slice(0, -1);
    if (beforeN.endsWith('el') || beforeN.endsWith('e')) {
      return beforeN;
    }
  }
  // -s ending (Kiwis -> Kiwi)
  if (lower.endsWith('s') && lower.length > 3 && !lower.endsWith('ss')) {
    return lower.slice(0, -1);
  }
  
  return lower;
}

function buildMealPlanShoppingData2(plan) {
  
  
  
  // Hilfsfunktionen (kopiert aus buildShoppingData)
  function unitGroup(u) {
    if (!u || u === 'Stueck') return 'piece';
    if (u === 'g' || u === 'kg' || u === 'Prise' || u === 'TL' || u === 'EL') return 'weight';
    if (u === 'ml' || u === 'l') return 'volume';
    return u;
  }
  function toBaseAmount(amt, unit) {
    if (amt === null) return 0;
    if (unit === 'kg') return amt * 1000;
    if (unit === 'l') return amt * 1000;
    return amt;
  }
  function fromBaseAmount(base, origUnit) {
    if (origUnit === 'kg' || origUnit === 'g') {
      if (base >= 1000) return { amount: base / 1000, unit: 'kg' };
      return { amount: base, unit: 'g' };
    }
    if (origUnit === 'l' || origUnit === 'ml') {
      if (base >= 1000) return { amount: base / 1000, unit: 'l' };
      return { amount: base, unit: 'ml' };
    }
    return { amount: base, unit: origUnit };
  }
  
  const allItems = [];
  
  for (const [key, meal] of Object.entries(plan.meals || {})) {
    
    const [day, time] = key.split('_');
    
    // Rezepte
    for (const r of (meal.recipes || [])) {
      const recipe = STATE.recipes.find(rec => rec.id === r.id);
      if (!recipe) continue;
      
      const factor = r.portions / recipe.basePeople;
      const { ingredients } = parseCooklang(recipe.rawText);
      const overrides = r.overrides || {};
      
      // Wenn customRawText existiert, verwende diesen statt des Original-Rezepts
      const ingredientsToUse = r.customRawText ? parseCooklang(r.customRawText).ingredients : ingredients;
      
      for (const ing of ingredientsToUse) {
        // Prüfe ob Override existiert (nur wenn kein customRawText)
        const override = !r.customRawText ? overrides[ing.name] : null;
        let baseAmount = override && override.amount !== undefined ? override.amount : ing.amount;
        let baseUnit = override && override.unit !== undefined ? override.unit : ing.unit;
        
        let amount = baseAmount !== null ? baseAmount * factor : null;
        let unit = baseUnit;
        if (amount !== null) {
          const smart = smartUnit(amount, unit);
          amount = smart.amount;
          unit = smart.unit;
        }
        const nameLower = ing.name.toLowerCase().trim();
        const category = findCategory(nameLower);
        allItems.push({ 
          name: ing.name, 
          nameLower, 
          amount, 
          unit,
          scaledAmount: amount,
          scaledUnit: unit,
          recipe: recipe.name, 
          category
        });
      }
    }
    
    // Zutaten aus Wochenplan
    for (const ing of (meal.ingredients || [])) {
      const itemLower = ing.name.toLowerCase().trim();
      const category = findCategory(itemLower) || 'Sonstiges';
      allItems.push({
        name: ing.name,
        nameLower: itemLower,
        amount: ing.amount || null,
        unit: ing.unit || null,
        scaledAmount: ing.amount || null,
        scaledUnit: ing.unit || null,
        recipe: plan.name,
        category: category,
        manual: true
      });
    }
    
    // Alte manualItems für Rückwärtskompatibilität
    for (const item of (meal.manualItems || [])) {
      const itemLower = (typeof item === 'string' ? item : item.name).toLowerCase().trim();
      const category = findCategory(itemLower) || 'Sonstiges';
      allItems.push({
        name: typeof item === 'string' ? item : item.name,
        nameLower: itemLower,
        amount: null,
        unit: null,
        scaledAmount: null,
        scaledUnit: null,
        recipe: plan.name,
        category: category,
        manual: true
      });
    }
    
    // Frühstücke aus Wochenplan
    for (const bf of (meal.breakfasts || [])) {
      const breakfast = STATE.breakfasts.find(b => b.id === bf.id);
      if (!breakfast) continue;
      
      const factor = bf.portions / breakfast.basePeople;
      
      for (const ing of (breakfast.ingredients || [])) {
        let amount = ing.amount;
        if (amount && !isNaN(parseFloat(amount))) {
          amount = parseFloat(amount) * factor;
          const smart = smartUnit(amount, ing.unit);
          amount = smart.amount;
        }
        const nameLower = ing.name.toLowerCase().trim();
        const category = findCategory(nameLower);
        allItems.push({
          name: ing.name,
          nameLower,
          amount: amount || null,
          unit: ing.unit || null,
          scaledAmount: amount || null,
          scaledUnit: ing.unit || null,
          recipe: '☕ ' + breakfast.name,
          category,
          isBreakfast: true
        });
      }
    }
  }

  // Gruppiere nach Kategorie (byCat)
  const byCat = {};
  for (const item of allItems) {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  }

  // Zusammenfassen (summarized)
  const gm = {};
  for (const item of allItems) {
    const normalizedName = normalizeForGrouping(item.name);
    const k = normalizedName + '||' + unitGroup(item.unit);
    if (!gm[k]) {
      gm[k] = { name: item.name, nameLower: item.nameLower, amount: item.amount, unit: item.unit, recipes: [item.recipe], category: item.category };
    } else {
      if (item.name.length > gm[k].name.length) {
        gm[k].name = item.name;
        gm[k].nameLower = item.nameLower;
      }
      if (item.amount !== null && gm[k].amount !== null) {
        const r = fromBaseAmount(toBaseAmount(gm[k].amount, gm[k].unit) + toBaseAmount(item.amount, item.unit), gm[k].unit);
        gm[k].amount = r.amount; gm[k].unit = r.unit;
      } else if (item.amount !== null && gm[k].amount === null) { 
        gm[k].amount = item.amount; gm[k].unit = item.unit; 
      }
      if (!gm[k].recipes.includes(item.recipe)) gm[k].recipes.push(item.recipe);
    }
  }
  
  const summarized = {};
  for (const item of Object.values(gm)) {
    if (!summarized[item.category]) summarized[item.category] = [];
    summarized[item.category].push(item);
  }
  Object.keys(summarized).forEach(c => summarized[c].sort((a,b) => a.name.localeCompare(b.name,'de')));

  // Nach Rezepten (byRecipe) - als Array wie in buildShoppingData
  const byRecipeObj = {};
  for (const item of allItems) {
    if (!byRecipeObj[item.recipe]) byRecipeObj[item.recipe] = [];
    byRecipeObj[item.recipe].push(item);
  }
  const byRecipe = Object.entries(byRecipeObj).map(([recipeName, items]) => {
    const foundRecipe = STATE.recipes.find(r => r.name === recipeName);
    const recipe = foundRecipe ? { ...foundRecipe, targetPeople: foundRecipe.basePeople } : { name: recipeName, id: null, targetPeople: 4 };
    return { recipe, items };
  });

  const catOrder = ['Gemüse','Obst','Fleisch & Fisch','Milchprodukte & Käse','Kühlung','Brot & Backwaren','Gewürze & Kräuter','Konserven & Gläser','Nudeln & Reis & Getreide','Öle & Soßen','Getränke','Tiefkühl','Sonstiges'];

  // Erstelle selected Array für Kompatibilität
  const selected = byRecipe.map(r => r.recipe);
  
  return { allItems, byCat, summarized, byRecipe, catOrder, selected };
}

function buildShoppingData() {
  // Returns {allItems, byCat, summarized, byRecipe, catOrder}
  const selected = STATE.recipes.filter(r => r.selectedForList);
  const allItems = [];
  for (const recipe of selected) {
    const scaled = getScaledIngredients(recipe);
    for (const ing of scaled) {
      const nameLower = ing.name.toLowerCase().trim();
      const category = findCategory(nameLower);
      allItems.push({ name: ing.name, nameLower, amount: ing.scaledAmount, unit: ing.scaledUnit, recipe: recipe.name, recipeId: recipe.id, category });
    }
  }
  // Add manual items
  for (const mi of (STATE.manualShoppingItems || [])) {
    const nameLower = mi.name.toLowerCase().trim();
    const category = mi.category || findCategory(nameLower) || 'Sonstiges';
    if (mi.active === false) continue;
    allItems.push({ name: mi.name, nameLower, amount: mi.amount || null, unit: mi.unit || null,
      recipe: '✚ Manuell hinzugefügt', recipeId: null, category, manual: true, id: mi.id, note: mi.note || null });
  }
  // Add breakfast items
  const selectedBreakfasts = (STATE.breakfasts || []).filter(b => b.selectedForList);
  for (const breakfast of selectedBreakfasts) {
    const factor = (breakfast.targetPeople || breakfast.basePeople) / breakfast.basePeople;
    for (const ing of (breakfast.ingredients || [])) {
      const nameLower = ing.name.toLowerCase().trim();
      const category = findCategory(nameLower);
      let scaledAmount = ing.amount;
      if (scaledAmount && !isNaN(parseFloat(scaledAmount))) {
        scaledAmount = parseFloat(scaledAmount) * factor;
      }
      allItems.push({ 
        name: ing.name, 
        nameLower, 
        amount: scaledAmount || null, 
        unit: ing.unit || null, 
        recipe: '☕ ' + breakfast.name, 
        recipeId: null, 
        breakfastId: breakfast.id,
        category,
        isBreakfast: true
      });
    }
  }
  // Detailed by category
  const byCat = {};
  for (const item of allItems) {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  }
  Object.keys(byCat).forEach(c => byCat[c].sort((a,b) => a.name.localeCompare(b.name,'de')));
  // Summarized: Smart grouping with visual sub-items for different units
  function unitGroup(u) {
    const normalized = normalizeUnit(u);
    if (!normalized || normalized === 'Stück') return 'piece';
    if (normalized === 'g' || normalized === 'kg') return 'weight';
    if (normalized === 'ml' || normalized === 'l') return 'volume';
    if (normalized === 'TL' || normalized === 'EL' || normalized === 'Prise') return 'spoon';
    return normalized; // Use normalized unit as its own group
  }
  
  // First pass: group by normalized name + normalized unit
  const gm = {};
  for (const item of allItems) {
    const normalizedName = normalizeForGrouping(item.name);
    const normalizedUnit = normalizeUnit(item.unit);
    const k = normalizedName + '||' + unitGroup(normalizedUnit);
    
    if (!gm[k]) {
      gm[k] = { 
        name: item.name, 
        nameLower: item.nameLower, 
        normalizedName: normalizedName,
        amount: item.amount, 
        unit: normalizedUnit || item.unit, 
        unitGroup: unitGroup(normalizedUnit),
        recipes: [item.recipe], 
        category: item.category, 
        manual: item.manual || false, 
        note: item.note || null 
      };
    } else {
      // Keep the longer name (usually the plural form)
      if (item.name.length > gm[k].name.length) {
        gm[k].name = item.name;
        gm[k].nameLower = item.nameLower;
      }
      // Add amounts if both have amounts and same unit group
      if (item.amount !== null && gm[k].amount !== null) {
        const r = fromBaseAmount(toBaseAmount(gm[k].amount, gm[k].unit) + toBaseAmount(item.amount, normalizedUnit || item.unit), gm[k].unit);
        gm[k].amount = r.amount; 
        gm[k].unit = r.unit;
      } else if (item.amount !== null && gm[k].amount === null) { 
        gm[k].amount = item.amount; 
        gm[k].unit = normalizedUnit || item.unit; 
      }
      if (!gm[k].recipes.includes(item.recipe)) gm[k].recipes.push(item.recipe);
      if (item.manual) gm[k].manual = true;
      if (item.note && !gm[k].note) gm[k].note = item.note;
    }
  }
  
  // Second pass: group items by normalized name for visual grouping
  const visualGroups = {};
  for (const item of Object.values(gm)) {
    if (!visualGroups[item.normalizedName]) {
      visualGroups[item.normalizedName] = {
        displayName: item.name,
        normalizedName: item.normalizedName,
        category: item.category,
        subItems: []
      };
    }
    // Keep the longest display name
    if (item.name.length > visualGroups[item.normalizedName].displayName.length) {
      visualGroups[item.normalizedName].displayName = item.name;
    }
    visualGroups[item.normalizedName].subItems.push(item);
  }
  
  // Build summarized structure with visual grouping info
  const summarized = {};
  for (const group of Object.values(visualGroups)) {
    if (!summarized[group.category]) summarized[group.category] = [];
    
    // If only one sub-item, add it directly (no grouping needed)
    if (group.subItems.length === 1) {
      summarized[group.category].push(group.subItems[0]);
    } else {
      // Multiple sub-items with different units - create a grouped item
      const groupedItem = {
        name: group.displayName,
        nameLower: group.displayName.toLowerCase(),
        isGrouped: true,
        subItems: group.subItems,
        category: group.category,
        recipes: [...new Set(group.subItems.flatMap(s => s.recipes))],
        manual: group.subItems.some(s => s.manual)
      };
      summarized[group.category].push(groupedItem);
    }
  }
  Object.keys(summarized).forEach(c => summarized[c].sort((a,b) => a.name.localeCompare(b.name,'de')));
  // By recipe – merge duplicate ingredient names within each recipe
  const byRecipe = selected.map(recipe => {
    const scaled = getScaledIngredients(recipe);
    const merged = {};
    for (const ing of scaled) {
      const k = ing.name.toLowerCase().trim();
      if (!merged[k]) {
        merged[k] = { ...ing };
      } else {
        if (ing.scaledAmount !== null && merged[k].scaledAmount !== null) {
          const base = toBaseAmount(merged[k].scaledAmount, merged[k].scaledUnit) + toBaseAmount(ing.scaledAmount, ing.scaledUnit);
          const r = fromBaseAmount(base, merged[k].scaledUnit);
          merged[k].scaledAmount = r.amount; merged[k].scaledUnit = r.unit;
        } else if (ing.scaledAmount !== null && merged[k].scaledAmount === null) {
          merged[k].scaledAmount = ing.scaledAmount; merged[k].scaledUnit = ing.scaledUnit;
        }
      }
    }
    const items = Object.values(merged).sort((a,b) => a.name.localeCompare(b.name,'de'));
    return { recipe, items };
  });
  
  // Add breakfasts to byRecipe
  const selectedBreakfastsForList = (STATE.breakfasts || []).filter(b => b.selectedForList);
  for (const breakfast of selectedBreakfastsForList) {
    const factor = (breakfast.targetPeople || breakfast.basePeople) / breakfast.basePeople;
    const items = (breakfast.ingredients || []).map(ing => {
      let scaledAmount = ing.amount;
      if (scaledAmount && !isNaN(parseFloat(scaledAmount))) {
        scaledAmount = parseFloat(scaledAmount) * factor;
      }
      return {
        name: ing.name,
        scaledAmount: scaledAmount || null,
        scaledUnit: ing.unit || null
      };
    }).sort((a,b) => a.name.localeCompare(b.name,'de'));
    byRecipe.push({ 
      recipe: { name: '☕ ' + breakfast.name, id: null, isBreakfast: true, breakfastId: breakfast.id },
      items 
    });
  }
  const catOrder = [...STATE.categories.filter(c => Object.keys(byCat).includes(c)), ...Object.keys(byCat).filter(k => !STATE.categories.includes(k))];
  return { allItems, byCat, summarized, byRecipe, catOrder, selected };
}

        manualHdr.className = 'shopping-category-header';
        manualHdr.innerHTML = `<span style="font-size:20px;">✚</span><span class="shopping-category-title">Manuell hinzugefügt</span><span style="font-size:12px;color:var(--text3);">${manualItems.length} Artikel</span>`;
        manualSection.appendChild(manualHdr);
        for (const item of manualItems) {
          const checkKey = `${item.name}::${item.unit || ''}::manual`;
          const checked = STATE.shoppingChecked[checkKey];
          const itemDiv = document.createElement('div');
          itemDiv.className = `shopping-item ${checked ? 'checked' : ''}`;
          const amtStr = fmtShoppingAmt(item.amount, item.unit);
          const notePart = item.note ? `<span style="font-size:11px;color:var(--text3);font-style:italic;margin-left:8px;">📝 ${escHtml(item.note)}</span>` : '';
          itemDiv.innerHTML = `
            <input type="checkbox" class="shopping-check" ${checked ? 'checked' : ''} onchange="toggleShoppingCheck('${checkKey.replace(/'/g,"\'")}', this)">
            <span class="shopping-name" style="${checked ? 'text-decoration:line-through;color:var(--text3);font-style:italic;' : 'font-style:italic;'}">${escHtml(item.name)}</span>
            <span class="shopping-amount" style="${checked ? 'color:var(--text3);' : ''}">${amtStr}</span>
            ${notePart}
          `;
          manualSection.appendChild(itemDiv);
        }
        c.appendChild(manualSection);
      }
    }
    return;
  }

  // Detailed or Compact
  const activeCats = shoppingMode === 'detailed' ? Object.keys(byCat) : Object.keys(summarized);
  const orderedCats = [...STATE.categories.filter(c => activeCats.includes(c)), ...activeCats.filter(k => !STATE.categories.includes(k))];

  for (const cat of orderedCats) {
    let items = shoppingMode === 'detailed' ? byCat[cat] : summarized[cat];
    if (!items || items.length === 0) continue;

    const section = document.createElement('div');
    section.className = 'shopping-category';
    section.innerHTML = `<div class="shopping-category-header">
      <span style="font-size:22px;">${getCatEmoji(cat)}</span>
      <span class="shopping-category-title">${cat}</span>
      <span style="font-size:12px;color:var(--text3);">${items.length} Artikel</span>
    </div>`;

    for (const item of items) {
      // Helper function to create tag for recipe or meal plan
      function createSourceTag(sourceName, isManual) {
        const mealPlan = STATE.mealPlans.find(p => p.name === sourceName);
        if (mealPlan) {
          return `<span class="shopping-mealplan-tag" onclick="showView('mealplan-edit',${mealPlan.id})">🗓️ ${escHtml(sourceName)}</span>`;
        }
        const recipe = STATE.recipes.find(r => r.name === sourceName);
        if (recipe) {
          return `<span class="shopping-recipe-tag" onclick="openRecipeByName('${escHtml(sourceName).replace(/'/g, "\\'")}')">${escHtml(sourceName)}</span>`;
        }
        if (sourceName === '✚ Manuell hinzugefügt' || sourceName === '✚ Manuell') {
          return '<span class="badge badge-manual" style="font-size:11px;cursor:pointer;" onclick="showView(\'manual-shopping\')">✚ Manuell</span>';
        }
        return `<span class="shopping-recipe-tag">${escHtml(sourceName)}</span>`;
      }
      
      // Check if this is a grouped item (multiple units for same ingredient)
      if (item.isGrouped && shoppingMode === 'compact') {
        // Render grouped item with sub-items
        const groupDiv = document.createElement('div');
        groupDiv.className = 'shopping-item-group';
        groupDiv.style.cssText = 'background:#fafafa;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border2);';
        
        // Group header
        const headerDiv = document.createElement('div');
        headerDiv.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px dashed var(--border);';
        headerDiv.innerHTML = `
          <span style="font-size:18px;">🔗</span>
          <span style="font-weight:600;font-size:15px;color:var(--accent);">${escHtml(item.name)}</span>
          <span style="font-size:12px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px;">${item.subItems.length} Einträge</span>
        `;
        groupDiv.appendChild(headerDiv);
        
        // Sub-items
        for (const subItem of item.subItems) {
          const subCheckKey = `${subItem.name}::${subItem.unit}::grouped`;
          const subChecked = STATE.shoppingChecked[subCheckKey];
          const subDiv = document.createElement('div');
          subDiv.className = `shopping-item ${subChecked ? 'checked' : ''}`;
          subDiv.style.cssText = 'margin-left:20px;padding:8px 0;border-bottom:1px solid var(--border2);';
          const subAmtStr = fmtShoppingAmt(subItem.amount, subItem.unit);
          const subRecipeList = subItem.recipes || [];
          const subTags = subRecipeList.map(r => createSourceTag(r, false)).join(' ');
          const moreTags = ''; // Show all recipes, no limit
          
          subDiv.innerHTML = `
            <input type="checkbox" class="shopping-check" ${subChecked ? 'checked' : ''} onchange="toggleShoppingCheck('${subCheckKey.replace(/'/g,"\\'")}', this)">
            <span class="shopping-amount" style="min-width:80px;${subChecked ? 'color:var(--text3);text-decoration:line-through;' : ''}">${subAmtStr}</span>
            <div style="flex:1;display:flex;flex-wrap:wrap;gap:4px;">${subTags}${moreTags}</div>
          `;
          groupDiv.appendChild(subDiv);
        }
        
        section.appendChild(groupDiv);
      } else {
        // Regular single item
        const checkKey = `${item.name}::${item.unit}::${item.recipe || ''}`;
        const checked = STATE.shoppingChecked[checkKey];
        const itemDiv = document.createElement('div');
        itemDiv.className = `shopping-item ${checked ? 'checked' : ''}`;
        const amtStr = fmtShoppingAmt(item.amount, item.unit);
        let recipePart = '';
        
        if (shoppingMode === 'detailed') {
          recipePart = createSourceTag(item.recipe, item.manual);
        } else {
          const recipeList = item.recipes || [item.recipe];
          const tags = recipeList.map(r => createSourceTag(r, false)).join(' ');
          recipePart = '<div style="width:100%;display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;">' + tags + '</div>';
        }
        const notePart = item.note ? '<span style="font-size:11px;color:var(--text3);font-style:italic;margin-left:4px;">📝 ' + escHtml(item.note) + '</span>' : '';
        itemDiv.innerHTML = `
          <input type="checkbox" class="shopping-check" ${checked ? 'checked' : ''} onchange="toggleShoppingCheck('${checkKey.replace(/'/g,"\\'")}', this)">
          <span class="shopping-name" style="${checked ? 'text-decoration:line-through;color:var(--text3);font-style:italic;' : 'font-style:italic;'}">${escHtml(item.name)}</span>
          <span class="shopping-amount" style="${checked ? 'color:var(--text3);' : ''}">${amtStr}</span>
          ${recipePart}
          ${notePart}
        `;
        section.appendChild(itemDiv);
      }
    }
    c.appendChild(section);
  }
}

function buildMobileHtmlForPreview(mode, shoppingData, sourceName) {
  const { allItems, byCat, summarized, byRecipe, catOrder } = shoppingData;
  const dateStr = new Date().toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  
  let html = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einkaufsliste</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #faf8f5; color: #3d3225; padding: 16px; padding-bottom: 100px; }
h1 { font-size: 22px; color: #5c3d1e; margin-bottom: 4px; }
.source { font-size: 13px; color: #5c3d1e; font-weight: 600; margin-bottom: 4px; }
.date { font-size: 12px; color: #998570; margin-bottom: 16px; }
.progress-bar { background: #e8e0d5; border-radius: 8px; height: 8px; margin-bottom: 20px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, #4caf50, #8bc34a); height: 100%; width: 0%; transition: width 0.3s; border-radius: 8px; }
.progress-text { font-size: 12px; color: #998570; margin-bottom: 16px; text-align: center; }
.category { margin-bottom: 20px; }
.category-header { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 2px solid #5c3d1e; margin-bottom: 8px; }
.category-title { font-weight: 700; font-size: 15px; color: #5c3d1e; }
.item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #e8e0d5; }
.checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #a0622a; cursor: pointer; flex-shrink: 0; }
.checkbox:checked { background: #4caf50; border-color: #4caf50; }
.item-content { flex: 1; }
.item-name { font-size: 15px; font-weight: 500; }
.item-amount { font-size: 13px; color: #998570; }
.item.checked .item-name { text-decoration: line-through; color: #998570; }
</style>
</head>
<body>
<h1>🛒 Einkaufsliste</h1>
<div class="source">📋 ${escHtml(sourceName)}</div>
<div class="date">${dateStr}</div>
<div class="progress-text">0 von X erledigt</div>
<div class="progress-bar"><div class="progress-fill"></div></div>
<div id="list">`;

  let itemIndex = 0;
  const itemsToShow = mode === 'detailed' ? byCat : summarized;
  
  if (mode === 'byrecipe') {
    for (const { recipe, items } of byRecipe) {
      html += `<div class="category"><div class="category-header"><span class="category-title">📖 ${escHtml(recipe.name)}</span></div>`;
      for (const item of items) {
        const amt = fmtShoppingAmt(item.scaledAmount, item.scaledUnit);
        html += `<div class="item"><input type="checkbox" class="checkbox" id="cb${itemIndex}"><div class="item-content"><div class="item-name">${escHtml(item.name)}</div>${amt ? `<div class="item-amount">${amt}</div>` : ''}</div></div>`;
        itemIndex++;
      }
      html += '</div>';
    }
  } else {
    for (const cat of catOrder) {
      const items = itemsToShow[cat];
      if (!items || items.length === 0) continue;
      
      const emoji = getCatEmoji(cat);
      html += `<div class="category"><div class="category-header"><span class="category-title">${emoji} ${cat}</span></div>`;
      
      for (const item of items) {
        const amt = fmtShoppingAmt(item.amount, item.unit);
        html += `<div class="item"><input type="checkbox" class="checkbox" id="cb${itemIndex}"><div class="item-content"><div class="item-name">${escHtml(item.name)}</div>${amt ? `<div class="item-amount">${amt}</div>` : ''}</div></div>`;
        itemIndex++;
      }
      html += '</div>';
    }
  }
  
  html += `</div>
<script>
const total = ${itemIndex};
document.querySelector('.progress-text').textContent = '0 von ' + total + ' erledigt';
document.addEventListener('change', function(e) {
  if (e.target.classList.contains('checkbox')) {
    const checked = document.querySelectorAll('.checkbox:checked').length;
    document.querySelector('.progress-text').textContent = checked + ' von ' + total + ' erledigt';
    document.querySelector('.progress-fill').style.width = (checked / total * 100) + '%';
    e.target.closest('.item').classList.toggle('checked', e.target.checked);
  }
});
<\/script>
</body>
</html>`;
  
  return html;
}

function doExportMobile(mode, shoppingData, sourceName) {
  const { allItems, byCat, summarized, byRecipe, catOrder } = shoppingData;
  const listId = 'list_' + Date.now();
  const dateStr = new Date().toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  
  // Text export mode - copy to clipboard
  if (mode === 'text') {
    let text = '🛒 EINKAUFSLISTE\n';
    text += '📋 ' + sourceName + '\n';
    text += dateStr + '\n';
    text += '═'.repeat(30) + '\n\n';
    
    const orderedCats = [...STATE.categories.filter(c => Object.keys(summarized).includes(c)), ...Object.keys(summarized).filter(k => !STATE.categories.includes(k))];
    
    for (const cat of orderedCats) {
      const items = summarized[cat];
      if (!items || items.length === 0) continue;
      
      text += getCatEmoji(cat) + ' ' + cat.toUpperCase() + '\n';
      
      for (const item of items) {
        const amtStr = fmtShoppingAmt(item.amount, item.unit);
        const recipes = item.recipes || [item.recipe];
        const recipeStr = recipes.filter(r => r).join(', ');
        
        text += '☐ ' + item.name;
        if (amtStr) text += ' — ' + amtStr;
        text += '\n';
        if (recipeStr) text += '   → ' + recipeStr + '\n';
        if (item.note) text += '   📝 ' + item.note + '\n';
      }
      text += '\n';
    }
    
    // Copy to clipboard
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        alert('✓ Einkaufsliste in die Zwischenablage kopiert!\n\nFüge sie jetzt in deine Notizen-App ein (Apple Notes, Google Keep, etc.)');
      }).catch(() => {
        showTextExportFallback(text);
      });
    } else {
      showTextExportFallback(text);
    }
    return;
  }
  
  
  // Preview mode - show in overlay
  if (mode === 'preview') {
    // Build the HTML first, then show in iframe
    buildAndShowPreview();
    return;
  }
  
  function buildAndShowPreview() {
    const previewHtml = buildMobileHtml('compact');
    
    const overlay = document.createElement('div');
    overlay.id = 'preview-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:#f0ebe1;z-index:9999;overflow:hidden;display:flex;flex-direction:column;';
    
    // Toolbar
    const toolbar = document.createElement('div');

  lines.push('})();');

function showTextExportFallback(text) {

  overlay.id = 'text-export-overlay';

  const h = document.createElement('div');
  h.style.cssText = 'font-family:Georgia,serif;font-size:18px;font-style:italic;color:#5c3d1e;margin-bottom:12px;';
  h.textContent = '📄 Einkaufsliste kopieren';
  box.appendChild(h);

  const p = document.createElement('p');
  p.style.cssText = 'color:#6b5940;font-size:13px;margin-bottom:12px;';
  p.textContent = 'Markiere den Text und kopiere ihn (Strg+C / Cmd+C), dann füge ihn in deine Notizen-App ein.';
  box.appendChild(p);

  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.cssText = 'flex:1;min-height:200px;font-family:monospace;font-size:13px;padding:12px;border:1px solid #e8e0d4;border-radius:8px;resize:none;background:white;';
  textarea.readOnly = true;
  box.appendChild(textarea);

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;margin-top:16px;';

  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn btn-primary';
  closeBtn.textContent = 'Schließen';
  closeBtn.addEventListener('click', () => overlay.remove());
  btnRow.appendChild(closeBtn);
  box.appendChild(btnRow);

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  textarea.focus();
  textarea.select();
}
