          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="field" style="margin:0;">
            <label class="field-label">Tags <span style="font-weight:normal;color:var(--text3);">(mit Komma trennen)</span></label>
            <input type="text" id="bf-tags" value="${escHtml(breakfastEditorState.tags.join(', '))}" placeholder="z.B. vegan, süß, herzhaft" class="form-control">
          </div>
          <div class="field" style="margin:0;">
            <label class="field-label">Notizen</label>
            <input type="text" id="bf-notes" value="${escHtml(breakfastEditorState.notes)}" placeholder="Optionale Notizen..." class="form-control">
          </div>
        </div>
      </div>
      
      <div style="background:white;border:1.5px solid var(--border);border-radius:12px;padding:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3 style="font-family:'Playfair Display',serif;color:var(--accent);margin:0;">🥐 Zutaten</h3>
          <button class="btn btn-outline btn-sm" onclick="addBreakfastIngredient()">+ Zutat hinzufügen</button>
        </div>
        
        <div id="bf-ingredients-list">
          ${renderBreakfastIngredientsList()}
        </div>
        
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
          <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:end;">
            <div class="field" style="margin:0;">
              <label class="field-label">Neue Zutat</label>
              <input type="text" id="bf-new-ing-name" placeholder="z.B. Brötchen" class="form-control" list="ingredient-suggestions">
            </div>
            <div class="field" style="margin:0;">
              <label class="field-label">Menge</label>
              <input type="text" id="bf-new-ing-amount" placeholder="2" class="form-control" style="width:70px;">
            </div>
            <div class="field" style="margin:0;">
              <label class="field-label">Einheit</label>
              <input type="text" id="bf-new-ing-unit" placeholder="Stk" class="form-control" style="width:70px;">
            </div>
            <button class="btn btn-primary btn-sm" onclick="addBreakfastIngredientFromInput()" style="height:38px;">Hinzufügen</button>
          </div>
        </div>
      </div>
    </div>
  `;
  
  // Add enter key handler for quick adding
  document.getElementById('bf-new-ing-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addBreakfastIngredientFromInput();
  });
}

function renderBreakfastIngredientsList() {
  if (!breakfastEditorState.ingredients || breakfastEditorState.ingredients.length === 0) {
    return '<div style="text-align:center;padding:30px;color:var(--text3);">Noch keine Zutaten hinzugefügt</div>';
  }
  
  let html = '<div style="display:flex;flex-direction:column;gap:8px;">';
  breakfastEditorState.ingredients.forEach((ing, idx) => {
    html += `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f9f6f1;border-radius:8px;">
        <span style="flex:1;font-weight:500;">${escHtml(ing.name)}</span>
        <input type="text" value="${ing.amount || ''}" onchange="updateBreakfastIngredient(${idx}, 'amount', this.value)" 
               placeholder="Menge" style="width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;text-align:center;">
        <input type="text" value="${ing.unit || ''}" onchange="updateBreakfastIngredient(${idx}, 'unit', this.value)" 
               placeholder="Einheit" style="width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;text-align:center;">
        <button class="btn btn-ghost btn-sm" onclick="removeBreakfastIngredient(${idx})" style="color:#c44;padding:4px 8px;">×</button>
      </div>
    `;
  });
  html += '</div>';
  return html;
}

function addBreakfastIngredientFromInput() {
  const nameInput = document.getElementById('bf-new-ing-name');
  const amountInput = document.getElementById('bf-new-ing-amount');
  const unitInput = document.getElementById('bf-new-ing-unit');
  
  const name = nameInput.value.trim();
  if (!name) return;
  
  breakfastEditorState.ingredients.push({
    name: name,
    amount: amountInput.value.trim(),
    unit: unitInput.value.trim()
  });
  
  // Clear inputs
  nameInput.value = '';
  amountInput.value = '';
  unitInput.value = '';
  nameInput.focus();
  
  // Re-render list
  document.getElementById('bf-ingredients-list').innerHTML = renderBreakfastIngredientsList();
}

function addBreakfastIngredient() {
  const name = prompt('Name der Zutat:');
  if (!name || !name.trim()) return;
  
  breakfastEditorState.ingredients.push({
    name: name.trim(),
    amount: '',
    unit: ''
  });
  
  document.getElementById('bf-ingredients-list').innerHTML = renderBreakfastIngredientsList();
}

function updateBreakfastIngredient(idx, field, value) {
  if (breakfastEditorState.ingredients[idx]) {
    breakfastEditorState.ingredients[idx][field] = value;
  }
}

function removeBreakfastIngredient(idx) {
  breakfastEditorState.ingredients.splice(idx, 1);
  document.getElementById('bf-ingredients-list').innerHTML = renderBreakfastIngredientsList();
}

function saveBreakfast() {
  const name = document.getElementById('bf-name').value.trim();
  const basePeople = parseInt(document.getElementById('bf-base').value) || 1;
  const tags = document.getElementById('bf-tags').value.split(',').map(t => t.trim()).filter(t => t);
  const notes = document.getElementById('bf-notes').value.trim();
  
  if (!name) {
    alert('Bitte einen Namen eingeben.');
    return;
  }
  
  if (breakfastEditorState.ingredients.length === 0) {
    alert('Bitte mindestens eine Zutat hinzufügen.');
    return;
  }
  
  const breakfast = {
    id: editingBreakfastId || Date.now(),
    name: name,
    basePeople: basePeople,
    ingredients: breakfastEditorState.ingredients,
    tags: tags,
    notes: notes
  };
  
  if (editingBreakfastId) {
    const idx = STATE.breakfasts.findIndex(b => b.id === editingBreakfastId);
    if (idx !== -1) STATE.breakfasts[idx] = breakfast;
  } else {
    STATE.breakfasts.push(breakfast);
  }
  
  breakfastEditorState = {};
  saveState();
  showView('breakfast');
}

function deleteBreakfast(id) {
  if (!confirm('Frühstück wirklich löschen?')) return;
  STATE.breakfasts = STATE.breakfasts.filter(b => b.id !== id);
  saveState();
  renderView();
}

// Add breakfast to meal plan
function showAddBreakfastToMealDialog(planId, mealKey) {
  if (!STATE.breakfasts || STATE.breakfasts.length === 0) {
    alert('Noch keine Frühstücke erstellt. Erstelle zuerst ein Frühstück im Frühstücks-Bereich.');
    return;
  }
  
  const plan = STATE.mealPlans.find(p => p.id === planId);
  const defaultPortions = plan?.defaultPortions || 4;
  
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  
  let breakfastOptions = STATE.breakfasts.map(bf => 
    `<option value="${bf.id}">${escHtml(bf.name)} (${bf.ingredients.length} Zutaten)</option>`
  ).join('');
  
  overlay.innerHTML = `
    <div class="modal" style="max-width:400px;">
      <h2 style="font-family:'Playfair Display',serif;color:var(--accent);margin-bottom:16px;">☕ Frühstück hinzufügen</h2>
      <div class="form-group" style="margin-bottom:16px;">
        <label style="font-weight:600;font-size:13px;margin-bottom:6px;display:block;">Frühstück auswählen</label>
        <select id="add-breakfast-select" class="form-control" style="width:100%;">
          ${breakfastOptions}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label style="font-weight:600;font-size:13px;margin-bottom:6px;display:block;">Anzahl Personen</label>
        <input type="number" id="add-breakfast-portions" class="form-control" value="${defaultPortions}" min="1" style="width:100px;">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button>
        <button class="btn btn-primary" onclick="addBreakfastToMeal(${planId},'${mealKey}')">Hinzufügen</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function addBreakfastToMeal(planId, mealKey) {
  const breakfastId = parseInt(document.getElementById('add-breakfast-select').value);
  const portions = parseInt(document.getElementById('add-breakfast-portions').value) || 1;
  
  const breakfast = STATE.breakfasts.find(b => b.id === breakfastId);
  if (!breakfast) return;
  
  const plan = STATE.mealPlans.find(p => p.id === planId);
  if (!plan) return;
  
  if (!plan.meals[mealKey]) plan.meals[mealKey] = { recipes: [], ingredients: [], notes: [], breakfasts: [] };
  if (!plan.meals[mealKey].breakfasts) plan.meals[mealKey].breakfasts = [];
  
  plan.meals[mealKey].breakfasts.push({
    id: breakfastId,
    portions: portions
  });
  
  updateMealPlanModified(planId);
  saveState();
  document.querySelector('.modal-overlay').remove();
  renderView();
}

function removeBreakfastFromMeal(planId, mealKey, breakfastId) {
  const plan = STATE.mealPlans.find(p => p.id === planId);
  if (!plan || !plan.meals[mealKey] || !plan.meals[mealKey].breakfasts) return;
  
  plan.meals[mealKey].breakfasts = plan.meals[mealKey].breakfasts.filter(b => b.id !== breakfastId);
  updateMealPlanModified(planId);
  saveState();
  renderView();
}

function editBreakfastPortionsInMeal(planId, mealKey, breakfastId) {
  const plan = STATE.mealPlans.find(p => p.id === planId);
  if (!plan || !plan.meals[mealKey] || !plan.meals[mealKey].breakfasts) return;
  
  const bfEntry = plan.meals[mealKey].breakfasts.find(b => b.id === breakfastId);
  if (!bfEntry) return;
  
  const breakfast = STATE.breakfasts.find(b => b.id === breakfastId);
  if (!breakfast) return;
  
  const newPortions = prompt('Anzahl Personen:', bfEntry.portions);
  if (newPortions === null) return;
  
  bfEntry.portions = parseInt(newPortions) || 1;
  updateMealPlanModified(planId);
  saveState();
  renderView();
}



function showBreakfastDetails(breakfastId, portions) {
  const breakfast = STATE.breakfasts.find(b => b.id === breakfastId);
  if (!breakfast) return;
  
  const factor = portions / breakfast.basePeople;
  
  let ingredientsHtml = breakfast.ingredients.map(ing => {
    let amount = ing.amount;
    if (amount && !isNaN(parseFloat(amount))) {
      amount = (parseFloat(amount) * factor).toFixed(2).replace(/\.?0+$/, '');
    }
    return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
      <span>${escHtml(ing.name)}</span>
      <span style="font-weight:600;color:var(--accent);">${amount || '-'}${ing.unit ? ' ' + ing.unit : ''}</span>
    </div>`;
  }).join('');
  
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  
  overlay.innerHTML = `
    <div class="modal" style="max-width:400px;">
      <h2 style="font-family:'Playfair Display',serif;color:var(--accent);margin-bottom:8px;">☕ ${escHtml(breakfast.name)}</h2>
      <div style="font-size:13px;color:var(--text3);margin-bottom:16px;">
        Für ${portions} Person${portions !== 1 ? 'en' : ''} ${factor !== 1 ? '(×' + factor.toFixed(2).replace(/\.?0+$/, '') + ')' : ''}
      </div>
      <div style="max-height:300px;overflow-y:auto;">
        ${ingredientsHtml}
      </div>
      <button class="btn btn-outline" style="width:100%;margin-top:16px;" onclick="this.closest('.modal-overlay').remove()">Schließen</button>
    </div>
  `;
  document.body.appendChild(overlay);
}


function buildBreakfastCard(breakfast) {
  const card = document.createElement('div');
  card.className = 'recipe-card' + (breakfast.selectedForList ? ' selected' : '');
  card.dataset.breakfastId = breakfast.id;
  card.style.borderLeftColor = '#4caf50';

  const header = document.createElement('div');
  header.className = 'recipe-card-header';

  const ingCount = breakfast.ingredients ? breakfast.ingredients.length : 0;

  header.innerHTML = `
    <label class="toggle-check" onclick="event.stopPropagation()">
      <input type="checkbox" ${breakfast.selectedForList ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--green);" onchange="toggleBreakfastForList(${breakfast.id}, this.checked)">
    </label>
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="recipe-card-name" style="color:#2e7d32;">☕ ${escHtml(breakfast.name)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;">
        <span class="badge" style="background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;">${ingCount} Zutaten</span>
        <span class="badge badge-gray">Basis: ${breakfast.basePeople} Pers.</span>
        ${(breakfast.tags || []).map(tag => '<span class="badge" style="background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;">🏷️ ' + escHtml(tag) + '</span>').join('')}
        ${breakfast.notes ? '<span class="badge" style="background:#fff8e1;color:#f57c00;border:1px solid #ffe082;" title="' + escHtml(breakfast.notes) + '">📝</span>' : ''}
      </div>
    </div>
    <div class="person-stepper">
      <button onclick="event.stopPropagation();adjustBreakfastPortions(${breakfast.id}, -1)">−</button>
      <input type="number" value="${breakfast.targetPeople || breakfast.basePeople}" min="1" 
             onchange="event.stopPropagation();setBreakfastPortions(${breakfast.id}, this.value)" 
             onclick="event.stopPropagation()">
      <button onclick="event.stopPropagation();adjustBreakfastPortions(${breakfast.id}, 1)">+</button>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();showView('breakfast-edit', ${breakfast.id})" title="Bearbeiten">✏️</button>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteBreakfast(${breakfast.id})" title="Löschen" style="color:#c44;">🗑️</button>
    </div>
  `;

  card.appendChild(header);

  // Show ingredients preview
  if (breakfast.ingredients && breakfast.ingredients.length > 0) {
    const body = document.createElement('div');
    body.className = 'recipe-card-body';
    body.style.cursor = 'pointer';
    body.onclick = () => showView('breakfast-edit', breakfast.id);
    
    const factor = (breakfast.targetPeople || breakfast.basePeople) / breakfast.basePeople;
    
    body.innerHTML = breakfast.ingredients.slice(0, 6).map(ing => {
      let amount = ing.amount;
      if (amount && !isNaN(parseFloat(amount))) {
        amount = (parseFloat(amount) * factor).toFixed(2).replace(/\.?0+$/, '');
      }
      return '<span class="ingredient-pill">' + escHtml(ing.name) + (amount ? ' <strong>' + amount + (ing.unit ? ' ' + ing.unit : '') + '</strong>' : '') + '</span>';
    }).join('') + (breakfast.ingredients.length > 6 ? '<span class="ingredient-pill">+' + (breakfast.ingredients.length - 6) + ' weitere</span>' : '');
    
    card.appendChild(body);
  }

  return card;
}

function toggleBreakfastForList(id, checked) {
  const bf = STATE.breakfasts.find(b => b.id === id);
  if (bf) {
    bf.selectedForList = checked;
    saveState();
    renderView();
  }
}

function adjustBreakfastPortions(id, delta) {
  const bf = STATE.breakfasts.find(b => b.id === id);
  if (bf) {
    bf.targetPeople = Math.max(1, (bf.targetPeople || bf.basePeople) + delta);
    saveState();
    renderView();
  }
}

function setBreakfastPortions(id, value) {
  const bf = STATE.breakfasts.find(b => b.id === id);
  if (bf) {
    bf.targetPeople = Math.max(1, parseInt(value) || bf.basePeople);
    saveState();
    renderView();
  }
}

function renderUnitConversions() {
  setTopbar('📏 Einheiten-Umrechnungen', `
    <button class="btn btn-outline btn-sm" onclick="showView('database')">← Zur Datenbank</button>
    <button class="btn btn-outline btn-sm" onclick="resetUnitConversions()">🔄 Auf Standard zurücksetzen</button>
  `);

  const conversions = STATE.unitConversions || DEFAULT_UNIT_CONVERSIONS;
  const c = document.getElementById('content');
  
  // Kategorien für Umrechnungen
  const categories = {
    'Löffel & Prisen': { icon: '🥄', units: ['EL', 'TL', 'Msp', 'Prise'] },
    'Gewicht': { icon: '⚖️', units: ['kg', 'g'] },
    'Volumen': { icon: '🥛', units: ['l', 'ml', 'Tasse', 'Becher', 'Tropfen'] },
    'Stück-basiert': { icon: '🔢', units: ['Stk', 'Zehe', 'Scheibe', 'Würfel', 'Bund', 'Zweig', 'Blatt', 'Stange', 'Handvoll'] },
    'Packungen & Behälter': { icon: '📦', units: ['Pkg', 'Dose', 'Glas', 'Flasche', 'Tube'] },
    'Sonstige': { icon: '📋', units: [] }
  };
  
  // Gruppiere Umrechnungen nach Kategorie
  const groups = {};
  for (const cat of Object.keys(categories)) {
    groups[cat] = [];
  }
  
  for (const [key, value] of Object.entries(conversions)) {
    const [from, , to] = key.split('_');
    let assigned = false;
    
    for (const [catName, catData] of Object.entries(categories)) {
      if (catName !== 'Sonstige' && catData.units.includes(from)) {
        groups[catName].push({ key, from, to, value });
        assigned = true;
        break;
      }
    }
    
    if (!assigned) {
      groups['Sonstige'].push({ key, from, to, value });
    }
  }
  
  let html = '<div style="max-width:1000px;margin:0 auto;">';
  
  // Neue Umrechnung hinzufügen - Formular
  html += `
    <div class="card" style="margin-bottom:24px;">
      <h3 style="font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--accent);margin-bottom:16px;">
        ➕ Neue Umrechnung hinzufügen
      </h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:12px;align-items:end;">
        <div>
          <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:4px;">Von Einheit</label>
          <input type="text" id="new-conv-from" placeholder="z.B. EL, Tasse" 
            style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:4px;">Nach Einheit</label>
          <input type="text" id="new-conv-to" placeholder="z.B. g, ml" 
            style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:4px;">Faktor (1 Von = X Nach)</label>
          <input type="number" id="new-conv-factor" placeholder="z.B. 15" step="0.01" min="0"
            style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:var(--text3);margin-bottom:4px;">Kategorie</label>
          <select id="new-conv-category" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:white;">
            ${Object.entries(categories).map(([name, data]) => 
              `<option value="${name}">${data.icon} ${name}</option>`
            ).join('')}
          </select>
        </div>
        <button class="btn btn-primary" onclick="addUnitConversionFromForm()" style="padding:10px 20px;">
          Hinzufügen
        </button>
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--text3);">
        💡 Beispiel: 1 EL = 15 g → Von: "EL", Nach: "g", Faktor: "15"
      </div>
    </div>
  `;
  
  // Info-Box
  html += `
    <div style="background:#e3f2fd;border:1px solid #90caf9;border-radius:12px;padding:16px;margin-bottom:24px;">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <span style="font-size:24px;">💡</span>
        <div>
          <div style="font-weight:600;color:#1565c0;margin-bottom:4px;">Wie funktionieren Umrechnungen?</div>
          <div style="font-size:13px;color:#1976d2;line-height:1.5;">
            Diese Umrechnungen werden für die Kostenberechnung verwendet. Wenn z.B. ein Rezept "2 EL Mehl" enthält 
            und der Preis pro kg hinterlegt ist, wird über EL → g → kg umgerechnet.
            <br>Klicke auf eine Umrechnung um sie zu bearbeiten oder zu löschen.
          </div>
        </div>
      </div>
    </div>
  `;
  
  // Umrechnungen nach Kategorie
  for (const [catName, items] of Object.entries(groups)) {
    if (items.length === 0) continue;
    
    const catData = categories[catName];
    html += `
      <div class="card" style="margin-bottom:16px;">
        <h3 style="font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--accent);margin-bottom:12px;">
          ${catData.icon} ${catName}
          <span style="font-size:12px;font-weight:normal;color:var(--text3);margin-left:8px;">(${items.length} Umrechnungen)</span>
        </h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:8px;">
          ${items.map(item => `
            <div class="unit-conv-item" data-key="${item.key}" 
              style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-radius:8px;cursor:pointer;transition:all 0.15s;"
              onmouseover="this.style.background='var(--surface)';this.style.boxShadow='0 2px 8px rgba(0,0,0,0.1)';"
              onmouseout="this.style.background='var(--surface2)';this.style.boxShadow='none';"
              onclick="editUnitConversion('${item.key}', ${item.value})">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-weight:600;color:var(--accent);">1 ${item.from}</span>
                <span style="color:var(--text3);">→</span>
                <span style="font-weight:600;color:var(--accent2);">${item.value} ${item.to}</span>
              </div>
              <div style="display:flex;gap:4px;">
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editUnitConversion('${item.key}', ${item.value})" title="Bearbeiten">✏️</button>
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteUnitConversion('${item.key}')" title="Löschen">🗑️</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  html += '</div>';
  c.innerHTML = html;
}

function addUnitConversionFromForm() {
  const fromUnit = document.getElementById('new-conv-from').value.trim();
  const toUnit = document.getElementById('new-conv-to').value.trim();
  const factor = parseFloat(document.getElementById('new-conv-factor').value);
  const category = document.getElementById('new-conv-category').value;
  
  if (!fromUnit) {
    showToast('Bitte "Von Einheit" eingeben', 'error');
    return;
  }
  if (!toUnit) {
    showToast('Bitte "Nach Einheit" eingeben', 'error');
    return;
  }
  if (isNaN(factor) || factor <= 0) {
    showToast('Bitte einen gültigen positiven Faktor eingeben', 'error');
    return;
  }
  
  const key = `${fromUnit}_to_${toUnit}`;
  
  if (!STATE.unitConversions) {
    STATE.unitConversions = { ...DEFAULT_UNIT_CONVERSIONS };
  }
  
  if (STATE.unitConversions[key]) {
    if (!confirm(`Die Umrechnung "${fromUnit} → ${toUnit}" existiert bereits (Faktor: ${STATE.unitConversions[key]}). Überschreiben?`)) {
      return;
    }
  }
  
  STATE.unitConversions[key] = factor;
  saveState();
  
  // Formular zurücksetzen
  document.getElementById('new-conv-from').value = '';
  document.getElementById('new-conv-to').value = '';
  document.getElementById('new-conv-factor').value = '';
  
  renderUnitConversions();
  showToast(`Umrechnung hinzugefügt: 1 ${fromUnit} = ${factor} ${toUnit}`, 'success');
}

function editUnitConversion(key, currentValue) {
  const [from, , to] = key.split('_');
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h3>Umrechnung bearbeiten</h3>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        <div style="text-align:center;margin-bottom:20px;">
          <span style="font-size:24px;font-weight:600;color:var(--accent);">1 ${from}</span>
          <span style="font-size:20px;color:var(--text3);margin:0 12px;">→</span>
          <span style="font-size:24px;font-weight:600;color:var(--accent2);">? ${to}</span>
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:6px;">Neuer Faktor</label>
          <input type="number" id="edit-conv-factor" value="${currentValue}" step="0.01" min="0"
            style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:16px;text-align:center;">
        </div>
        <div style="font-size:12px;color:var(--text3);text-align:center;">
          1 ${from} = <span id="edit-preview">${currentValue}</span> ${to}
        </div>
      </div>
      <div class="modal-footer" style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Abbrechen</button>
        <button class="btn btn-danger" onclick="deleteUnitConversion('${key}');this.closest('.modal-overlay').remove()">Löschen</button>
        <button class="btn btn-primary" onclick="saveEditedConversion('${key}')">Speichern</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  
  // Live-Vorschau
  const input = document.getElementById('edit-conv-factor');
  const preview = document.getElementById('edit-preview');
  input.addEventListener('input', () => {
    preview.textContent = input.value || '0';
  });
  input.focus();
  input.select();
}

function saveEditedConversion(key) {
  const factor = parseFloat(document.getElementById('edit-conv-factor').value);
  
  if (isNaN(factor) || factor <= 0) {
    showToast('Bitte einen gültigen positiven Faktor eingeben', 'error');
    return;
  }
  
  if (!STATE.unitConversions) {
    STATE.unitConversions = { ...DEFAULT_UNIT_CONVERSIONS };
  }
  
  STATE.unitConversions[key] = factor;
  saveState();
  
  document.querySelector('.modal-overlay').remove();
  renderUnitConversions();
  showToast('Umrechnung aktualisiert', 'success');
}

function deleteUnitConversion(key) {
  const [from, , to] = key.split('_');
  
  if (!confirm(`Umrechnung "${from} → ${to}" wirklich löschen?`)) {
    return;
  }
  
  if (!STATE.unitConversions) {
    STATE.unitConversions = { ...DEFAULT_UNIT_CONVERSIONS };
  }
  
  delete STATE.unitConversions[key];
  saveState();
  renderUnitConversions();
  showToast('Umrechnung gelöscht', 'success');
}

function addNewUnitConversion() {
  // Scrolle zum Formular oben
  document.getElementById('new-conv-from').focus();
  document.getElementById('new-conv-from').scrollIntoView({ behavior: 'smooth', block: 'center' });
}


function renderCostCalculation() {
  const costSearch = STATE.costSearch || '';
  
  setTopbar('💰 Kostenkalkulation', `

function calculateIngredientCost(ingredientName, amount, unit) {
  const prices = STATE.ingredientPrices || {};
  const conversions = STATE.unitConversions || DEFAULT_UNIT_CONVERSIONS;
  const nameLower = ingredientName.toLowerCase().trim();
  
  // Versuche den Preis zu finden (auch mit Variationen)
  let priceData = prices[nameLower];
  if (!priceData) {
    // Suche nach teilweiser Übereinstimmung
    for (const key of Object.keys(prices)) {
      if (key.toLowerCase() === nameLower || 
          nameLower.includes(key.toLowerCase()) || 
          key.toLowerCase().includes(nameLower)) {
        priceData = prices[key];
        break;
      }
    }
  }
  
  if (!priceData || !priceData.price || amount === null || amount === undefined) {
    return null;
  }
  
  const priceUnit = priceData.unit;
  const ingUnit = normalizeUnitFromDB(unit) || 'Stk';
  
  // Wenn Einheiten gleich sind
  if (ingUnit === priceUnit) {
    return amount * priceData.price;
  }
  
  // Versuche Umrechnung
  let convertedAmount = convertUnits(amount, ingUnit, priceUnit, conversions);
  
  if (convertedAmount !== null) {
    return convertedAmount * priceData.price;
  }
  
  // Fallback für häufige Umrechnungen
  if (priceUnit === 'kg' && ingUnit === 'g') {
    return (amount / 1000) * priceData.price;
  }
  if (priceUnit === 'g' && ingUnit === 'kg') {
    return (amount * 1000) * priceData.price;
  }
  if (priceUnit === 'l' && ingUnit === 'ml') {
    return (amount / 1000) * priceData.price;
  }
  if (priceUnit === 'ml' && ingUnit === 'l') {
    return (amount * 1000) * priceData.price;
  }
  
  return null;
}

// Universelle Einheiten-Umrechnung
function convertUnits(amount, fromUnit, toUnit, conversions) {
  if (!fromUnit || !toUnit || fromUnit === toUnit) return amount;
  
  conversions = conversions || STATE.unitConversions || DEFAULT_UNIT_CONVERSIONS;
  
  // Direkte Umrechnung versuchen
  const directKey = `${fromUnit}_to_${toUnit}`;
  if (conversions[directKey]) {
    return amount * conversions[directKey];
  }
  
  // Umgekehrte Umrechnung
  const reverseKey = `${toUnit}_to_${fromUnit}`;
  if (conversions[reverseKey]) {
    return amount / conversions[reverseKey];
  }
  
  // Über Zwischeneinheit (g oder ml) umrechnen
  // Schritt 1: fromUnit -> Basiseinheit (g oder ml)
  let baseAmount = null;
  let baseUnit = null;
  
  // Gewichtsbasierte Einheiten -> g
  const weightUnits = ['g', 'kg', 'EL', 'TL', 'Msp', 'Prise', 'Tasse', 'Becher', 'Handvoll', 'Stk', 'Zehe', 'Scheibe', 'Würfel', 'Bund', 'Zweig', 'Blatt', 'Stange', 'Pkg', 'Dose', 'Glas', 'Tube'];
  const volumeUnits = ['ml', 'l', 'EL', 'TL', 'Tasse', 'Becher', 'Dose', 'Glas', 'Flasche', 'Tropfen'];
  
  // Prüfe ob wir über Gewicht oder Volumen umrechnen sollten
  const toIsWeight = (toUnit === 'g' || toUnit === 'kg');
  const toIsVolume = (toUnit === 'ml' || toUnit === 'l');
  
  if (toIsWeight || (!toIsVolume && weightUnits.includes(fromUnit))) {
    // Umrechnung über Gramm
    baseUnit = 'g';
    
    if (fromUnit === 'g') {
      baseAmount = amount;
    } else if (fromUnit === 'kg') {
      baseAmount = amount * 1000;
    } else {
      const toGKey = `${fromUnit}_to_g`;
      if (conversions[toGKey]) {
        baseAmount = amount * conversions[toGKey];
      }
    }
    
    if (baseAmount !== null) {
      // Schritt 2: g -> toUnit
      if (toUnit === 'g') return baseAmount;
      if (toUnit === 'kg') return baseAmount / 1000;
      
      const fromGKey = `${toUnit}_to_g`;
      if (conversions[fromGKey]) {
        return baseAmount / conversions[fromGKey];
      }
    }
  }
  
  if (toIsVolume || volumeUnits.includes(fromUnit)) {
    // Umrechnung über Milliliter
    baseUnit = 'ml';
    
    if (fromUnit === 'ml') {
      baseAmount = amount;
    } else if (fromUnit === 'l') {
      baseAmount = amount * 1000;
    } else {
      const toMlKey = `${fromUnit}_to_ml`;
      if (conversions[toMlKey]) {
        baseAmount = amount * conversions[toMlKey];
      }
    }
    
    if (baseAmount !== null) {
      // Schritt 2: ml -> toUnit
      if (toUnit === 'ml') return baseAmount;
      if (toUnit === 'l') return baseAmount / 1000;
      
      const fromMlKey = `${toUnit}_to_ml`;
      if (conversions[fromMlKey]) {
        return baseAmount / conversions[fromMlKey];
      }
    }
  }
  
  return null;
}

function calculateRecipeCost(recipe) {
  const { ingredients } = parseCooklang(recipe.rawText || '');
  let totalCost = 0;
  let hasAllPrices = true;
  let missingIngredients = [];
  
  for (const ing of ingredients) {
    const cost = calculateIngredientCost(ing.name, ing.amount, ing.unit);
    if (cost !== null) {
      totalCost += cost;
    } else if (ing.amount !== null) {
      hasAllPrices = false;
      missingIngredients.push(ing.name);
    }
  }
  
  return {
    total: totalCost,
    perPerson: recipe.basePeople ? totalCost / recipe.basePeople : totalCost,
    complete: hasAllPrices,
    missingIngredients
  };
}

function calculateBreakfastCost(breakfast) {
  let totalCost = 0;
  let hasAllPrices = true;
  let missingIngredients = [];
  
  for (const ing of (breakfast.ingredients || [])) {
    const amount = ing.amount ? parseFloat(ing.amount) : null;
    const cost = calculateIngredientCost(ing.name, amount, ing.unit);
    if (cost !== null) {
      totalCost += cost;
    } else if (amount !== null) {
      hasAllPrices = false;
      missingIngredients.push(ing.name);
    }
  }
  
  return {
    total: totalCost,
    perPerson: breakfast.basePeople ? totalCost / breakfast.basePeople : totalCost,
    complete: hasAllPrices,
    missingIngredients
  };
}

      </div>

function calculateMealPlanCost(plan) {
  let totalCost = 0;
  let complete = true;
  const dayCosts = {};
  const days = plan.days || [];
  
  for (const day of days) {
    dayCosts[day] = 0;
  }
  
  for (const [key, meal] of Object.entries(plan.meals || {})) {
    const [day, time] = key.split('_');
    
    // Recipes
    for (const r of (meal.recipes || [])) {
      const recipe = STATE.recipes.find(rec => rec.id === r.id);
      if (!recipe) continue;
      
      const recipeCost = calculateRecipeCost(recipe);
      const factor = r.portions / recipe.basePeople;
      const scaledCost = recipeCost.total * factor;
      
      totalCost += scaledCost;
      if (dayCosts[day] !== undefined) dayCosts[day] += scaledCost;
      if (!recipeCost.complete) complete = false;
    }
    
    // Breakfasts
    for (const bf of (meal.breakfasts || [])) {
      const breakfast = STATE.breakfasts.find(b => b.id === bf.id);
      if (!breakfast) continue;
      
      const breakfastCost = calculateBreakfastCost(breakfast);
      const factor = bf.portions / breakfast.basePeople;
      const scaledCost = breakfastCost.total * factor;
      
      totalCost += scaledCost;
      if (dayCosts[day] !== undefined) dayCosts[day] += scaledCost;
      if (!breakfastCost.complete) complete = false;
    }
  }
  
  const numDays = days.length || 1;
  const defaultPortions = plan.defaultPortions || 4;
  
  return {
    total: totalCost,
    perDay: totalCost / numDays,
    perPerson: totalCost / defaultPortions,
    perPersonPerDay: totalCost / numDays / defaultPortions,
    dayCosts,
    complete
  };
}

function exportPrices() {
  const prices = STATE.ingredientPrices || {};
  const data = Object.entries(prices).map(([name, data]) => ({
    ingredient: name,
    price: data.price,
    unit: data.unit
  }));
  
  const csv = 'Zutat;Preis;Einheit\n' + data.map(row => 
    `${row.ingredient};${row.price};${row.unit}`
  ).join('\n');
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

  const a = document.createElement('a');
  a.href = url;
  a.download = 'zutatenpreise.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function importPricesFromFile() {
  const fileInput = document.getElementById('price-import-file');
  const file = fileInput.files[0];
  if (!file) {
    alert('Bitte eine Datei auswählen.');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim());
    
    let imported = 0;
    for (let i = 1; i < lines.length; i++) { // Skip header
      const parts = lines[i].split(';');
      if (parts.length >= 2) {
        const ingredient = parts[0].trim().toLowerCase();
        const price = parseFloat(parts[1].replace(',', '.'));
        const unit = parts[2]?.trim() || 'kg';
        
        if (ingredient && !isNaN(price) && price > 0) {
          if (!STATE.ingredientPrices) STATE.ingredientPrices = {};
          STATE.ingredientPrices[ingredient] = { price, unit };
          imported++;
        }
      }
    }
    
    saveState();
    document.querySelector('.modal-overlay').remove();
    renderView();
    alert(`${imported} Preise importiert.`);
  };
  reader.readAsText(file);
}

function updateSimpleStepsPreview() {
  const preview = document.getElementById('simple-steps-preview');
  if (!preview) return;
  
  const text = editorState.simpleSteps || '';
  const ingredients = editorState.simpleIngredients || [];
  
  if (!text.trim()) {
    preview.innerHTML = '';
    return;
  }
  
  // Split into paragraphs (steps)
  const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
  
  if (paragraphs.length === 0) {
    preview.innerHTML = '';
    return;
  }
  
  // Highlight ingredients in text
  let highlightedSteps = paragraphs.map((p, idx) => {
    let highlighted = escHtml(p);
    
    // Highlight each ingredient - use simple string matching for reliability
    for (const ing of ingredients) {
      if (!ing.name) continue;
      const name = ing.name.trim();
      if (!name) continue;
      
      // Escape special regex characters in ingredient name
      const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      // Create regex to match ingredient name (case insensitive)
      try {
        const regex = new RegExp('(' + escapedName + ')', 'gi');
        highlighted = highlighted.replace(regex, '<span style="background:#fff3e0;color:#e65100;padding:1px 4px;border-radius:3px;font-weight:500;">$1</span>');
      } catch(e) {
        // If regex fails, skip this ingredient
        console.log('Regex error for:', name);
      }
    }
    
    return `
      <div style="display:flex;gap:12px;margin-bottom:12px;">
        <div style="width:28px;height:28px;background:var(--accent);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;">${idx + 1}</div>
        <div style="flex:1;padding-top:4px;line-height:1.6;font-size:14px;">${highlighted}</div>
      </div>
    `;
  }).join('');
  
  preview.innerHTML = `
    <div style="border-top:1px solid var(--border);padding-top:16px;">
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px;font-weight:500;">VORSCHAU (${paragraphs.length} Schritt${paragraphs.length !== 1 ? 'e' : ''})</div>
      ${highlightedSteps}
    </div>
  `;
}

function convertSimpleToCooklang() {
  const ingredients = editorState.simpleIngredients || [];
  const steps = editorState.simpleSteps || '';
  
  // Build Cooklang text
  let cooklang = '';
  
  // Create ingredient list - each ingredient on its own line with >>ingredient marker
  for (const ing of ingredients) {
    if (!ing.name) continue;
    const name = ing.name.trim();
    const amount = ing.amount || '';
    const unit = ing.unit || '';
    
    if (amount) {
      cooklang += `>>ingredient: @${name}{${amount}${unit ? '%' + unit : ''}}\n`;
    } else {
      cooklang += `>>ingredient: @${name}{}\n`;
    }
  }
  
  // Add blank line between ingredients and steps
  if (cooklang && steps.trim()) {
    cooklang += '\n';
  }
  
  // Add steps as regular text
  const paragraphs = steps.split(/\n\n+/).filter(p => p.trim());
  for (const p of paragraphs) {
    cooklang += p.trim() + '\n\n';
  }
  
  return cooklang.trim();
}

function syncSimpleModeToRawText() {
  if (editorState.simpleMode && editorState.tab === 'simple') {
    editorState.rawText = convertSimpleToCooklang();
  }
}







function handleIngredientKeydown(event, idx, field) {
  if (field === 'name') {
    if (event.key === 'Tab' && !event.shiftKey) {
      event.preventDefault();
      // Select first suggestion from datalist if available
      const input = event.target;
      const datalist = document.getElementById('ingredient-suggestions');
      if (datalist && input.value) {
        const options = Array.from(datalist.options);
        const match = options.find(opt => opt.value.toLowerCase().startsWith(input.value.toLowerCase()));
        if (match) {
          input.value = match.value;
          updateSimpleIngredient(idx, 'name', match.value);
        }
      }
      // Move to amount field
      const amountField = document.getElementById('ing-amount-' + idx);
      if (amountField) {
        amountField.focus();
        amountField.select();
      }
    } else if (event.key === 'Enter') {
      event.preventDefault();
      // Just move to next field on Enter
      const amountField = document.getElementById('ing-amount-' + idx);
      if (amountField) {
        amountField.focus();
        amountField.select();
      }
    }
  } else if (field === 'amount') {
    if (event.key === 'Tab' && !event.shiftKey) {
      event.preventDefault();
      const unitField = document.getElementById('ing-unit-' + idx);
      if (unitField) {
        unitField.focus();
        // Open the dropdown to make it visible
        unitField.click();
      }
    } else if (event.key === 'Enter') {
      event.preventDefault();
      const unitField = document.getElementById('ing-unit-' + idx);
      if (unitField) {
        unitField.focus();
        unitField.click();
      }
    } else if (event.key === 'Tab' && event.shiftKey) {
      event.preventDefault();
      const nameField = document.getElementById('ing-name-' + idx);
      if (nameField) nameField.focus();
    }
  } else if (field === 'unit') {
    if (event.key === 'Enter' || (event.key === 'Tab' && !event.shiftKey)) {
      event.preventDefault();
      // Add new ingredient row and focus it
      addSimpleIngredient();
    } else if (event.key === 'Tab' && event.shiftKey) {
      event.preventDefault();
      const amountField = document.getElementById('ing-amount-' + idx);
      if (amountField) amountField.focus();
    }
  }
}

}

// Inline ghost text autocomplete for ingredients in preparation text
let inlineGhost = { active: false, suggestion: '', remaining: '', startPos: 0, currentWord: '' };

function updateInlineGhost(textarea) {
  const cursorPos = textarea.selectionStart;
  const text = textarea.value;
  
  // Find the current word being typed
  let wordStart = cursorPos;
  while (wordStart > 0 && !/[\s\n.,!?;:]/.test(text[wordStart - 1])) {
    wordStart--;
  }
  
  const currentWord = text.substring(wordStart, cursorPos);
  
  // Only show autocomplete if word is at least 2 characters
  if (currentWord.length < 2) {
    hideInlineGhost();
    return;
  }
  
  // Get ingredients from the simple ingredients list
  const ingredients = editorState.simpleIngredients || [];
  const matches = ingredients
    .filter(ing => ing.name && ing.name.toLowerCase().startsWith(currentWord.toLowerCase()))
    .map(ing => ing.name);
  
  if (matches.length === 0) {
    hideInlineGhost();
    return;
  }
  
  // Get the best match (preserve original casing from ingredient list)
  const suggestion = matches[0];
  const remaining = suggestion.substring(currentWord.length);
  
  if (!remaining) {
    hideInlineGhost();
    return;
  }
  
  inlineGhost = {
    active: true,
    suggestion: suggestion,
    remaining: remaining,
    startPos: wordStart,
    currentWord: currentWord
  };
  
  // Show ghost text inline
  renderInlineGhost(textarea);
}

function renderInlineGhost(textarea) {
  const overlay = document.getElementById('ghost-overlay');
  if (!overlay || !inlineGhost.active) return;
  
  const text = textarea.value;
  const cursorPos = textarea.selectionStart;
  
  // Build the overlay content: text before cursor + ghost text (grayed)
  const beforeCursor = text.substring(0, cursorPos);
  const afterCursor = text.substring(cursorPos);
  
  // The ghost text appears right after the cursor position
  overlay.innerHTML = escHtml(beforeCursor) + 
    '<span style="color:#999;background:#f0f0f0;border-radius:2px;">' + escHtml(inlineGhost.remaining) + '</span>' +
    '<span style="color:transparent;">' + escHtml(afterCursor) + '</span>';
  
  // Match textarea scroll position
  overlay.scrollTop = textarea.scrollTop;
}

function hideInlineGhost() {
  inlineGhost.active = false;
  const overlay = document.getElementById('ghost-overlay');
  if (overlay) overlay.innerHTML = '';
}

function handleInlineGhostKeydown(event) {
  if (!inlineGhost.active) return;
  
  if (event.key === 'Tab') {
    event.preventDefault();
    acceptInlineGhost();
  } else if (event.key === 'Escape') {
    hideInlineGhost();
  } else if (event.key === 'ArrowRight' && event.target.selectionStart === event.target.value.length) {
    // Accept ghost if pressing right arrow at end of text
    event.preventDefault();
    acceptInlineGhost();
  }
}

function acceptInlineGhost() {
  const textarea = document.getElementById('simple-steps-textarea');
  if (!textarea || !inlineGhost.active) return;
  
  const cursorPos = textarea.selectionStart;
  const text = textarea.value;
  
  // Insert the remaining ghost text at cursor position
  const newText = text.substring(0, cursorPos) + inlineGhost.remaining + text.substring(cursorPos);
  textarea.value = newText;
  editorState.simpleSteps = newText;
  
  // Move cursor to end of inserted word
  const newCursorPos = cursorPos + inlineGhost.remaining.length;
  textarea.setSelectionRange(newCursorPos, newCursorPos);
  textarea.focus();
  
  hideInlineGhost();
  updateSimpleStepsPreview();
}

const CORS_PROXIES = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest='
];

let currentProxyIndex = 0;

async function fetchWithProxy(url) {
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    const proxyIndex = (currentProxyIndex + i) % CORS_PROXIES.length;
    const proxyUrl = CORS_PROXIES[proxyIndex] + encodeURIComponent(url);
    
    try {
      const response = await fetch(proxyUrl, {
        headers: { 'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' }
      });
      
      if (response.ok) {
        currentProxyIndex = proxyIndex;
        return await response.text();
      }
    } catch (e) {
      console.log('Proxy ' + proxyIndex + ' failed:', e.message);
    }
  }
  throw new Error('Alle Proxies fehlgeschlagen. Bitte versuche es später erneut.');
}

function parseRecipeFromHtml(html, url) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const warnings = [];
  let quality = 'high';
  let recipe = null;
  let source = 'unknown';
  
  // 1. Try JSON-LD structured data first (most reliable)
  const jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
  for (const script of jsonLdScripts) {
    try {
      let data = JSON.parse(script.textContent);
      if (Array.isArray(data)) data = data.find(function(d) { return d['@type'] === 'Recipe'; }) || data[0];
      if (data && data['@graph']) data = data['@graph'].find(function(d) { return d['@type'] === 'Recipe'; });
      if (data && (data['@type'] === 'Recipe' || (data['@type'] && data['@type'].includes && data['@type'].includes('Recipe')))) {
        recipe = parseJsonLdRecipe(data);
        source = 'json-ld';
        break;
      }
    } catch (e) { console.log('JSON-LD parse error:', e); }
  }
  
  // 2. Try WordPress Recipe Plugins (WPRM, Tasty Recipes, etc.)
  if (!recipe || recipe.ingredients.length < 3) {
    const wprmRecipe = parseWPRMRecipe(doc);
    if (wprmRecipe && wprmRecipe.ingredients.length > (recipe ? recipe.ingredients.length : 0)) {
      recipe = wprmRecipe;
      source = 'wprm';
    }
  }
  
  // 3. Try site-specific parsers
  if (!recipe || recipe.ingredients.length < 3) {
    const hostname = new URL(url).hostname.toLowerCase();
    let siteRecipe = null;
    
    if (hostname.includes('chefkoch')) {
      siteRecipe = parseChefkochRecipe(doc);
      source = 'chefkoch';
    } else if (hostname.includes('eatsmarter')) {
      siteRecipe = parseEatsmarterRecipe(doc);
      source = 'eatsmarter';
    }
    
    if (siteRecipe && siteRecipe.ingredients.length > (recipe ? recipe.ingredients.length : 0)) {
      recipe = siteRecipe;
    }
  }
  
  // 4. Fallback: Generic parser with multiple strategies
  if (!recipe || recipe.ingredients.length < 3) {
    const genericRecipe = parseGenericRecipeImproved(doc);
    if (genericRecipe && genericRecipe.ingredients.length > (recipe ? recipe.ingredients.length : 0)) {
      recipe = genericRecipe;
      source = 'generic';
    }
  }
  
  if (!recipe) {
    return null;
  }
  
  // Evaluate quality and add warnings
  if (recipe.ingredients.length < 3) {
    quality = 'low';
    warnings.push('Nur ' + recipe.ingredients.length + ' Zutat(en) erkannt - wahrscheinlich unvollständig');
  } else if (recipe.ingredients.length < 5) {
    quality = 'medium';
    warnings.push('Wenige Zutaten erkannt (' + recipe.ingredients.length + ') - bitte überprüfen');
  }
  
  if (source === 'generic') {
    if (quality === 'high') quality = 'medium';
    warnings.push('Kein Standard-Rezeptformat gefunden - generischer Parser verwendet');
  }
  
  if (!recipe.steps || recipe.steps.length < 50) {
    if (quality === 'high') quality = 'medium';
    warnings.push('Zubereitungsschritte fehlen oder sind unvollständig');
  }
  
  // Check for ingredients without amounts
  const noAmountCount = recipe.ingredients.filter(function(i) { return !i.amount; }).length;
  if (noAmountCount > recipe.ingredients.length / 2) {
    if (quality === 'high') quality = 'medium';
    warnings.push('Viele Zutaten ohne Mengenangabe (' + noAmountCount + ' von ' + recipe.ingredients.length + ')');
  }
  
  return { recipe: recipe, warnings: warnings, quality: quality, source: source };
}

// WordPress Recipe Maker (WPRM) and similar plugins
function parseWPRMRecipe(doc) {
  const NL = String.fromCharCode(10);
  let name = '';
  let servings = 4;
  const ingredients = [];
  let steps = '';
  
  // Try WPRM format
  const wprmContainer = doc.querySelector('.wprm-recipe, .wprm-recipe-container, [class*="wprm-recipe"]');
  if (wprmContainer) {
    // Name
    const nameEl = wprmContainer.querySelector('.wprm-recipe-name, .wprm-recipe-title, h2');
    if (nameEl) name = nameEl.textContent.trim();
    
    // Servings
    const servingsEl = wprmContainer.querySelector('.wprm-recipe-servings, [class*="servings"]');
    if (servingsEl) {
      const match = servingsEl.textContent.match(/\d+/);
      if (match) servings = parseInt(match[0]);
    }
    
    // Ingredients
    wprmContainer.querySelectorAll('.wprm-recipe-ingredient, [class*="ingredient"]').forEach(function(el) {
      const amountEl = el.querySelector('.wprm-recipe-ingredient-amount, [class*="amount"]');
      const unitEl = el.querySelector('.wprm-recipe-ingredient-unit, [class*="unit"]');
      const nameEl = el.querySelector('.wprm-recipe-ingredient-name, [class*="name"]');
      
      if (nameEl) {
        ingredients.push({
          name: nameEl.textContent.trim(),
          amount: amountEl ? parseAmount(amountEl.textContent.trim()) : '',
          unit: unitEl ? unitEl.textContent.trim() : ''
        });
      } else {
        // Fallback: parse the whole text
        const text = el.textContent.trim();
        if (text && text.length > 1) {
          const parsed = parseIngredientString(text);
          if (parsed && parsed.name) ingredients.push(parsed);
        }
      }
    });
    
    // Instructions
    const stepTexts = [];
    wprmContainer.querySelectorAll('.wprm-recipe-instruction, [class*="instruction"]').forEach(function(el) {
      const text = el.textContent.trim();
      if (text && text.length > 5) stepTexts.push(text);
    });
    steps = stepTexts.join(NL + NL);
  }
  
  // Try Tasty Recipes format
  if (ingredients.length === 0) {
    const tastyContainer = doc.querySelector('.tasty-recipes, .tasty-recipe, [class*="tasty-recipe"]');
    if (tastyContainer) {
      const nameEl = tastyContainer.querySelector('.tasty-recipes-title, h2');
      if (nameEl) name = nameEl.textContent.trim();
      
      tastyContainer.querySelectorAll('.tasty-recipes-ingredients li, .tasty-recipe-ingredients li').forEach(function(el) {
        const text = el.textContent.trim();
        if (text) {
          const parsed = parseIngredientString(text);
          if (parsed && parsed.name) ingredients.push(parsed);
        }
      });
      
      const stepTexts = [];
      tastyContainer.querySelectorAll('.tasty-recipes-instructions li, .tasty-recipe-instructions li').forEach(function(el) {
        const text = el.textContent.trim();
        if (text && text.length > 5) stepTexts.push(text);
      });
      steps = stepTexts.join(NL + NL);
    }
  }
  
  // Try generic recipe card format
  if (ingredients.length === 0) {
    const recipeCard = doc.querySelector('.recipe-card, .recipe-box, [class*="recipe-card"], [class*="rezept"]');
    if (recipeCard) {
      const nameEl = recipeCard.querySelector('h1, h2, .title, .recipe-title');
      if (nameEl) name = nameEl.textContent.trim();
      
      recipeCard.querySelectorAll('li, .ingredient').forEach(function(el) {
        const text = el.textContent.trim();
        // Check if it looks like an ingredient (has numbers or common units)
        if (text && text.length > 2 && text.length < 150 && /\d|EL|TL|g\b|ml|Prise|Stück/i.test(text)) {
          const parsed = parseIngredientString(text);
          if (parsed && parsed.name && parsed.name.length > 1) {
            if (!ingredients.find(function(i) { return i.name === parsed.name; })) {
              ingredients.push(parsed);
            }
          }
        }
      });
    }
  }
  
  if (ingredients.length === 0) return null;
  if (!name) name = doc.querySelector('h1') ? doc.querySelector('h1').textContent.trim() : 'Importiertes Rezept';
  
  const rawText = generateCooklangFromIngredientsWithNL(name, ingredients, steps, NL);
  return { name: name, servings: servings, ingredients: ingredients, steps: steps, rawText: rawText };
}

function parseJsonLdRecipe(data) {
  const name = data.name || 'Importiertes Rezept';
  const NL = String.fromCharCode(10);
  const NLNL = NL + NL;
  
  let servings = 4;
  if (data.recipeYield) {
    const yieldStr = Array.isArray(data.recipeYield) ? data.recipeYield[0] : data.recipeYield;
    const match = String(yieldStr).match(/\d+/);
    if (match) servings = parseInt(match[0]);
  }
  
  const ingredients = [];
  if (data.recipeIngredient && Array.isArray(data.recipeIngredient)) {
    for (const ing of data.recipeIngredient) {
      const parsed = parseIngredientString(ing);
      if (parsed) ingredients.push(parsed);
    }
  }
  
  let steps = '';
  if (data.recipeInstructions) {
    if (Array.isArray(data.recipeInstructions)) {
      steps = data.recipeInstructions.map(function(step) {
        if (typeof step === 'string') return step.trim();
        if (step.text) return step.text.trim();
        if (step.itemListElement) return step.itemListElement.map(function(s) { return (s.text || s).trim(); }).join(NLNL);
        return '';
      }).filter(function(s) { return s; }).join(NLNL);
    } else if (typeof data.recipeInstructions === 'string') {
      steps = data.recipeInstructions;
    }
  }
  
  const rawText = generateCooklangFromIngredientsWithNL(name, ingredients, steps, NL);
  return { name: name, servings: servings, ingredients: ingredients, steps: steps, rawText: rawText };
}

function parseIngredientString(str) {
  if (!str || typeof str !== 'string') return null;
  str = str.trim().replace(/\s+/g, ' ');
  
  // Skip if too short or too long
  if (str.length < 2 || str.length > 200) return null;
  
  // Skip if it looks like a header or instruction
  if (/^(für|zutaten|ingredients|zubereitung|schritt|step)\s*:?$/i.test(str)) return null;
  
  // Pattern 1: "500 g Hackfleisch" or "2 EL Olivenöl"
  const pattern1 = /^([\d.,\/½¼¾⅓⅔\-–]+)\s*(g|kg|ml|l|cl|dl|EL|TL|Stück|Stk|Prise|Prisen|Bund|Packung|Pkg|Dose|Dosen|Glas|Becher|Scheiben?|Zehen?|Stangen?|Blätter?|Zweige?|Handvoll|Tasse|Tassen|Cup|Cups)?\s+(.+)$/i;
  
  // Pattern 2: "1 große Zwiebel" (number + adjective + noun)
  const pattern2 = /^([\d.,\/½¼¾⅓⅔\-–]+)\s+(kleine?|große?|mittlere?|große|kleine|frische?|getrocknete?)\s+(.+)$/i;
  
  // Pattern 3: "Salz und Pfeffer" (no amount)
  const pattern3 = /^([A-Za-zÄÖÜäöüß][A-Za-zÄÖÜäöüß\s,&]+)$/;
  
  let match = str.match(pattern1);
  if (match) {
    return {
      name: match[3].trim(),
      amount: parseAmount(match[1]),
      unit: match[2] || ''
    };
  }
  
  match = str.match(pattern2);
  if (match) {
    return {
      name: match[2] + ' ' + match[3].trim(),
      amount: parseAmount(match[1]),
      unit: 'Stück'
    };
  }
  
  // Try to extract amount from beginning
  const amountMatch = str.match(/^([\d.,\/½¼¾⅓⅔\-–]+)\s+(.+)$/);
  if (amountMatch) {
    return {
      name: amountMatch[2].trim(),
      amount: parseAmount(amountMatch[1]),
      unit: ''
    };
  }
  
  // No amount found - just the ingredient name
  if (pattern3.test(str) && str.length > 2) {
    return { name: str, amount: '', unit: '' };
  }
  
  return { name: str, amount: '', unit: '' };
}

function parseAmount(str) {
  if (!str) return '';
  str = String(str).trim();
  
  // Convert Unicode fractions
  str = str.replace('½', '0.5').replace('¼', '0.25').replace('¾', '0.75')
           .replace('⅓', '0.33').replace('⅔', '0.67').replace('⅛', '0.125');
  
  // Handle ranges like "1-2" or "1–2" -> take average or first
  if (/[\-–]/.test(str)) {
    const parts = str.split(/[\-–]/);
    if (parts.length === 2) {
      const a = parseFloat(parts[0].replace(',', '.'));
      const b = parseFloat(parts[1].replace(',', '.'));
      if (!isNaN(a) && !isNaN(b)) return String((a + b) / 2);
      if (!isNaN(a)) return String(a);
    }
  }
  
  // Handle fractions like "1/2"
  if (str.includes('/')) {
    const parts = str.split('/');
    if (parts.length === 2) {
      const num = parseFloat(parts[0].replace(',', '.'));
      const denom = parseFloat(parts[1].replace(',', '.'));
      if (!isNaN(num) && !isNaN(denom) && denom !== 0) return String(num / denom);
    }
  }
  
  str = str.replace(',', '.');
  const num = parseFloat(str);
  return isNaN(num) ? '' : String(num);
}

function generateCooklangFromIngredients(name, ingredients, steps) {
  const NL = String.fromCharCode(10);
  return generateCooklangFromIngredientsWithNL(name, ingredients, steps, NL);
}

function generateCooklangFromIngredientsWithNL(name, ingredients, steps, NL) {
  let lines = ['-- ' + name, ''];
  for (const ing of ingredients) {
    if (ing.amount && ing.unit) lines.push('@' + ing.name + '{' + ing.amount + '%' + ing.unit + '}');
    else if (ing.amount) lines.push('@' + ing.name + '{' + ing.amount + '}');
    else lines.push('@' + ing.name + '{}');
  }
  if (steps) { 
    lines.push(''); 
    lines.push('-- Zubereitung'); 
    const NLNL = NL + NL;
    const stepParagraphs = steps.split(new RegExp(NL + NL + '+'));
    stepParagraphs.forEach(function(para) {
      if (para.trim()) lines.push(para.trim());
    });
  }
  return lines.join(NL);
}

function parseChefkochRecipe(doc) {
  const name = doc.querySelector('h1') ? doc.querySelector('h1').textContent.trim() : 'Chefkoch Rezept';
  const NL = String.fromCharCode(10);
  let servings = 4;
  const ingredients = [];
  doc.querySelectorAll('[class*="ingredient"], .ingredients td').forEach(function(el) {
    const text = el.textContent ? el.textContent.trim() : '';
    if (text && text.length > 1) {
      const parsed = parseIngredientString(text);
      if (parsed && parsed.name) ingredients.push(parsed);
    }
  });
  let steps = '';
  const stepElements = doc.querySelectorAll('[class*="instruction"] li, [class*="preparation"] li, .recipe-steps li, [class*="step"]');
  if (stepElements.length > 0) {
    const stepTexts = [];
    stepElements.forEach(function(el) {
      const text = el.textContent ? el.textContent.trim() : '';
      if (text && text.length > 10) stepTexts.push(text);
    });
    steps = stepTexts.join(NL + NL);
  } else {
    const stepsEl = doc.querySelector('[class*="instructions"], [class*="preparation"], .recipe-text');
    if (stepsEl) steps = stepsEl.textContent ? stepsEl.textContent.trim() : '';
  }
  const rawText = generateCooklangFromIngredientsWithNL(name, ingredients, steps, NL);
  return { name: name, servings: servings, ingredients: ingredients, steps: steps, rawText: rawText };
}

function parseGenericRecipeImproved(doc) {
  const NL = String.fromCharCode(10);
  let name = doc.querySelector('h1') ? doc.querySelector('h1').textContent.trim() : 
             (doc.querySelector('title') ? doc.querySelector('title').textContent.split('|')[0].split('-')[0].trim() : 'Importiertes Rezept');
  let servings = 4;
  const ingredients = [];
  
  // Strategy 1: Look for lists near "Zutaten" or "Ingredients" headers
  const headers = doc.querySelectorAll('h2, h3, h4, strong, b');
  headers.forEach(function(header) {
    const headerText = header.textContent.toLowerCase();
    if (headerText.includes('zutat') || headerText.includes('ingredient')) {
      // Find the next list or container
      let sibling = header.nextElementSibling;
      let attempts = 0;
      while (sibling && attempts < 5) {
        if (sibling.tagName === 'UL' || sibling.tagName === 'OL') {
          sibling.querySelectorAll('li').forEach(function(li) {
            const text = li.textContent.trim();
            if (text && text.length > 2 && text.length < 150) {
              const parsed = parseIngredientString(text);
              if (parsed && parsed.name && !ingredients.find(function(i) { return i.name === parsed.name; })) {
                ingredients.push(parsed);
              }
            }
          });
          break;
        }
        sibling = sibling.nextElementSibling;
        attempts++;
      }
    }
  });
  
  // Strategy 2: Look for common ingredient container classes
  if (ingredients.length < 3) {
    const selectors = [
      '[class*="ingredient"] li',
      '[class*="zutat"] li', 
      '.recipe-ingredients li',
      '.ingredients-list li',
      '[class*="recipe"] ul li',
      'ul[class*="ingredient"] li',
      '.entry-content ul li'
    ];
    
    for (const selector of selectors) {
      doc.querySelectorAll(selector).forEach(function(el) {
        const text = el.textContent.trim();
        if (text && text.length > 2 && text.length < 150) {
          // Check if it looks like an ingredient
          if (/\d|EL|TL|g\b|kg|ml|Prise|Stück|Bund|Dose/i.test(text) || 
              /^[A-ZÄÖÜ]/.test(text)) {
            const parsed = parseIngredientString(text);
            if (parsed && parsed.name && parsed.name.length > 1) {
              if (!ingredients.find(function(i) { return i.name === parsed.name; })) {
                ingredients.push(parsed);
              }
            }
          }
        }
      });
      if (ingredients.length >= 5) break;
    }
  }
  
  // Strategy 3: Look for any list items that look like ingredients
  if (ingredients.length < 3) {
    doc.querySelectorAll('li').forEach(function(el) {
      const text = el.textContent.trim();
      // Must have a number and common food-related words or units
      if (text && text.length > 3 && text.length < 100 && 
          /^\d/.test(text) && 
          /g\b|kg|ml|l\b|EL|TL|Stück|Prise/i.test(text)) {
        const parsed = parseIngredientString(text);
        if (parsed && parsed.name && parsed.name.length > 1) {
          if (!ingredients.find(function(i) { return i.name === parsed.name; })) {
            ingredients.push(parsed);
          }
        }
      }
    });
  }
  
  // Find steps
  let steps = '';
  const stepHeaders = doc.querySelectorAll('h2, h3, h4, strong, b');
  stepHeaders.forEach(function(header) {
    const headerText = header.textContent.toLowerCase();
    if (headerText.includes('zubereitung') || headerText.includes('anleitung') || 
        headerText.includes('instruction') || headerText.includes('preparation')) {
      let sibling = header.nextElementSibling;
      let attempts = 0;
      while (sibling && attempts < 5) {
        if (sibling.tagName === 'OL' || sibling.tagName === 'UL') {
          const stepTexts = [];
          sibling.querySelectorAll('li').forEach(function(li) {
            const text = li.textContent.trim();
            if (text && text.length > 10) stepTexts.push(text);
          });
          if (stepTexts.length > 0) {
            steps = stepTexts.join(NL + NL);
            return;
          }
        } else if (sibling.tagName === 'P' || sibling.tagName === 'DIV') {
          const text = sibling.textContent.trim();
          if (text && text.length > 50) {
            steps = text;
            return;
          }
        }
        sibling = sibling.nextElementSibling;
        attempts++;
      }
    }
  });
  
  if (ingredients.length === 0) return null;
  
  const rawText = generateCooklangFromIngredientsWithNL(name, ingredients, steps, NL);
  return { name: name, servings: servings, ingredients: ingredients, steps: steps, rawText: rawText };
}
