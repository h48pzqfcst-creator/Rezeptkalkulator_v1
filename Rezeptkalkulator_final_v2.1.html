<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezeptkalkulator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ebe1;
    --border: #d9cdb8;
    --border2: #ede6d8;
    --accent: #5c3d1e;
    --accent2: #a0622a;
    --accent3: #d4884a;
    --green: #3a6b4a;
    --green2: #e8f4ec;
    --red: #a83228;
    --red2: #fdecea;
    --text: #1e160a;
    --text2: #6b5940;
    --text3: #998570;
    --shadow: 0 2px 12px rgba(92,61,30,0.08);
    --shadow2: 0 4px 24px rgba(92,61,30,0.14);
    --radius: 10px;
    --transition: all 0.18s ease;
  }
  html, body { height: 100%; font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
  
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* LAYOUT */
  #app { display: flex; height: 100vh; overflow: hidden; }
  
  /* SIDEBAR */
  #sidebar {
    width: 230px; min-width: 230px; background: var(--accent);
    display: flex; flex-direction: column;
    padding: 0; overflow: hidden;
  }
  #sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #sidebar-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-style: italic;
    color: #fdf6ec; font-weight: 400; line-height: 1.2;
    letter-spacing: 0.02em;
  }
  #sidebar-logo p { font-size: 11px; color: rgba(253,246,236,0.5); margin-top: 3px; letter-spacing: 0.05em; text-transform: uppercase; }
  #sidebar-nav { padding: 12px 10px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 7px; cursor: pointer;
    color: rgba(253,246,236,0.7); font-size: 14px; font-weight: 400;
    transition: var(--transition); margin-bottom: 2px; border: none;
    background: transparent; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.1); color: #fdf6ec; }
  .nav-item.active { background: rgba(255,255,255,0.18); color: #fdf6ec; font-weight: 500; }
  .nav-item svg { opacity: 0.8; flex-shrink: 0; }
  .nav-section-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(253,246,236,0.35); padding: 14px 12px 5px; }
  #sidebar-footer { padding: 14px 10px; border-top: 1px solid rgba(255,255,255,0.1); }
  .storage-info { font-size: 11px; color: rgba(253,246,236,0.4); padding: 6px 12px; }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    height: 58px; background: var(--surface); border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(92,61,30,0.05);
  }
  #topbar-title { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--accent); }
  #topbar-actions { display: flex; gap: 8px; align-items: center; }
  #content { flex: 1; overflow-y: auto; padding: 28px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 7px; border: 1.5px solid; font-family: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: var(--transition); text-decoration: none; white-space: nowrap; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fdf6ec; }
  .btn-primary:hover { background: #4a3018; border-color: #4a3018; }
  .btn-secondary { background: var(--accent2); border-color: var(--accent2); color: white; }
  .btn-secondary:hover { background: #8a5020; }
  .btn-outline { background: white; border-color: var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent2); color: var(--accent); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text3); padding: 6px 10px; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .btn-danger { background: white; border-color: var(--border); color: var(--red); }
  .btn-danger:hover { background: var(--red); border-color: var(--red); color: white; }
  .btn-green { background: var(--green); border-color: var(--green); color: white; }
  .btn-green:hover { background: #2d5438; }
  .btn-sm { padding: 5px 12px; font-size: 12.5px; }
  .btn-xs { padding: 3px 9px; font-size: 12px; }

  /* INPUTS */
  input[type=text], input[type=number], textarea, select {
    font-family: inherit; font-size: 14px;
    border: 1.5px solid var(--border); border-radius: 7px;
    padding: 8px 12px; background: white; color: var(--text);
    transition: var(--transition); width: 100%;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(160,98,42,0.1); }
  label.field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.03em; text-transform: uppercase; }
  .field { margin-bottom: 16px; }

  /* CARDS */
  .card { background: var(--surface); border: 1.5px solid var(--border2); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
  .card-sm { padding: 14px 18px; }

  /* TAGS / BADGES */
  .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 500; gap: 4px; }
  .badge-warm { background: #f5ede0; color: var(--accent2); border: 1px solid #e8d5ba; }
  .badge-manual { background: #e8f4e8; color: #2d7a2d; border: 1px solid #b8ddb8; font-weight:700; cursor: pointer; transition: var(--transition); }
  .badge-manual:hover { background: #d0e8d0; }
  .badge-green { background: var(--green2); color: var(--green); border: 1px solid #b8ddc4; }
  .badge-red { background: var(--red2); color: var(--red); border: 1px solid #f5c0b8; }
  .badge-gray { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .badge-blue { background: #e8f0f8; color: #2c5f8a; border: 1px solid #b8cfe0; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--border2); }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border2); font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(240,235,225,0.4); }

  /* FOLDER / GROUP */
  .recipe-group { margin-bottom: 24px; }
  .recipe-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 8px;
    cursor: pointer; margin-bottom: 10px;
    font-weight: 600; font-size: 14px; color: var(--accent);
    transition: var(--transition);
  }
  .recipe-group-header:hover { background: #e8e0d0; }
  .recipe-group-header .group-toggle { margin-left: auto; color: var(--text3); font-size: 12px; }
  .recipe-group-header .group-count { font-size: 12px; color: var(--text3); font-weight: 400; }

  /* RECIPE CARD */
  .recipe-card {
    background: white; border: 1.5px solid var(--border2); border-radius: 9px;
    margin-bottom: 10px; overflow: hidden;
    box-shadow: var(--shadow); transition: var(--transition);
    border-left: 4px solid var(--border);
  }
  .recipe-card.selected { border-left-color: var(--green); }
  .recipe-card:hover { box-shadow: var(--shadow2); }

  /* Focus states for simple mode ingredient fields */
  #simple-ingredients-list input:focus,
  #simple-ingredients-list select:focus {
    outline: none;
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.15) !important;
  }
  
  #simple-ingredients-list select:focus {
    background-color: #fdf6ec !important;
  }
  .recipe-card-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; }
  .recipe-card-body { padding: 0 18px 14px; border-top: 1px solid var(--border2); margin-top: 4px; }
  .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 17px; font-style: italic; color: var(--accent); flex: 1; }
  .ingredient-pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); margin: 3px 3px 0 0; }
  .ingredient-pill.overridden { background: #fdf3e0; border-color: var(--accent3); color: #7a4f00; }

  /* PERSON STEPPER */
  .person-stepper { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--border); border-radius: 7px; overflow: hidden; background: white; }
  .person-stepper button { width: 32px; height: 32px; border: none; background: var(--surface2); color: var(--accent); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
  .person-stepper button:hover { background: var(--border); }
  .person-stepper input { width: 52px; border: none; text-align: center; font-weight: 600; font-size: 15px; padding: 4px; border-radius: 0; box-shadow: none; }
  .person-stepper input:focus { box-shadow: none; border-color: transparent; }

  /* EDITOR */
  .code-editor { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.8; min-height: 280px; resize: vertical; background: #1e160a; color: #f0e6d0; border: none; border-radius: 8px; padding: 16px; }
  .code-editor:focus { box-shadow: 0 0 0 3px rgba(160,98,42,0.3); border-color: var(--accent2); }
  .syntax-hint { background: #2a1f0e; color: #b8967a; border-radius: 8px; padding: 14px 16px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.9; }
  .syntax-hint .comment { color: #6b5940; }
  .syntax-hint .ingredient { color: #d4884a; }
  .syntax-hint .amount { color: #7aaa88; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border2); margin-bottom: 20px; }
  .tab { padding: 9px 20px; border: none; background: transparent; font-family: inherit; font-size: 14px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); font-weight: 500; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent2); }

  /* SHOPPING LIST */
  .shopping-category { margin-bottom: 20px; }
  .shopping-category-header { display: flex; align-items: center; gap: 10px; padding: 8px 0; margin-bottom: 10px; border-bottom: 2px solid var(--border2); }
  .shopping-category-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); font-style: italic; }
  .shopping-item { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 12px; padding: 10px 14px; border-radius: 7px; margin-bottom: 5px; background: white; border: 1px solid var(--border2); }
  .shopping-item:hover { border-color: var(--border); }
  .shopping-check { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  .shopping-item.checked .shopping-name { text-decoration: line-through; color: var(--text3); }
  .shopping-amount { font-weight: 600; color: var(--accent); min-width: 60px; flex-shrink: 0; }
  .shopping-name { flex: 1; }
  .shopping-recipe-tag { font-size: 11.5px; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 12px; cursor: pointer; transition: var(--transition); }
  .shopping-recipe-tag:hover { background: var(--border); color: var(--accent); }
  .shopping-mealplan-tag { font-size: 11.5px; color: #5c6bc0; background: #e8eaf6; padding: 2px 8px; border-radius: 12px; cursor: pointer; transition: var(--transition); }
  .shopping-mealplan-tag:hover { background: #c5cae9; color: #3949ab; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(30,22,10,0.5); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: white; border-radius: 14px; padding: 28px; max-width: 860px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(30,22,10,0.3); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--accent); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border2); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 64px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 52px; margin-bottom: 14px; opacity: 0.6; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* CHECKBOX TOGGLE */
  .toggle-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle-check input { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border2); margin: 18px 0; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* OVERRIDE INLINE FORM */
  .override-form { display: flex; align-items: center; gap: 6px; }
  .override-form input[type=number] { width: 80px; padding: 5px 8px; font-size: 13px; }
  .override-form select { width: 90px; padding: 5px 8px; font-size: 13px; }

  /* INFO BOX */
  .info-box { background: #fdf8f0; border: 1.5px solid #e8d5ba; border-radius: 8px; padding: 14px 16px; font-size: 13.5px; color: var(--text2); line-height: 1.6; }
  .info-box.green { background: var(--green2); border-color: #b8ddc4; color: #2d5438; }

  /* PRINT */
  @media print {
    /* Verstecke alles außer dem Print-Overlay */
    #sidebar, #topbar, #content, #main, body > div:not(#print-overlay) {
      display: none !important;
    }
    
    /* Print-Overlay zeigen */
    #print-overlay {
      position: static !important;
      inset: auto !important;
      background: white !important;
      z-index: auto !important;
      overflow: visible !important;
      display: flex !important;
      flex-direction: column !important;
      width: 100% !important;
      height: auto !important;
    }
    
    /* Toolbar nicht drucken */
    #print-overlay .print-toolbar {
      display: none !important;
    }
    
    /* Inner-Container druckbar */
    #print-overlay > div {
      overflow: visible !important;
      max-width: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    
    /* Rezept-Blöcke */
    [style*="page-break-after:always"] {
      page-break-after: always !important;
      page-break-inside: avoid !important;
    }
    
    /* Allgemeine Styles */
    .btn { display: none !important; }
    .no-print { display: none !important; }
    
    /* Exact Color Adjust */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  }

  /* ANIMATIONS */
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeSlide 0.22s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal { animation: modalIn 0.2s ease; }

  /* DRAG OVER */
  .drag-over { border: 2px dashed var(--accent2) !important; background: #fdf8f0 !important; }

  /* SECTION TITLE */
  .section-title { font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; color: var(--accent); margin-bottom: 6px; }
  .section-subtitle { font-size: 13.5px; color: var(--text3); margin-bottom: 24px; }

  /* CATEGORY COLOR DOTS */
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(-50%) translateY(0); }
  to { opacity: 0; transform: translateX(-50%) translateY(20px); }
}
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-logo">
      <h1>Rezept&shy;kalkulator</h1>
      <p>Professionelle Mengenplanung</p>
    </div>
    <div id="sidebar-nav">
      <div class="nav-section-label">Hauptmenü</div>
      <button class="nav-item" onclick="showView('guide')" id="nav-guide">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H12m6-12a2.5 2.5 0 012.5 2.5V12m0 0a2.5 2.5 0 01-2.5 2.5M20.5 12a2.5 2.5 0 00-2.5-2.5M20.5 12a2.5 2.5 0 012.5 2.5M3 12a9 9 0 1118 0m-9 0a9 9 0 01-9-9m9 9a9 9 0 019 9"/></svg>
        Anleitung
      </button>
      <button class="nav-item active" onclick="showView('overview')" id="nav-overview">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Übersicht
      </button>
      <button class="nav-item" onclick="showView('recipe-new')" id="nav-recipe-new">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Neues Rezept
      </button>
      <button class="nav-item" onclick="showView('breakfast')" id="nav-breakfast">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        Frühstück
      </button>
      
      <div class="nav-section-label">Tools</div>
      <button class="nav-item" onclick="showView('shopping')" id="nav-shopping">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Einkaufsliste
      </button>
      <button class="nav-item" onclick="showView('instructions')" id="nav-instructions">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Zubereitung
      </button>
      <button class="nav-item" onclick="showView('manual-shopping')" id="nav-manual-shopping">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Manuell hinzufügen
      </button>
      <button class="nav-item" onclick="showView('database')" id="nav-database">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        Zutatendatenbank
      </button>
      <button class="nav-item" onclick="showView('costs')" id="nav-costs">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Kostenkalkulation
      </button>

// Add custom allergen
function addCustomAllergen() {
  const input = document.getElementById('custom-allergen-input');
  if (!input) return;
  
  const allergen = input.value.trim();
  if (!allergen) return;
  
  if (!editorState.customAllergens) editorState.customAllergens = [];
  
  // Prüfe ob bereits vorhanden
  if (editorState.customAllergens.includes(allergen)) {
    showToast('Diese Allergie ist bereits hinzugefügt', 'warning');
    return;
  }
  
  editorState.customAllergens.push(allergen);
  input.value = '';
  renderCustomAllergensEditor();
  
  // Füge auch zu globaler Liste hinzu für Filter
  if (!STATE.customAllergensList) STATE.customAllergensList = [];
  if (!STATE.customAllergensList.includes(allergen)) {
    STATE.customAllergensList.push(allergen);
    saveState();
  }

// Remove custom allergen from recipe

  if (!editorState.customAllergens) return;
  editorState.customAllergens = editorState.customAllergens.filter(a => a !== allergen);

}

// Toggle diet option in editor

    editorState.dietOptions.push(optionId);

  const opt = DIET_OPTIONS.find(o => o.id === optionId);
  const checkbox = document.getElementById('diet-' + optionId);

    label.style.borderColor = isChecked ? opt.color : 'var(--border)';
    label.style.background = isChecked ? opt.color + '15' : 'white';
  }
}

// Get list of standard units (unique values)
function getStandardUnits() {
  const units = new Set(Object.values(STATE.unitDB || DEFAULT_UNIT_DB));
  return [...units].sort();
}

// Normalize a unit using the database
function normalizeUnitFromDB(unit) {
  if (!unit) return null;
  const lower = unit.toLowerCase().trim();
  const db = STATE.unitDB || DEFAULT_UNIT_DB;
  
  // Direct match
  if (db[lower]) return db[lower];
  
  // Check if it's already a standard unit
  const standards = new Set(Object.values(db));
  if (standards.has(unit)) return unit;
  
  // No match found
  return null;
}

// Check if unit is known
function isKnownUnit(unit) {
  if (!unit) return true; // No unit is OK
  return normalizeUnitFromDB(unit) !== null;
}



// Check recipe for unknown units and show dialog if needed
function checkUnknownUnits(recipe, callback) {
  const { ingredients } = parseCooklang(recipe.rawText);
  const unknownUnits = [];
  
  for (const ing of ingredients) {
    if (ing.unit && !isKnownUnit(ing.unit)) {
      // Check if already in our list
      if (!unknownUnits.find(u => u.original.toLowerCase() === ing.unit.toLowerCase())) {
        // Find the context (line where this ingredient is used)
        const context = findIngredientContext(recipe.rawText, ing.name);
        unknownUnits.push({
          original: ing.unit,
          ingredient: ing.name,
          suggestion: findSimilarUnit(ing.unit),
          recipeName: recipe.name,
          context: context
        });
      }
    }
  }
  
  if (unknownUnits.length === 0) {
    callback(recipe);
    return;
  }
  
  // Store queue and callback
  unknownUnitQueue = unknownUnits;
  pendingUnitCallback = callback;
  window._pendingRecipeForUnits = recipe;
  
  showUnknownUnitDialog(0);
}

// Find the context line where an ingredient is used
function findIngredientContext(rawText, ingredientName) {
  const lines = rawText.split('\n');
  const contexts = [];
  
  for (const line of lines) {
    // Skip metadata lines
    if (line.trim().startsWith('>>') || line.trim().startsWith('--')) continue;
    
    // Check if this line contains the ingredient
    const lowerLine = line.toLowerCase();
    const lowerIng = ingredientName.toLowerCase();
    
    if (lowerLine.includes('@' + lowerIng) || lowerLine.includes(lowerIng)) {
      // Clean up the line for display (remove cooklang syntax)
      let cleanLine = line
        .replace(/@([^{]+)\{[^}]*\}/g, '$1')  // @ingredient{amount} -> ingredient
        .replace(/@([^\s{]+)/g, '$1')           // @ingredient -> ingredient
        .replace(/#([^{]+)\{[^}]*\}/g, '$1')   // #cookware{} -> cookware
        .replace(/#([^\s{]+)/g, '$1')           // #cookware -> cookware
        .replace(/~\{[^}]*\}/g, '')            // ~{timer} -> remove
        .replace(/~([^{]+)\{[^}]*\}/g, '$1')   // ~name{timer} -> name
        .trim();
      
      if (cleanLine.length > 0) {
        contexts.push(cleanLine);
      }
    }
  }
  
  // Return first context or null
  return contexts.length > 0 ? contexts[0] : null;
}



// Get recipe steps for display in unit dialog
function getRecipeStepsForDisplay(rawText) {
  if (!rawText) return [];
  
  const lines = rawText.split('\n');
  const steps = [];
  let foundSteps = false;
  
  for (const line of lines) {
    const trimmed = line.trim();
    // Skip empty lines and metadata
    if (!trimmed) continue;
    if (trimmed.startsWith('>>')) continue;
    if (trimmed.startsWith('--')) {
      foundSteps = true; // After -- separator, we have steps
      continue;
    }
    
    // If we haven't found the separator yet, check if this looks like an ingredient line only
    // Ingredient-only lines start with @ and have no other text
    if (!foundSteps) {
      const isIngredientOnly = /^@[^\s]+\{[^}]*\}$/.test(trimmed);
      if (isIngredientOnly) continue;
    }
    
    // Clean up cooklang syntax for display
    let cleanLine = trimmed
      .replace(/@([^{]+)\{([^}]*)\}/g, (_, name, amount) => {
        // Highlight ingredient with amount
        const amountStr = amount ? amount.replace('%', ' ').trim() : '';
        return '<strong style="color:var(--accent2);">' + name.trim() + '</strong>' + 
               (amountStr ? ' <span style="color:var(--accent);font-size:0.9em;">(' + amountStr + ')</span>' : '');
      })
      .replace(/@([^\s{]+)/g, '<strong style="color:var(--accent2);">$1</strong>')
      .replace(/#([^{]+)\{[^}]*\}/g, '$1')
      .replace(/#([^\s{]+)/g, '$1')
      .replace(/~\{([^}]*)\}/g, '<span style="color:#1976d2;">⏱ $1</span>')
      .replace(/~([^{]+)\{([^}]*)\}/g, '<span style="color:#1976d2;">⏱ $1 $2</span>');
    
    // Only add if there's meaningful content (not just whitespace or empty after cleaning)
    if (cleanLine.trim().length > 0) {
      steps.push({
        text: cleanLine,
        highlight: false
      });
    }
  }
  
  return steps;
}

// Find the original ingredient line in raw text
function findIngredientLine(rawText, ingredientName, unit) {
  const lines = rawText.split('\n');
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Look for @ingredient{amount%unit} pattern
    const regex = new RegExp('@' + escapeRegex(ingredientName) + '\\{[^}]*%' + escapeRegex(unit) + '\\}', 'i');
    if (regex.test(line)) {
      // Extract the full ingredient reference
      const match = line.match(new RegExp('@' + escapeRegex(ingredientName) + '\\{[^}]*\\}', 'i'));
      if (match) {
        return {
          lineIndex: i,
          original: match[0],
          fullLine: line
        };
      }
    }
  }
  
  // Try simpler pattern @ingredient{amount unit}
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.toLowerCase().includes('@' + ingredientName.toLowerCase()) && 
        line.toLowerCase().includes(unit.toLowerCase())) {
      const match = line.match(new RegExp('@[^{\\s]+\\{[^}]*' + escapeRegex(unit) + '[^}]*\\}', 'i'));
      if (match) {
        return {
          lineIndex: i,
          original: match[0],
          fullLine: line
        };
      }
    }
  }
  
  return null;
}

// Apply direct edit to recipe
function applyDirectEdit(index, originalText) {
  const newText = document.getElementById('direct-edit-line').value.trim();
  
  if (!newText) {
    alert('Bitte einen neuen Wert eingeben.');
    return;
  }
  
  const recipe = window._pendingRecipeForUnits;
  if (recipe) {
    // Replace the original text with the new text
    recipe.rawText = recipe.rawText.replace(originalText, newText);
    
    // Re-parse to check if the unit is now known
    const { ingredients } = parseCooklang(recipe.rawText);
    const item = unknownUnitQueue[index];
    
    // Check if this ingredient still has an unknown unit
    const stillUnknown = ingredients.some(ing => 
      ing.name.toLowerCase() === item.ingredient.toLowerCase() && 
      ing.unit && !isKnownUnit(ing.unit)
    );
    
    if (stillUnknown) {
      // Update the queue item with new unit info
      const updatedIng = ingredients.find(ing => 
        ing.name.toLowerCase() === item.ingredient.toLowerCase()
      );
      if (updatedIng && updatedIng.unit) {
        unknownUnitQueue[index].original = updatedIng.unit;
        unknownUnitQueue[index].suggestion = findSimilarUnit(updatedIng.unit);
      }
    }
  }
  
  closeModal();
  
  // Move to next or finish
  showUnknownUnitDialog(index + 1);
}

// Find similar unit suggestion
function findSimilarUnit(unit) {
  const lower = unit.toLowerCase();
  const db = STATE.unitDB || DEFAULT_UNIT_DB;
  
  // Check for partial matches
  for (const [key, standard] of Object.entries(db)) {
    if (key.includes(lower) || lower.includes(key)) {
      return standard;
    }
  }
  
  // Check if it looks like a known pattern
  if (lower.includes('stück') || lower.includes('stk')) return 'Stk';
  if (lower.includes('gramm') || lower === 'gr') return 'g';
  if (lower.includes('liter')) return 'l';
  if (lower.includes('löffel')) return lower.includes('tee') ? 'TL' : 'EL';
  
  return null;
}

// Show dialog for unknown unit
function showUnknownUnitDialog(index) {
  if (index >= unknownUnitQueue.length) {
    // All units processed, continue with callback
    const recipe = window._pendingRecipeForUnits;
    window._pendingRecipeForUnits = null;
    unknownUnitQueue = [];
    
    if (pendingUnitCallback) {
      pendingUnitCallback(recipe);
      pendingUnitCallback = null;
    }
    return;
  }
  
  const item = unknownUnitQueue[index];
  const remaining = unknownUnitQueue.length - index;
  const standardUnits = getStandardUnits();
  // Get recipe - could be single (from save) or from import queue
  let recipe = window._pendingRecipeForUnits;
  
  // If not found, try to find from import recipes by name
  if (!recipe && window._pendingRecipesForUnits && item.recipeName) {
    recipe = window._pendingRecipesForUnits.find(r => r.name === item.recipeName);
  }
  
  // Store reference for editing
  window._currentEditingRecipe = recipe;
  
  // Get the raw text for editing
  const rawText = recipe ? recipe.rawText : 'Kein Rezepttext verfügbar';
  
  showModal(`
    <div style="width:90vw;max-width:1100px;max-height:85vh;display:flex;flex-direction:column;">

// Skip unknown unit (keep as-is but add to DB)
function skipUnknownUnit(index) {
  const item = unknownUnitQueue[index];
  
  // Add the unit as-is to the database (maps to itself)
  if (!STATE.unitDB) {
    STATE.unitDB = { ...DEFAULT_UNIT_DB };
  }
  STATE.unitDB[item.original.toLowerCase()] = item.original;
  saveState();
  
  closeModal();
  showUnknownUnitDialog(index + 1);
}

// Skip all remaining unknown units
function skipAllUnknownUnits() {
  // Add all remaining units as-is
  if (!STATE.unitDB) {
    STATE.unitDB = { ...DEFAULT_UNIT_DB };
  }
  
  for (const item of unknownUnitQueue) {
    STATE.unitDB[item.original.toLowerCase()] = item.original;
  }
  saveState();
  
  closeModal();
  unknownUnitQueue = [];
  
  // Continue with callback
  if (pendingUnitCallback) {
    pendingUnitCallback(window._currentEditingRecipe || window._pendingRecipeForUnits);
    pendingUnitCallback = null;
  }
  window._pendingRecipeForUnits = null;
  window._currentEditingRecipe = null;
}

// Save unknown unit mapping
function saveUnknownUnit(index, originalUnit) {
  const mapTo = document.getElementById('unit-map-to').value;
  const newStandard = document.getElementById('unit-new-standard').value.trim();
  
  if (!mapTo && !newStandard) {
    alert('Bitte wähle eine bestehende Einheit oder gib eine neue ein.');
    return;
  }
  
  // Initialize unit DB if needed
  if (!STATE.unitDB) {
    STATE.unitDB = { ...DEFAULT_UNIT_DB };
  }
  
  const lowerOriginal = originalUnit.toLowerCase().trim();
  
  if (newStandard) {
    // Add as new standard unit
    STATE.unitDB[lowerOriginal] = newStandard;
    // Also add the new standard as mapping to itself
    STATE.unitDB[newStandard.toLowerCase()] = newStandard;
  } else {
    // Map to existing standard
    STATE.unitDB[lowerOriginal] = mapTo;
  }
  
  // Update the recipe text to use normalized unit
  const recipe = window._currentEditingRecipe;
  if (recipe) {
    const normalizedUnit = newStandard || mapTo;
    recipe.rawText = normalizeUnitsInText(recipe.rawText, originalUnit, normalizedUnit);
  }
  
  saveState();
  closeModal();
  
  // Process next unit
  showUnknownUnitDialog(index + 1);
}

// Normalize units in recipe text
function normalizeUnitsInText(text, fromUnit, toUnit) {
  // Replace unit in ingredient definitions like @Zwiebel{2%Stück}
  const regex = new RegExp(`(\{[^}]*%)${escapeRegex(fromUnit)}(\})`, 'gi');
  return text.replace(regex, `$1${toUnit}$2`);
}

function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}


// Update recipe from editor
function updateRecipeFromEditor() {
  const editor = document.getElementById('unit-recipe-editor');
  const recipe = window._currentEditingRecipe;
  if (editor && recipe) {
    recipe.rawText = editor.value;
  }
}

// Highlight ingredient in editor
function highlightIngredientInEditor(ingredientName, unit) {
  const editor = document.getElementById('unit-recipe-editor');
  if (!editor) return;
  
  const text = editor.value;
  const searchPattern = '@' + ingredientName;
  const idx = text.toLowerCase().indexOf(searchPattern.toLowerCase());
  
  if (idx !== -1) {
    // Find the end of this ingredient reference
    let endIdx = text.indexOf('}', idx);
    if (endIdx === -1) endIdx = idx + searchPattern.length;
    else endIdx += 1;
    
    // Select the text
    editor.focus();
    editor.setSelectionRange(idx, endIdx);
    
    // Scroll to selection
    const lineHeight = 20;
    const linesBeforeSelection = text.substring(0, idx).split('\n').length - 1;
    editor.scrollTop = linesBeforeSelection * lineHeight - 50;
  }
}

// Apply editor changes and continue
function applyEditorChanges(index) {
  updateRecipeFromEditor();
  
  const recipe = window._currentEditingRecipe;
  if (recipe) {
    // Re-check if this unit is still unknown
    const { ingredients } = parseCooklang(recipe.rawText);
    const item = unknownUnitQueue[index];
    
    // Find if the ingredient still has an unknown unit
    const ing = ingredients.find(i => i.name.toLowerCase() === item.ingredient.toLowerCase());
    
    if (ing && ing.unit && !isKnownUnit(ing.unit)) {
      // Still unknown - update the item
      unknownUnitQueue[index].original = ing.unit;
      unknownUnitQueue[index].suggestion = findSimilarUnit(ing.unit);
      closeModal();
      showUnknownUnitDialog(index); // Show same index again with updated info
    } else {
      // Fixed! Move to next
      closeModal();
      showUnknownUnitDialog(index + 1);
    }
  }
}



function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}


// Normalize all units in a recipe text
function normalizeAllUnitsInRecipe(text) {
  const db = STATE.unitDB || DEFAULT_UNIT_DB;
  
  // Find all units in the text and replace them
  return text.replace(/(\{[^}]*%)([^}]+)(\})/g, (match, prefix, unit, suffix) => {
    const normalized = normalizeUnitFromDB(unit.trim());
    if (normalized) {
      return prefix + normalized + suffix;
    }
    return match;
  });
}

let STATE = {
  recipes: [],
  groups: [],
  categories: [],
  ingredientDB: {},
  collapsedGroups: {},
  shoppingChecked: {},
  manualShoppingItems: [],
  mealPlans: [],
  mealPlanFolders: ['Meine Pläne']
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      STATE = { ...STATE, ...saved };
      if (!STATE.manualShoppingItems) STATE.manualShoppingItems = [];
      if (!STATE.mealPlans) STATE.mealPlans = [];
      if (!STATE.breakfasts) STATE.breakfasts = [];
      if (!STATE.ingredientPrices) STATE.ingredientPrices = {};
      if (!STATE.unitConversions) STATE.unitConversions = { ...DEFAULT_UNIT_CONVERSIONS };
      if (!STATE.mealPlanFolders) STATE.mealPlanFolders = ['Meine Pläne'];
      
      // Merge ingredient DB - DEFAULT takes priority for category assignments
      const mergedDB = {};
      const savedDB = saved.ingredientDB || {};
      
      // First, add all defaults
      for (const [key, val] of Object.entries(DEFAULT_INGREDIENT_DB)) {
        mergedDB[key] = val;
      }
      
      // Then add user entries that are NOT in defaults (custom ingredients)
      for (const [key, val] of Object.entries(savedDB)) {
        if (!DEFAULT_INGREDIENT_DB[key]) {
          mergedDB[key] = val;
        }
      }
      
      STATE.ingredientDB = mergedDB;
      
      // Ensure categories include Obst
      if (!STATE.categories.includes('Obst')) {
        const gemueseIdx = STATE.categories.indexOf('Gemüse');
        if (gemueseIdx !== -1) {
          STATE.categories.splice(gemueseIdx + 1, 0, 'Obst');
        } else {
          STATE.categories.push('Obst');
        }
      }
      
    } else {
      STATE.recipes = SAMPLE_RECIPES;
      STATE.groups = DEFAULT_GROUPS;
      STATE.categories = DEFAULT_CATEGORIES;
      STATE.ingredientDB = DEFAULT_INGREDIENT_DB;
      saveState();
    }
  } catch(e) {
    STATE.recipes = SAMPLE_RECIPES;
    STATE.groups = DEFAULT_GROUPS;
    STATE.categories = DEFAULT_CATEGORIES;
    STATE.ingredientDB = DEFAULT_INGREDIENT_DB;
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
    updateStorageInfo();
  } catch(e) { console.error('Save failed', e); }
}

function updateStorageInfo() {
  const el = document.getElementById('storage-info');
  if (!el) return;
  const count = STATE.recipes.length;
  el.textContent = `💾 ${count} Rezept${count !== 1 ? 'e' : ''} gespeichert`;
}

// ═══════════════════════════════════════════════════════════════
// COOKLANG PARSER
// ═══════════════════════════════════════════════════════════════
function parseCooklang(text) {
  const lines = text.split('\n');
  const ingredients = [];
  const steps = [];
  let servings = null;
  const metadata = {};
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('>>')) {
      const mm = t.match(/^>>\s*([\w]+)\s*:\s*(.+)$/i);
      if (mm) { 
        const key = mm[1].toLowerCase();
        const value = mm[2].trim();
        metadata[key] = value; 
        if (key === 'servings') servings = parseInt(value);
        // Handle >>ingredient: lines - extract ingredients from them
        if (key === 'ingredient') {
          const ingMatches = [...value.matchAll(/@([^{@#~\n]+?)\{([^}]*)\}|@([^{@#~\n\s,\.!?;]+)/g)];
          for (const m of ingMatches) {
            let name, rawBlock;
            if (m[1] !== undefined) { name = m[1].trim(); rawBlock = m[2]; }
            else { name = m[3].trim(); rawBlock = undefined; }
            let amount = null, unit = null;
            if (rawBlock !== undefined) {
              const parts = rawBlock.split('%');
              const rawAmt = parts[0].trim();
              unit = (parts[1] || '').trim() || null;
              if (rawAmt && rawAmt !== '-') { const n = parseFloat(rawAmt.replace(',','.')); if (!isNaN(n)) amount = n; }
            }
            if (name) ingredients.push({ name, amount, unit });
          }
        }
      }
      continue;
    }
    const bs = t.match(/^servings:\s*(\d+)/i);
    if (bs) { servings = parseInt(bs[1]); continue; }
    if (!t || t.startsWith('--')) continue;
    const matches = [...t.matchAll(/@([^{@#~\n]+?)\{([^}]*)\}|@([^{@#~\n\s,\.!?;]+)/g)];
    for (const m of matches) {
      let name, rawBlock;
      if (m[1] !== undefined) { name = m[1].trim(); rawBlock = m[2]; }
      else { name = m[3].trim(); rawBlock = undefined; }
      let amount = null, unit = null;
      if (rawBlock !== undefined) {
        const parts = rawBlock.split('%');
        const rawAmt = parts[0].trim();
        unit = (parts[1] || '').trim() || null;
        if (rawAmt && rawAmt !== '-') { const n = parseFloat(rawAmt.replace(',','.')); if (!isNaN(n)) amount = n; }
      }
      if (name) ingredients.push({ name, amount, unit });
    }
    const clean = t
      .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, '$1')
      .replace(/@([^{@#~\n\s,\.!?;]+)/g, '$1')
      .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
      .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1').trim();
    if (clean) steps.push(clean);
  }
  return { ingredients, steps, servings, metadata };
}

// METADATA HELPER — resolves both 'calories' and 'calories_per_serving'
function getMeta(metadata, key) {
  const synonyms = {
    calories: ['calories','calories_per_serving','caloriesperserving','kcal','kcal_per_serving','cal','energie','energy','kalorien','kkal'],
    protein:  ['protein','protein_per_serving','proteinperserving','proteins','eiweiss','eiweißgehalt','eiweiß'],
    carbs:    ['carbs','carbs_per_serving','carbohydrates','carbohydrates_per_serving','kohlenhydrate','kh','carb'],
    fat:      ['fat','fat_per_serving','fette','fett','fats','lipids'],
    time:     ['time','zeit','dauer','kochzeit','zubereitungszeit','prep_time','cook_time','total_time'],
    temp:     ['temp','temperatur','temperature','backtemperatur','ofentemperatur'],
  };
  const keys = synonyms[key] || [key, key + '_per_serving'];
  for (const k of keys) { const v = metadata[k]; if (v) return v; }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// UNIT LOGIC
// ═══════════════════════════════════════════════════════════════
const UNITS = ['g','kg','ml','l','EL','TL','Stück','Prise','Bund','Packung','Dose','Glas','Scheibe','Scheiben','Zehe','Zehen',''];

function smartUnit(amount, unit) {
  if (!unit || amount === null) return { amount, unit };
  if (unit === 'g' && amount >= 1000) return { amount: parseFloat((amount/1000).toFixed(3)), unit: 'kg' };
  if (unit === 'kg' && amount < 1) return { amount: parseFloat((amount*1000).toFixed(1)), unit: 'g' };
  if (unit === 'ml' && amount >= 1000) return { amount: parseFloat((amount/1000).toFixed(3)), unit: 'l' };
  if (unit === 'l' && amount < 0.1) return { amount: parseFloat((amount*1000).toFixed(1)), unit: 'ml' };
  return { amount, unit };
}

function toBaseAmount(amount, unit) {
  if (unit === 'kg') return amount * 1000;
  if (unit === 'l') return amount * 1000;
  if (unit === 'Prise') return amount * 3;  // 1 Prise = 3g
  if (unit === 'TL') return amount * 5;     // 1 TL = 5g
  if (unit === 'EL') return amount * 15;    // 1 EL = 15g
  return amount;
}

function fromBaseAmount(amount, unit) {
  // Convert Prise, TL, EL to grams for output
  const baseUnit = unit === 'kg' ? 'g' : unit === 'l' ? 'ml' : 
                   (unit === 'Prise' || unit === 'TL' || unit === 'EL') ? 'g' : unit;
  return smartUnit(amount, baseUnit);
}

function formatAmt(amount) {
  if (amount === null || amount === undefined) return '';
  if (Number.isInteger(amount)) return amount.toString();
  if (amount >= 100) return Math.round(amount).toString();
  if (amount >= 10) return parseFloat(amount.toFixed(1)).toString();
  return parseFloat(amount.toFixed(2)).toString();
}

// Format amount for shopping list — always shows unit, adds "Stück" if none given
function fmtShoppingAmt(amount, unit) {
  if (amount === null || amount === undefined) return 'nach Bedarf';
  
  // Convert Prise/TL/EL to grams for shopping list display
  let displayAmount = amount;
  let displayUnit = unit;
  
  if (unit === 'Prise' || unit === 'Prisen') {
    displayAmount = amount * 3;  // 1 Prise = 3g
    displayUnit = 'g';
  } else if (unit === 'TL') {
    displayAmount = amount * 5;  // 1 TL = 5g
    displayUnit = 'g';
  } else if (unit === 'EL') {
    displayAmount = amount * 15; // 1 EL = 15g
    displayUnit = 'g';
  }
  
  // Apply smart unit conversion (g -> kg if large enough)
  if (displayUnit === 'g' || displayUnit === 'ml') {
    const converted = smartUnit(displayAmount, displayUnit);
    displayAmount = converted.amount;
    displayUnit = converted.unit;
  }
  
  const numStr = formatAmt(displayAmount);
  if (displayUnit) return numStr + ' ' + displayUnit;
  // No unit given: show "Stück" to avoid bare numbers like "80 Zwiebeln"
  return numStr + ' Stück';
}

function scaleIngredient(ing, basePeople, targetPeople, overrides, idx) {
  const key = `${idx}_${ing.name}`;
  if (overrides && overrides[key] !== undefined) {
    const ov = overrides[key];
    const { amount: ovAmt, unit: ovUnit } = smartUnit(ov.amount, ov.unit);
    return { ...ing, scaledAmount: ovAmt, scaledUnit: ovUnit, overridden: true, key };
  }
  if (ing.amount === null) return { ...ing, scaledAmount: null, scaledUnit: ing.unit, overridden: false, key };
  const factor = targetPeople / basePeople;
  const raw = ing.amount * factor;
  const { amount, unit } = smartUnit(raw, ing.unit);
  return { ...ing, scaledAmount: amount, scaledUnit: unit, overridden: false, key };
}

function getScaledIngredients(recipe) {
  const { ingredients } = parseCooklang(recipe.rawText);
  return ingredients.map((ing, i) => scaleIngredient(ing, recipe.basePeople, recipe.targetPeople, recipe.manualOverrides, i));
}

            Alle Daten werden <strong>lokal im Browser</strong> gespeichert. Das bedeutet: Wenn du den Browser-Cache löschst oder einen anderen Browser/PC verwendest, sind die Daten weg. Mit der Backup-Funktion kannst du alle Daten sichern und jederzeit wiederherstellen.
          </p>
          
          <!-- Where to find -->
          <div style="background:#e8eaf6;border-radius:12px;padding:16px;margin-bottom:20px;">
            <div style="font-size:12px;color:#3949ab;font-weight:600;margin-bottom:8px;">📍 WO FINDEST DU ES?</div>
            <p style="margin:0;font-size:13px;color:var(--text);">
              Unten links in der Sidebar findest du die Buttons <strong>[📥 Backup]</strong> und <strong>[📤 Restore]</strong> – immer sichtbar, egal auf welcher Seite du bist.

          <!-- What is saved -->
          <h3 style="font-size:14px;color:#3949ab;margin:0 0 12px 0;padding-bottom:8px;border-bottom:1px solid var(--border);">📦 Was wird gesichert?</h3>
          <div style="display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;margin-bottom:20px;">
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">📖 Rezepte</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">☕ Frühstücke</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">🗓️ Wochenpläne</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">🥬 Zutaten</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">💰 Preise</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">⚖️ Einheiten</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">🏷️ Kategorien</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">📁 Ordner</div>
            <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;text-align:center;">🛒 Einkaufsliste</div>
          </div>
          
          <!-- Backup -->
          <h3 style="font-size:14px;color:#3949ab;margin:0 0 12px 0;padding-bottom:8px;border-bottom:1px solid var(--border);">📥 Backup erstellen</h3>
          <p style="font-size:13px;color:var(--text);line-height:1.7;margin:0 0 16px 0;">
            Klicke auf <strong>[📥 Backup]</strong> um eine JSON-Datei herunterzuladen. Diese enthält alle deine Daten und kann sicher aufbewahrt werden (z.B. in der Cloud, auf USB, etc.).
          </p>
          <div style="background:#e8f5e9;border-radius:8px;padding:12px;margin-bottom:20px;font-size:12px;color:#2e7d32;">
            💡 <strong>Empfehlung:</strong> Erstelle regelmäßig ein Backup (z.B. wöchentlich), besonders nach größeren Änderungen!
          </div>
          
          <!-- Restore -->
          <h3 style="font-size:14px;color:#3949ab;margin:0 0 12px 0;padding-bottom:8px;border-bottom:1px solid var(--border);">📤 Backup wiederherstellen</h3>
          <p style="font-size:13px;color:var(--text);line-height:1.7;margin:0 0 12px 0;">
            Klicke auf <strong>[📤 Restore]</strong> und wähle eine Backup-Datei aus. Du hast dann zwei Optionen:
          </p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
            <div style="background:#e3f2fd;border-radius:10px;padding:14px;">
              <div style="font-weight:600;color:#1565c0;font-size:13px;margin-bottom:6px;">🔀 Zusammenführen</div>
              <ul style="margin:0;padding-left:18px;font-size:12px;color:var(--text2);line-height:1.6;">
                <li>Fügt neue Daten hinzu</li>
                <li>Behält bestehende Daten</li>
                <li>Keine Duplikate</li>
                <li><strong>Empfohlen!</strong></li>
              </ul>
            </div>
            <div style="background:#fff3e0;border-radius:10px;padding:14px;">
              <div style="font-weight:600;color:#e65100;font-size:13px;margin-bottom:6px;">🔄 Komplett ersetzen</div>
              <ul style="margin:0;padding-left:18px;font-size:12px;color:var(--text2);line-height:1.6;">
                <li>Löscht ALLE aktuellen Daten</li>
                <li>Ersetzt durch Backup</li>
                <li>Nicht rückgängig!</li>
                <li>Nur wenn nötig</li>
              </ul>
            </div>
          </div>
          
          <!-- Reset Warning -->
          <h3 style="font-size:14px;color:#c62828;margin:0 0 12px 0;padding-bottom:8px;border-bottom:1px solid var(--border);">⚠️ Alles zurücksetzen</h3>
          <p style="font-size:13px;color:var(--text);line-height:1.7;margin:0 0 12px 0;">
            Der Button <strong>[⚠️ Alles zurücksetzen]</strong> löscht <strong>alle Daten unwiderruflich</strong>. Nutze ihn nur, wenn du komplett neu starten möchtest. Erstelle vorher unbedingt ein Backup!
          </p>
          
        </div>
      </div></div>
      
      <!-- Start Button -->
      <div style="text-align:center;padding:8px 0 32px 0;">
        <button class="btn btn-primary" onclick="showView('overview')" style="font-size:16px;padding:16px 48px;border-radius:14px;box-shadow:0 6px 24px rgba(92,61,30,0.3);">
          🚀 Los geht's!
        </button>
      </div>
      
      </div>
    </div>
  `;
}

function renderOverview() {
  setTopbar('Rezept-Übersicht', `
    <label style="position:relative;cursor:pointer;">
      <input type="file" accept=".cook" multiple style="position:absolute;opacity:0;width:0;height:0;" onchange="importCookFiles(this)">
      <span class="btn btn-outline btn-sm">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        .cook importieren
      </span>
    </label>
    <button class="btn btn-outline btn-sm" onclick="showGlobalDialog()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Alle anpassen
    </button>
    <button class="btn btn-outline btn-sm" onclick="showManageFoldersDialog()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      Ordner
    </button>
    <button class="btn btn-primary btn-sm" onclick="showView('recipe-new')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Neues Rezept
    </button>
  `);

  const c = document.getElementById('content');

  // Search bar with tag filter checkboxes
  const allTags = [...new Set(STATE.recipes.flatMap(r => r.tags || []))].sort();
  const activeTagFilter = STATE.activeTagFilter || [];
  const searchDiv = document.createElement('div');
  searchDiv.style.cssText = 'margin-bottom:16px;';
  
  // Sammle alle Zutaten aus allen Rezepten für den Zutaten-Filter
  const allIngredientsSet = new Set();
  STATE.recipes.forEach(recipe => {
    if (recipe.simpleIngredients) {
      recipe.simpleIngredients.forEach(ing => allIngredientsSet.add(ing.name.toLowerCase()));
    }
    if (recipe.rawText) {
      try {
        const parsed = parseCooklang(recipe.rawText);
        parsed.ingredients.forEach(ing => allIngredientsSet.add(ing.name.toLowerCase()));
      } catch(e) {}
    }
  });
  const sortedIngredients = Array.from(allIngredientsSet).sort();
  
  // Aktive Filter aus STATE
  const activeDietFilter = STATE.activeDietFilter || [];
  const activeIngredientFilter = STATE.activeIngredientFilter || { include: [], exclude: [] };
  const hasActiveFilters = activeTagFilter.length > 0 || activeDietFilter.length > 0 || 
                           activeIngredientFilter.include.length > 0 || activeIngredientFilter.exclude.length > 0;
  
  // Build filter HTML
  let filterHtml = '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">';
  
  // Search input
  filterHtml += '<div style="position:relative;flex:1;max-width:400px;">';
  filterHtml += '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>';
  filterHtml += '<input type="text" id="recipe-search" placeholder="Rezept suchen..." style="width:100%;padding:10px 12px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:white;" oninput="filterRecipes(this.value)" value="' + escHtml(STATE.recipeSearchTerm || '') + '">';
  filterHtml += '</div>';
  
  // Tags filter button
  if (allTags.length > 0) {
    const tagBtnStyle = activeTagFilter.length > 0 ? 'border-color:var(--accent);background:#fdf6ec;' : '';
    filterHtml += '<div style="position:relative;">';
    filterHtml += '<button class="btn btn-outline btn-sm" onclick="toggleTagFilterDropdown()" style="display:flex;align-items:center;gap:6px;' + tagBtnStyle + '">';
    filterHtml += '🏷️ Tags ' + (activeTagFilter.length > 0 ? '(' + activeTagFilter.length + ')' : '');
    filterHtml += '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
    filterHtml += '</button>';
    filterHtml += '<div id="tag-filter-dropdown" style="display:none;position:absolute;top:100%;left:0;margin-top:4px;background:white;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:100;min-width:220px;max-height:300px;overflow-y:auto;">';
    filterHtml += '<div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">';
    filterHtml += '<span style="font-weight:600;font-size:13px;color:var(--accent);">Tags auswählen</span>';
    if (activeTagFilter.length > 0) filterHtml += '<span onclick="clearTagFilter()" style="font-size:11px;color:#c44;cursor:pointer;">Alle entfernen</span>';
    filterHtml += '</div><div style="padding:8px 0;">';
    allTags.forEach(tag => {
      const isChecked = activeTagFilter.includes(tag) ? 'checked' : '';
      filterHtml += '<label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background 0.15s;" onmouseenter="this.style.background=\'#f5f5f5\'" onmouseleave="this.style.background=\'\'"><input type="checkbox" ' + isChecked + ' onchange="event.stopPropagation();toggleTagFilter(\'' + escHtml(tag) + '\')" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;"><span style="font-size:13px;color:var(--text);">' + escHtml(tag) + '</span></label>';
    });
    filterHtml += '</div></div></div>';
  }
  
  // Diet filter button
  const dietBtnStyle = activeDietFilter.length > 0 ? 'border-color:#4caf50;background:#e8f5e9;' : '';
  filterHtml += '<div style="position:relative;">';
  filterHtml += '<button class="btn btn-outline btn-sm" onclick="toggleDietFilterDropdown()" style="display:flex;align-items:center;gap:6px;' + dietBtnStyle + '">';
  filterHtml += '🥗 Allergien ' + (activeDietFilter.length > 0 ? '(' + activeDietFilter.length + ')' : '');
  filterHtml += '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
  filterHtml += '</button>';
  filterHtml += '<div id="diet-filter-dropdown" style="display:none;position:absolute;top:100%;left:0;margin-top:4px;background:white;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:100;min-width:240px;max-height:350px;overflow-y:auto;">';
  filterHtml += '<div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">';
  filterHtml += '<span style="font-weight:600;font-size:13px;color:#4caf50;">Allergien & Diät</span>';
  if (activeDietFilter.length > 0) filterHtml += '<span onclick="clearDietFilter()" style="font-size:11px;color:#c44;cursor:pointer;">Alle entfernen</span>';
  filterHtml += '</div><div style="padding:8px 0;">';
  DIET_OPTIONS.forEach(opt => {
    const isChecked = activeDietFilter.includes(opt.id) ? 'checked' : '';
    filterHtml += '<label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background 0.15s;" onmouseenter="this.style.background=\'#f5f5f5\'" onmouseleave="this.style.background=\'\'"><input type="checkbox" ' + isChecked + ' onchange="event.stopPropagation();toggleDietFilterView(\'' + opt.id + '\')" style="width:16px;height:16px;accent-color:' + opt.color + ';cursor:pointer;"><span style="font-size:13px;color:var(--text);">' + opt.label + '</span></label>';
  });
  
  // Custom allergens from all recipes
  const allCustomAllergens = new Set();
  STATE.recipes.forEach(r => {
    if (r.customAllergens) {
      r.customAllergens.forEach(a => allCustomAllergens.add(a));
    }
  });
  if (STATE.customAllergensList) {
    STATE.customAllergensList.forEach(a => allCustomAllergens.add(a));
  }
  
  if (allCustomAllergens.size > 0) {
    filterHtml += '<div style="border-top:1px solid var(--border);padding:8px 12px;"><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Eigene Allergien</span></div>';
    filterHtml += '<div style="padding:4px 0;">';
    Array.from(allCustomAllergens).sort().forEach(allergen => {
      const isChecked = activeDietFilter.includes('custom:' + allergen) ? 'checked' : '';
      filterHtml += '<label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background 0.15s;" onmouseenter="this.style.background=\'#f5f5f5\'" onmouseleave="this.style.background=\'\'"><input type="checkbox" ' + isChecked + ' onchange="event.stopPropagation();toggleDietFilterView(\'custom:' + escHtml(allergen) + '\')" style="width:16px;height:16px;accent-color:#9c27b0;cursor:pointer;"><span style="font-size:13px;color:var(--text);">⚠️ ' + escHtml(allergen) + '</span></label>';
    });
    filterHtml += '</div>';
  }
  
  filterHtml += '</div></div></div>';
  
  // Ingredient filter button
  const ingCount = activeIngredientFilter.include.length + activeIngredientFilter.exclude.length;
  const ingBtnStyle = ingCount > 0 ? 'border-color:#ff9800;background:#fff3e0;' : '';
  filterHtml += '<div style="position:relative;">';
  filterHtml += '<button class="btn btn-outline btn-sm" onclick="toggleIngredientFilterDropdown()" style="display:flex;align-items:center;gap:6px;' + ingBtnStyle + '">';
  filterHtml += '🥕 Zutaten ' + (ingCount > 0 ? '(' + ingCount + ')' : '');
  filterHtml += '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
  filterHtml += '</button>';
  filterHtml += '<div id="ingredient-filter-dropdown" style="display:none;position:absolute;top:100%;right:0;margin-top:4px;background:white;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:100;min-width:320px;max-height:450px;overflow-y:auto;">';
  filterHtml += '<div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">';
  filterHtml += '<span style="font-weight:600;font-size:13px;color:#ff9800;">Zutaten filtern</span>';
  if (ingCount > 0) filterHtml += '<span onclick="clearIngredientFilter()" style="font-size:11px;color:#c44;cursor:pointer;">Alle entfernen</span>';
  filterHtml += '</div>';
  filterHtml += '<div style="padding:10px 12px;border-bottom:1px solid var(--border);"><input type="text" id="ingredient-filter-search" placeholder="Zutat suchen..." oninput="filterIngredientList(this.value)" style="width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;"></div>';
  
  const isExcludeTab = STATE.ingredientFilterTab === 'exclude';
  filterHtml += '<div style="display:flex;border-bottom:1px solid var(--border);">';
  filterHtml += '<button id="ing-tab-include" onclick="switchIngredientTab(\'include\')" style="flex:1;padding:10px;border:none;background:' + (!isExcludeTab ? 'var(--surface2)' : 'white') + ';cursor:pointer;font-size:13px;font-weight:' + (!isExcludeTab ? '600' : '400') + ';color:' + (!isExcludeTab ? '#4caf50' : 'var(--text3)') + ';">✅ Mit (' + activeIngredientFilter.include.length + ')</button>';
  filterHtml += '<button id="ing-tab-exclude" onclick="switchIngredientTab(\'exclude\')" style="flex:1;padding:10px;border:none;background:' + (isExcludeTab ? 'var(--surface2)' : 'white') + ';cursor:pointer;font-size:13px;font-weight:' + (isExcludeTab ? '600' : '400') + ';color:' + (isExcludeTab ? '#f44336' : 'var(--text3)') + ';">❌ Ohne (' + activeIngredientFilter.exclude.length + ')</button>';
  filterHtml += '</div>';
  
  filterHtml += '<div id="ingredient-filter-list" style="padding:8px 0;max-height:250px;overflow-y:auto;">';
  sortedIngredients.forEach(ing => {
    const isIncluded = activeIngredientFilter.include.includes(ing);
    const isExcluded = activeIngredientFilter.exclude.includes(ing);
    const isChecked = isExcludeTab ? isExcluded : isIncluded;
    let bgStyle = '';
    if (isIncluded) bgStyle = 'background:#e8f5e9;';
    if (isExcluded) bgStyle = 'background:#ffebee;';
    filterHtml += '<label class="ingredient-filter-item" data-name="' + ing + '" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background 0.15s;' + bgStyle + '"><input type="checkbox" ' + (isChecked ? 'checked' : '') + ' onchange="event.stopPropagation();toggleIngredientFilterView(\'' + ing + '\')" style="width:16px;height:16px;accent-color:' + (isExcludeTab ? '#f44336' : '#4caf50') + ';cursor:pointer;"><span style="font-size:13px;color:var(--text);text-transform:capitalize;">' + ing + '</span>';
    if (isIncluded) filterHtml += '<span style="margin-left:auto;font-size:11px;color:#4caf50;">✓</span>';
    if (isExcluded) filterHtml += '<span style="margin-left:auto;font-size:11px;color:#f44336;">✗</span>';
    filterHtml += '</label>';
  });
  filterHtml += '</div></div></div>';
  
  // Clear all filters button
  if (hasActiveFilters) {
    filterHtml += '<button class="btn btn-ghost btn-sm" onclick="clearAllFilters()" style="color:#c44;">✕ Filter löschen</button>';
  }
  
  filterHtml += '</div>';
  
  // Active filter badges
  if (hasActiveFilters) {
    filterHtml += '<div style="margin-top:12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
    filterHtml += '<span style="font-size:12px;color:var(--text3);">Aktive Filter:</span>';
    activeTagFilter.forEach(tag => {
      filterHtml += '<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:12px;background:var(--accent);color:white;">🏷️ ' + escHtml(tag) + '<span onclick="removeTagFilter(\'' + escHtml(tag) + '\')" style="cursor:pointer;opacity:0.8;">×</span></span>';
    });
    activeDietFilter.forEach(dietId => {
      const opt = DIET_OPTIONS.find(o => o.id === dietId);
      if (opt) {
        filterHtml += '<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:12px;background:' + opt.color + ';color:white;">' + opt.label + '<span onclick="removeDietFilter(\'' + dietId + '\')" style="cursor:pointer;opacity:0.8;">×</span></span>';
      }
    });
    activeIngredientFilter.include.forEach(ing => {
      filterHtml += '<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:12px;background:#4caf50;color:white;">✅ ' + ing + '<span onclick="removeIngredientFilter(\'' + ing + '\', \'include\')" style="cursor:pointer;opacity:0.8;">×</span></span>';
    });
    activeIngredientFilter.exclude.forEach(ing => {
      filterHtml += '<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:12px;background:#f44336;color:white;">❌ ' + ing + '<span onclick="removeIngredientFilter(\'' + ing + '\', \'exclude\')" style="cursor:pointer;opacity:0.8;">×</span></span>';
    });
    filterHtml += '</div>';
  }
  
  searchDiv.innerHTML = filterHtml;
  c.appendChild(searchDiv);

  // Selected count info
  const selectedCount = STATE.recipes.filter(r => r.selectedForList).length;
  if (STATE.recipes.length > 0) {
    const info = document.createElement('div');
    info.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13.5px;color:var(--text2);';

      <button class="btn btn-ghost btn-xs" onclick="selectAll(false)">Keine</button>`;

  }

  if (STATE.recipes.length === 0) {
    c.innerHTML += `<div class="empty-state">
      <div class="icon">📖</div>
      <h3>Noch keine Rezepte vorhanden</h3>
      <p>Erstelle dein erstes Rezept oder importiere .cook Dateien.</p>
    </div>`;
    return;
  }

  // Group recipes
  const byGroup = {};
  for (const r of STATE.recipes) {
    const g = r.group || 'Sonstiges';
    if (!byGroup[g]) byGroup[g] = [];
    byGroup[g].push(r);
  }

  const groupOrder = [...STATE.groups, ...Object.keys(byGroup).filter(g => !STATE.groups.includes(g))];

  for (const group of groupOrder) {
    if (!byGroup[group]) continue;
    const recipes = byGroup[group];
    const collapsed = STATE.collapsedGroups[group];

    const groupDiv = document.createElement('div');
    groupDiv.className = 'recipe-group';

    // Group header
    const header = document.createElement('div');
    header.className = 'recipe-group-header';
    header.innerHTML = `
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
      </svg>
      <span>${group}</span>
      <span class="group-count">${recipes.length} Rezept${recipes.length !== 1 ? 'e' : ''}</span>
      <span class="group-toggle">${collapsed ? '▶' : '▼'}</span>
    `;
    header.onclick = () => {
      STATE.collapsedGroups[group] = !STATE.collapsedGroups[group];
      saveState();
      renderView();
    };
    groupDiv.appendChild(header);

    if (!collapsed) {
      // Sort recipes alphabetically by name
      const sortedRecipes = [...recipes].sort((a, b) => a.name.localeCompare(b.name, 'de'));
      for (const recipe of sortedRecipes) {
        groupDiv.appendChild(buildRecipeCard(recipe));
      }
    }
    c.appendChild(groupDiv);
  }

  // Add Frühstück group if there are breakfasts
  if (STATE.breakfasts && STATE.breakfasts.length > 0) {
    const breakfastCollapsed = STATE.collapsedGroups['☕ Frühstück'];
    
    const breakfastGroupDiv = document.createElement('div');
    breakfastGroupDiv.className = 'recipe-group';

    const breakfastHeader = document.createElement('div');
    breakfastHeader.className = 'recipe-group-header';
    breakfastHeader.style.background = '#e8f5e9';
    breakfastHeader.style.borderColor = '#c8e6c9';
    breakfastHeader.innerHTML = `
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
      <span style="color:#2e7d32;">☕ Frühstück</span>
      <span class="group-count">${STATE.breakfasts.length} Frühstück${STATE.breakfasts.length !== 1 ? 'e' : ''}</span>
      <span class="group-toggle">${breakfastCollapsed ? '▶' : '▼'}</span>
    `;
    breakfastHeader.onclick = () => {
      STATE.collapsedGroups['☕ Frühstück'] = !STATE.collapsedGroups['☕ Frühstück'];
      saveState();
      renderView();
    };
    breakfastGroupDiv.appendChild(breakfastHeader);

    if (!breakfastCollapsed) {
      const sortedBreakfasts = [...STATE.breakfasts].sort((a, b) => a.name.localeCompare(b.name, 'de'));
      for (const breakfast of sortedBreakfasts) {
        breakfastGroupDiv.appendChild(buildBreakfastCard(breakfast));
      }
    }
    c.appendChild(breakfastGroupDiv);
  }
}

// Export a single recipe as .cook file
function exportRecipeAsCook() {
  // Sync current editor fields first
  syncEditorFields();
  
  // Get data from editor state
  const name = editorState.name || 'Rezept';
  const basePeople = editorState.basePeople || 4;
  const rawText = editorState.rawText || '';
  
  if (!rawText.trim()) {
    alert('Bitte füge zuerst Rezeptinhalt hinzu.');
    return;
  }
  
  // Build .cook file content
  let cookContent = '';
  
  // Add metadata
  cookContent += '>> servings: ' + basePeople + '\n';
  cookContent += '\n';
  
  // Add the raw recipe text
  cookContent += rawText;
  
  // Create and download the file
  const blob = new Blob([cookContent], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name.replace(/[^a-zA-Z0-9äöüÄÖÜß\-_\s]/g, '').trim() + '.cook';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearAllFilters() {
  STATE.activeTagFilter = [];
  STATE.activeDietFilter = [];
  STATE.activeIngredientFilter = { include: [], exclude: [] };
  STATE.recipeSearchTerm = '';
  renderView();
}

function applyAllFilters() {
  const searchTerm = (STATE.recipeSearchTerm || '').toLowerCase().trim();
  const activeTagFilter = STATE.activeTagFilter || [];
  const activeDietFilter = STATE.activeDietFilter || [];
  const activeIngredientFilter = STATE.activeIngredientFilter || { include: [], exclude: [] };
  
  const cards = document.querySelectorAll('.recipe-card');
  const groups = document.querySelectorAll('.recipe-group');
  
  cards.forEach(card => {
    const recipeId = card.dataset.recipeId;
    const recipe = STATE.recipes.find(r => String(r.id) === String(recipeId));
    if (!recipe) return;
    
    const nameEl = card.querySelector('.recipe-card-name');
    const name = nameEl ? nameEl.textContent.toLowerCase() : '';
    const recipeTags = recipe.tags || [];
    const recipeDietOptions = recipe.dietOptions || [];
    
    const recipeIngredients = new Set();
    if (recipe.simpleIngredients) {
      recipe.simpleIngredients.forEach(ing => recipeIngredients.add(ing.name.toLowerCase()));
    }
    if (recipe.rawText) {
      try {
        const parsed = parseCooklang(recipe.rawText);
        parsed.ingredients.forEach(ing => recipeIngredients.add(ing.name.toLowerCase()));
      } catch(e) {}
    }
    
    let matchesSearch = true;
    if (searchTerm) {
      const tagsString = recipeTags.join(' ').toLowerCase();
      const ingredientsString = Array.from(recipeIngredients).join(' ');
      matchesSearch = name.includes(searchTerm) || tagsString.includes(searchTerm) || ingredientsString.includes(searchTerm);
    }
    
    let matchesTags = true;
    if (activeTagFilter.length > 0) {
      matchesTags = activeTagFilter.some(tag => recipeTags.includes(tag));
    }
    
    let matchesDiet = true;
    if (activeDietFilter.length > 0) {
      const recipeCustomAllergens = recipe.customAllergens || [];
      matchesDiet = activeDietFilter.every(diet => {
        if (diet.startsWith('custom:')) {
          // Custom allergen
          const allergenName = diet.substring(7);
          return recipeCustomAllergens.includes(allergenName);
        } else {
          // Standard diet option
          return recipeDietOptions.includes(diet);
        }
      });
    }
    
    let matchesIngredients = true;
    if (activeIngredientFilter.include.length > 0) {
      matchesIngredients = activeIngredientFilter.include.some(ing => recipeIngredients.has(ing));
    }
    if (matchesIngredients && activeIngredientFilter.exclude.length > 0) {
      matchesIngredients = !activeIngredientFilter.exclude.some(ing => recipeIngredients.has(ing));
    }
    
    card.style.display = (matchesSearch && matchesTags && matchesDiet && matchesIngredients) ? '' : 'none';
  });
  
  groups.forEach(group => {
    const allCards = group.querySelectorAll('.recipe-card');
    let hasVisible = false;
    allCards.forEach(card => {
      if (card.style.display !== 'none') hasVisible = true;
    });
    group.style.display = hasVisible ? '' : 'none';
  });
}

function buildRecipeCard(recipe) {
  const factor = recipe.targetPeople / recipe.basePeople;
  const overrideCount = Object.keys(recipe.manualOverrides || {}).length;
  const { ingredients } = parseCooklang(recipe.rawText);
  const ingCount = ingredients.length;

  const card = document.createElement('div');
  card.className = `recipe-card ${recipe.selectedForList ? 'selected' : ''}`;
  card.dataset.recipeId = recipe.id;

  const header = document.createElement('div');
  header.className = 'recipe-card-header';

  // Build inner HTML safely
  const rid = String(recipe.id);
  const nameHtml = escHtml(recipe.name);
  const factorBadge = factor !== 1 ? `<span class="badge ${factor > 1 ? 'badge-green' : 'badge-red'}">×${parseFloat(factor.toFixed(2))}</span>` : '';
  const overrideBadge = overrideCount > 0 ? `<span class="badge badge-warm">✎ ${overrideCount} Korrektur${overrideCount !== 1 ? 'en' : ''}</span>` : '';

  header.innerHTML = `
    <label class="toggle-check" onclick="event.stopPropagation()">
      <input type="checkbox" ${recipe.selectedForList ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--green);" data-id="${rid}" class="recipe-select-cb">
    </label>
