<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezeptkalkulator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ebe1;
    --border: #d9cdb8;
    --border2: #ede6d8;
    --accent: #5c3d1e;
    --accent2: #a0622a;
    --accent3: #d4884a;
    --green: #3a6b4a;
    --green2: #e8f4ec;
    --red: #a83228;
    --red2: #fdecea;
    --text: #1e160a;
    --text2: #6b5940;
    --text3: #998570;
    --shadow: 0 2px 12px rgba(92,61,30,0.08);
    --shadow2: 0 4px 24px rgba(92,61,30,0.14);
    --radius: 10px;
    --transition: all 0.18s ease;
  }
  html, body { height: 100%; font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
  
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* LAYOUT */
  #app { display: flex; height: 100vh; overflow: hidden; }
  
  /* SIDEBAR */
  #sidebar {
    width: 230px; min-width: 230px; background: var(--accent);
    display: flex; flex-direction: column;
    padding: 0; overflow: hidden;
  }
  #sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #sidebar-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-style: italic;
    color: #fdf6ec; font-weight: 400; line-height: 1.2;
    letter-spacing: 0.02em;
  }
  #sidebar-logo p { font-size: 11px; color: rgba(253,246,236,0.5); margin-top: 3px; letter-spacing: 0.05em; text-transform: uppercase; }
  #sidebar-nav { padding: 12px 10px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 7px; cursor: pointer;
    color: rgba(253,246,236,0.7); font-size: 14px; font-weight: 400;
    transition: var(--transition); margin-bottom: 2px; border: none;
    background: transparent; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.1); color: #fdf6ec; }
  .nav-item.active { background: rgba(255,255,255,0.18); color: #fdf6ec; font-weight: 500; }
  .nav-item svg { opacity: 0.8; flex-shrink: 0; }
  .nav-section-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(253,246,236,0.35); padding: 14px 12px 5px; }
  #sidebar-footer { padding: 14px 10px; border-top: 1px solid rgba(255,255,255,0.1); }
  .storage-info { font-size: 11px; color: rgba(253,246,236,0.4); padding: 6px 12px; }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar {
    height: 58px; background: var(--surface); border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(92,61,30,0.05);
  }
  #topbar-title { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--accent); }
  #topbar-actions { display: flex; gap: 8px; align-items: center; }
  #content { flex: 1; overflow-y: auto; padding: 28px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 7px; border: 1.5px solid; font-family: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: var(--transition); text-decoration: none; white-space: nowrap; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fdf6ec; }
  .btn-primary:hover { background: #4a3018; border-color: #4a3018; }
  .btn-secondary { background: var(--accent2); border-color: var(--accent2); color: white; }
  .btn-secondary:hover { background: #8a5020; }
  .btn-outline { background: white; border-color: var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent2); color: var(--accent); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text3); padding: 6px 10px; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .btn-danger { background: white; border-color: var(--border); color: var(--red); }
  .btn-danger:hover { background: var(--red); border-color: var(--red); color: white; }
  .btn-green { background: var(--green); border-color: var(--green); color: white; }
  .btn-green:hover { background: #2d5438; }
  .btn-sm { padding: 5px 12px; font-size: 12.5px; }
  .btn-xs { padding: 3px 9px; font-size: 12px; }

  /* INPUTS */
  input[type=text], input[type=number], textarea, select {
    font-family: inherit; font-size: 14px;
    border: 1.5px solid var(--border); border-radius: 7px;
    padding: 8px 12px; background: white; color: var(--text);
    transition: var(--transition); width: 100%;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(160,98,42,0.1); }
  label.field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.03em; text-transform: uppercase; }
  .field { margin-bottom: 16px; }

  /* CARDS */
  .card { background: var(--surface); border: 1.5px solid var(--border2); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
  .card-sm { padding: 14px 18px; }

  /* TAGS / BADGES */
  .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 500; gap: 4px; }
  .badge-warm { background: #f5ede0; color: var(--accent2); border: 1px solid #e8d5ba; }
  .badge-manual { background: #e8f4e8; color: #2d7a2d; border: 1px solid #b8ddb8; font-weight:700; cursor: pointer; transition: var(--transition); }
  .badge-manual:hover { background: #d0e8d0; }
  .badge-green { background: var(--green2); color: var(--green); border: 1px solid #b8ddc4; }
  .badge-red { background: var(--red2); color: var(--red); border: 1px solid #f5c0b8; }
  .badge-gray { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .badge-blue { background: #e8f0f8; color: #2c5f8a; border: 1px solid #b8cfe0; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); padding: 8px 12px; text-align: left; border-bottom: 2px solid var(--border2); }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border2); font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(240,235,225,0.4); }

  /* FOLDER / GROUP */
  .recipe-group { margin-bottom: 24px; }
  .recipe-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 8px;
    cursor: pointer; margin-bottom: 10px;
    font-weight: 600; font-size: 14px; color: var(--accent);
    transition: var(--transition);
  }
  .recipe-group-header:hover { background: #e8e0d0; }
  .recipe-group-header .group-toggle { margin-left: auto; color: var(--text3); font-size: 12px; }
  .recipe-group-header .group-count { font-size: 12px; color: var(--text3); font-weight: 400; }

  /* RECIPE CARD */
  .recipe-card {
    background: white; border: 1.5px solid var(--border2); border-radius: 9px;
    margin-bottom: 10px; overflow: hidden;
    box-shadow: var(--shadow); transition: var(--transition);
    border-left: 4px solid var(--border);
  }
  .recipe-card.selected { border-left-color: var(--green); }
  .recipe-card:hover { box-shadow: var(--shadow2); }
  .recipe-card-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; }
  .recipe-card-body { padding: 0 18px 14px; border-top: 1px solid var(--border2); margin-top: 4px; }
  .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 17px; font-style: italic; color: var(--accent); flex: 1; }
  .ingredient-pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); margin: 3px 3px 0 0; }
  .ingredient-pill.overridden { background: #fdf3e0; border-color: var(--accent3); color: #7a4f00; }

  /* PERSON STEPPER */
  .person-stepper { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--border); border-radius: 7px; overflow: hidden; background: white; }
  .person-stepper button { width: 32px; height: 32px; border: none; background: var(--surface2); color: var(--accent); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
  .person-stepper button:hover { background: var(--border); }
  .person-stepper input { width: 52px; border: none; text-align: center; font-weight: 600; font-size: 15px; padding: 4px; border-radius: 0; box-shadow: none; }
  .person-stepper input:focus { box-shadow: none; border-color: transparent; }

  /* EDITOR */
  .code-editor { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.8; min-height: 280px; resize: vertical; background: #1e160a; color: #f0e6d0; border: none; border-radius: 8px; padding: 16px; }
  .code-editor:focus { box-shadow: 0 0 0 3px rgba(160,98,42,0.3); border-color: var(--accent2); }
  .syntax-hint { background: #2a1f0e; color: #b8967a; border-radius: 8px; padding: 14px 16px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.9; }
  .syntax-hint .comment { color: #6b5940; }
  .syntax-hint .ingredient { color: #d4884a; }
  .syntax-hint .amount { color: #7aaa88; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border2); margin-bottom: 20px; }
  .tab { padding: 9px 20px; border: none; background: transparent; font-family: inherit; font-size: 14px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); font-weight: 500; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent2); }

  /* SHOPPING LIST */
  .shopping-category { margin-bottom: 20px; }
  .shopping-category-header { display: flex; align-items: center; gap: 10px; padding: 8px 0; margin-bottom: 10px; border-bottom: 2px solid var(--border2); }
  .shopping-category-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); font-style: italic; }
  .shopping-item { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 12px; padding: 10px 14px; border-radius: 7px; margin-bottom: 5px; background: white; border: 1px solid var(--border2); }
  .shopping-item:hover { border-color: var(--border); }
  .shopping-check { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  .shopping-item.checked .shopping-name { text-decoration: line-through; color: var(--text3); }
  .shopping-amount { font-weight: 600; color: var(--accent); min-width: 60px; flex-shrink: 0; }
  .shopping-name { flex: 1; }
  .shopping-recipe-tag { font-size: 11.5px; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 12px; cursor: pointer; transition: var(--transition); }
  .shopping-recipe-tag:hover { background: var(--border); color: var(--accent); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(30,22,10,0.5); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: white; border-radius: 14px; padding: 28px; max-width: 860px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(30,22,10,0.3); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--accent); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border2); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 64px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 52px; margin-bottom: 14px; opacity: 0.6; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* CHECKBOX TOGGLE */
  .toggle-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle-check input { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border2); margin: 18px 0; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* OVERRIDE INLINE FORM */
  .override-form { display: flex; align-items: center; gap: 6px; }
  .override-form input[type=number] { width: 80px; padding: 5px 8px; font-size: 13px; }
  .override-form select { width: 90px; padding: 5px 8px; font-size: 13px; }

  /* INFO BOX */
  .info-box { background: #fdf8f0; border: 1.5px solid #e8d5ba; border-radius: 8px; padding: 14px 16px; font-size: 13.5px; color: var(--text2); line-height: 1.6; }
  .info-box.green { background: var(--green2); border-color: #b8ddc4; color: #2d5438; }

  /* PRINT */
  @media print {
    #sidebar, #topbar, #content, #main { display: none !important; }
    #print-overlay { position: static !important; overflow: visible !important; background: white !important; z-index: auto !important; }
    #print-overlay .print-toolbar { display: none !important; }
    #main { display: block; }
    #content { overflow: visible; padding: 20px; }
    .btn { display: none !important; }
    .no-print { display: none !important; }
    .card { box-shadow: none; border: 1px solid #ccc; }
  }

  /* ANIMATIONS */
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeSlide 0.22s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal { animation: modalIn 0.2s ease; }

  /* DRAG OVER */
  .drag-over { border: 2px dashed var(--accent2) !important; background: #fdf8f0 !important; }

  /* SECTION TITLE */
  .section-title { font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; color: var(--accent); margin-bottom: 6px; }
  .section-subtitle { font-size: 13.5px; color: var(--text3); margin-bottom: 24px; }

  /* CATEGORY COLOR DOTS */
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-logo">
      <h1>Rezept&shy;kalkulator</h1>
      <p>Professionelle Mengenplanung</p>
    </div>
    <div id="sidebar-nav">
      <div class="nav-section-label">Hauptmenü</div>
      <button class="nav-item active" onclick="showView('overview')" id="nav-overview">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Übersicht
      </button>
      <button class="nav-item" onclick="showView('recipe-new')" id="nav-recipe-new">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Neues Rezept
      </button>
      <div class="nav-section-label">Tools</div>
      <button class="nav-item" onclick="showView('shopping')" id="nav-shopping">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Einkaufsliste
      </button>
      <button class="nav-item" onclick="showView('instructions')" id="nav-instructions">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Zubereitung
      </button>
      <button class="nav-item" onclick="showView('manual-shopping')" id="nav-manual-shopping">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Manuell hinzufügen
      </button>
      <button class="nav-item" onclick="showView('database')" id="nav-database">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        Zutatendatenbank
      </button>
    </div>
    <div id="sidebar-footer">
      <div class="storage-info" id="storage-info">💾 Daten lokal gespeichert</div>
      <button onclick="showResetDialog()" style="background:none;border:none;color:rgba(253,246,236,0.25);font-size:11px;cursor:pointer;padding:4px 12px;font-family:inherit;width:100%;text-align:left;" onmouseover="this.style.color='rgba(253,246,236,0.5)'" onmouseout="this.style.color='rgba(253,246,236,0.25)'">⚠ Daten zurücksetzen</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div id="topbar-title">Übersicht</div>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA & STORAGE
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'rezeptkalkulator_v5';

const DEFAULT_CATEGORIES = [

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      STATE = { ...STATE, ...saved };
      if (!STATE.manualShoppingItems) STATE.manualShoppingItems = [];
      // Always merge DEFAULT_INGREDIENT_DB as base — user entries take priority on collision
      STATE.ingredientDB = { ...DEFAULT_INGREDIENT_DB, ...(saved.ingredientDB || {}) };
    } else {
      STATE.recipes = SAMPLE_RECIPES;
      STATE.groups = DEFAULT_GROUPS;
      STATE.categories = DEFAULT_CATEGORIES;
      STATE.ingredientDB = DEFAULT_INGREDIENT_DB;
      saveState();
    }
  } catch(e) {
    STATE.recipes = SAMPLE_RECIPES;
    STATE.groups = DEFAULT_GROUPS;
    STATE.categories = DEFAULT_CATEGORIES;
    STATE.ingredientDB = DEFAULT_INGREDIENT_DB;
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
    updateStorageInfo();
  } catch(e) { console.error('Save failed', e); }
}

  if (!el) return;
  const count = STATE.recipes.length;

}

// ═══════════════════════════════════════════════════════════════
// COOKLANG PARSER
// ═══════════════════════════════════════════════════════════════
function parseCooklang(text) {
  const lines = text.split('\n');
  const ingredients = [];
  const steps = [];
  let servings = null;
  const metadata = {};
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('>>')) {
      const mm = t.match(/^>>\s*([\w]+)\s*:\s*(.+)$/i);
      if (mm) { metadata[mm[1].toLowerCase()] = mm[2].trim(); if (mm[1].toLowerCase()==='servings') servings=parseInt(mm[2]); }
      continue;
    }
    const bs = t.match(/^servings:\s*(\d+)/i);
    if (bs) { servings = parseInt(bs[1]); continue; }
    if (!t || t.startsWith('--')) continue;
    const matches = [...t.matchAll(/@([^{@#~\n]+?)\{([^}]*)\}|@([^{@#~\n\s,\.!?;]+)/g)];
    for (const m of matches) {
      let name, rawBlock;
      if (m[1] !== undefined) { name = m[1].trim(); rawBlock = m[2]; }
      else { name = m[3].trim(); rawBlock = undefined; }
      let amount = null, unit = null;
      if (rawBlock !== undefined) {
        const parts = rawBlock.split('%');
        const rawAmt = parts[0].trim();
        unit = (parts[1] || '').trim() || null;
        if (rawAmt && rawAmt !== '-') { const n = parseFloat(rawAmt.replace(',','.')); if (!isNaN(n)) amount = n; }
      }
      if (name) ingredients.push({ name, amount, unit });
    }
    const clean = t
      .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, '$1')
      .replace(/@([^{@#~\n\s,\.!?;]+)/g, '$1')
      .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
      .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1').trim();
    if (clean) steps.push(clean);
  }
  return { ingredients, steps, servings, metadata };
}

// METADATA HELPER — resolves both 'calories' and 'calories_per_serving'
function getMeta(metadata, key) {
  const synonyms = {
    calories: ['calories','calories_per_serving','caloriesperserving','kcal','kcal_per_serving','cal','energie','energy','kalorien','kkal'],
    protein:  ['protein','protein_per_serving','proteinperserving','proteins','eiweiss','eiweißgehalt','eiweiß'],
    carbs:    ['carbs','carbs_per_serving','carbohydrates','carbohydrates_per_serving','kohlenhydrate','kh','carb'],
    fat:      ['fat','fat_per_serving','fette','fett','fats','lipids'],
    time:     ['time','zeit','dauer','kochzeit','zubereitungszeit','prep_time','cook_time','total_time'],
    temp:     ['temp','temperatur','temperature','backtemperatur','ofentemperatur'],
  };
  const keys = synonyms[key] || [key, key + '_per_serving'];
  for (const k of keys) { const v = metadata[k]; if (v) return v; }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// UNIT LOGIC
// ═══════════════════════════════════════════════════════════════
const UNITS = ['g','kg','ml','l','EL','TL','Stück','Prise','Bund','Packung','Dose','Glas','Scheibe','Scheiben','Zehe','Zehen',''];

function smartUnit(amount, unit) {
  if (!unit || amount === null) return { amount, unit };
  if (unit === 'g' && amount >= 1000) return { amount: parseFloat((amount/1000).toFixed(3)), unit: 'kg' };
  if (unit === 'kg' && amount < 1) return { amount: parseFloat((amount*1000).toFixed(1)), unit: 'g' };
  if (unit === 'ml' && amount >= 1000) return { amount: parseFloat((amount/1000).toFixed(3)), unit: 'l' };
  if (unit === 'l' && amount < 0.1) return { amount: parseFloat((amount*1000).toFixed(1)), unit: 'ml' };
  return { amount, unit };
}

function toBaseAmount(amount, unit) {
  if (unit === 'kg') return amount * 1000;
  if (unit === 'l') return amount * 1000;
  if (unit === 'Prise') return amount * 3;  // 1 Prise = 3g
  if (unit === 'TL') return amount * 5;     // 1 TL = 5g
  if (unit === 'EL') return amount * 15;    // 1 EL = 15g
  return amount;
}

function fromBaseAmount(amount, unit) {
  // Convert Prise, TL, EL to grams for output
  const baseUnit = unit === 'kg' ? 'g' : unit === 'l' ? 'ml' : 
                   (unit === 'Prise' || unit === 'TL' || unit === 'EL') ? 'g' : unit;
  return smartUnit(amount, baseUnit);
}

function formatAmt(amount) {
  if (amount === null || amount === undefined) return '';
  if (Number.isInteger(amount)) return amount.toString();
  if (amount >= 100) return Math.round(amount).toString();
  if (amount >= 10) return parseFloat(amount.toFixed(1)).toString();
  return parseFloat(amount.toFixed(2)).toString();
}

// Format amount for shopping list — always shows unit, adds "Stück" if none given
function fmtShoppingAmt(amount, unit) {
  if (amount === null || amount === undefined) return 'nach Bedarf';
  
  // Convert Prise/TL/EL to grams for shopping list display
  let displayAmount = amount;
  let displayUnit = unit;
  
  if (unit === 'Prise' || unit === 'Prisen') {
    displayAmount = amount * 3;  // 1 Prise = 3g
    displayUnit = 'g';
  } else if (unit === 'TL') {
    displayAmount = amount * 5;  // 1 TL = 5g
    displayUnit = 'g';
  } else if (unit === 'EL') {
    displayAmount = amount * 15; // 1 EL = 15g
    displayUnit = 'g';
  }
  
  // Apply smart unit conversion (g -> kg if large enough)
  if (displayUnit === 'g' || displayUnit === 'ml') {
    const converted = smartUnit(displayAmount, displayUnit);
    displayAmount = converted.amount;
    displayUnit = converted.unit;
  }
  
  const numStr = formatAmt(displayAmount);
  if (displayUnit) return numStr + ' ' + displayUnit;
  // No unit given: show "Stück" to avoid bare numbers like "80 Zwiebeln"
  return numStr + ' Stück';
}

function scaleIngredient(ing, basePeople, targetPeople, overrides, idx) {
  const key = `${idx}_${ing.name}`;
  if (overrides && overrides[key] !== undefined) {
    const ov = overrides[key];
    const { amount: ovAmt, unit: ovUnit } = smartUnit(ov.amount, ov.unit);
    return { ...ing, scaledAmount: ovAmt, scaledUnit: ovUnit, overridden: true, key };
  }
  if (ing.amount === null) return { ...ing, scaledAmount: null, scaledUnit: ing.unit, overridden: false, key };
  const factor = targetPeople / basePeople;
  const raw = ing.amount * factor;
  const { amount, unit } = smartUnit(raw, ing.unit);
  return { ...ing, scaledAmount: amount, scaledUnit: unit, overridden: false, key };
}

function getScaledIngredients(recipe) {
  const { ingredients } = parseCooklang(recipe.rawText);
  return ingredients.map((ing, i) => scaleIngredient(ing, recipe.basePeople, recipe.targetPeople, recipe.manualOverrides, i));
}

        style="width:100%;max-width:400px;padding:10px 12px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:white;"
        oninput="filterRecipes(this.value)">
    </div>
  `;
  c.appendChild(searchDiv);

  // Selected count info
  const selectedCount = STATE.recipes.filter(r => r.selectedForList).length;
  if (STATE.recipes.length > 0) {
    const info = document.createElement('div');
    info.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13.5px;color:var(--text2);';
    info.innerHTML = `<span><strong>${selectedCount}</strong> von <strong>${STATE.recipes.length}</strong> Rezepten für die Einkaufsliste ausgewählt</span>
      <button class="btn btn-ghost btn-xs" onclick="selectAll(true)">Alle</button>
      <button class="btn btn-ghost btn-xs" onclick="selectAll(false)">Keine</button>`;
    c.appendChild(info);
  }

  if (STATE.recipes.length === 0) {
    c.innerHTML += `<div class="empty-state">
      <div class="icon">📖</div>
      <h3>Noch keine Rezepte vorhanden</h3>
      <p>Erstelle dein erstes Rezept oder importiere .cook Dateien.</p>
    </div>`;
    return;
  }

  // Group recipes
  const byGroup = {};
  for (const r of STATE.recipes) {
    const g = r.group || 'Sonstiges';
    if (!byGroup[g]) byGroup[g] = [];
    byGroup[g].push(r);
  }

  const groupOrder = [...STATE.groups, ...Object.keys(byGroup).filter(g => !STATE.groups.includes(g))];

  for (const group of groupOrder) {
    if (!byGroup[group]) continue;
    const recipes = byGroup[group];
    const collapsed = STATE.collapsedGroups[group];

    const groupDiv = document.createElement('div');
    groupDiv.className = 'recipe-group';

    // Group header
    const header = document.createElement('div');
    header.className = 'recipe-group-header';
    header.innerHTML = `
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
      </svg>
      <span>${group}</span>
      <span class="group-count">${recipes.length} Rezept${recipes.length !== 1 ? 'e' : ''}</span>
      <span class="group-toggle">${collapsed ? '▶' : '▼'}</span>
    `;
    header.onclick = () => {
      STATE.collapsedGroups[group] = !STATE.collapsedGroups[group];
      saveState();
      renderView();
    };
    groupDiv.appendChild(header);

    if (!collapsed) {
      // Sort recipes alphabetically by name
      const sortedRecipes = [...recipes].sort((a, b) => a.name.localeCompare(b.name, 'de'));
      for (const recipe of sortedRecipes) {
        groupDiv.appendChild(buildRecipeCard(recipe));
      }
    }
    c.appendChild(groupDiv);
  }
}

// Export a single recipe as .cook file
function exportRecipeAsCook() {
  // Sync current editor fields first
  syncEditorFields();
  
  // Get data from editor state
  const name = editorState.name || 'Rezept';
  const basePeople = editorState.basePeople || 4;
  const rawText = editorState.rawText || '';
  
  if (!rawText.trim()) {
    alert('Bitte füge zuerst Rezeptinhalt hinzu.');
    return;
  }
  
  // Build .cook file content
  let cookContent = '';
  
  // Add metadata
  cookContent += '>> servings: ' + basePeople + '\n';
  cookContent += '\n';
  
  // Add the raw recipe text
  cookContent += rawText;
  
  // Create and download the file
  const blob = new Blob([cookContent], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name.replace(/[^a-zA-Z0-9äöüÄÖÜß\-_\s]/g, '').trim() + '.cook';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function filterRecipes(searchTerm) {
  const term = searchTerm.toLowerCase().trim();
  const cards = document.querySelectorAll('.recipe-card');
  const groups = document.querySelectorAll('.recipe-group');
  
  if (!term) {
    // Show all
    cards.forEach(card => card.style.display = '');
    groups.forEach(group => group.style.display = '');
    return;
  }
  
  // Hide/show cards based on search
  cards.forEach(card => {
    const nameEl = card.querySelector('.recipe-card-name');
    const name = nameEl ? nameEl.textContent.toLowerCase() : '';
    if (name.includes(term)) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
  
  // Hide groups that have no visible cards
  groups.forEach(group => {
    const allCards = group.querySelectorAll('.recipe-card');
    let hasVisible = false;
    allCards.forEach(card => {
      if (card.style.display !== 'none') hasVisible = true;
    });
    group.style.display = hasVisible ? '' : 'none';
  });
}

function buildRecipeCard(recipe) {
  const factor = recipe.targetPeople / recipe.basePeople;

  const ingCount = ingredients.length;

  const card = document.createElement('div');
  card.className = `recipe-card ${recipe.selectedForList ? 'selected' : ''}`;

  const header = document.createElement('div');
  header.className = 'recipe-card-header';

  // Build inner HTML safely
  const rid = String(recipe.id);
  const nameHtml = escHtml(recipe.name);
  const factorBadge = factor !== 1 ? `<span class="badge ${factor > 1 ? 'badge-green' : 'badge-red'}">×${parseFloat(factor.toFixed(2))}</span>` : '';
  const overrideBadge = overrideCount > 0 ? `<span class="badge badge-warm">✎ ${overrideCount} Korrektur${overrideCount !== 1 ? 'en' : ''}</span>` : '';

  header.innerHTML = `
    <label class="toggle-check" onclick="event.stopPropagation()">
      <input type="checkbox" ${recipe.selectedForList ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--green);" data-id="${rid}" class="recipe-select-cb">
    </label>
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="recipe-card-name">${nameHtml}</div>
        ${overrideCount > 0 ? `<span style="display:inline-flex;align-items:center;gap:4px;background:#a0622a;color:white;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;">✎ ${overrideCount} Korrektur${overrideCount !== 1 ? 'en' : ''}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;">
        <span class="badge badge-gray">${ingCount} Zutaten</span>
        <span class="badge badge-gray">Basis: ${recipe.basePeople} Pers.</span>
        ${factorBadge}
        ${recipe.noServingsInfo ? '<span class="badge" style="background:#fff3cd;color:#7d5a00;border:1px solid #f0d060;" title="Keine Portionsangabe im Rezept">⚠️ keine Portionsangabe</span>' : ''}
        ${(() => { const m = parseCooklang(recipe.rawText).metadata; const pairs = [['time','⏱'],['calories','🔥'],['protein','💪 Protein'],['carbs','🌾 Kohlenhydrate'],['fat','🥑 Fett']]; return pairs.filter(([k])=>getMeta(m,k)).map(([k,icon])=>'<span class="badge badge-gray">'+icon+' '+escHtml(getMeta(m,k))+'</span>').join(''); })()}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <div class="person-stepper">
        <button type="button" data-action="dec" data-id="${rid}">−</button>
        <input type="number" min="1" value="${recipe.targetPeople}" data-action="set" data-id="${rid}" style="width:52px;">
        <button type="button" data-action="inc" data-id="${rid}">+</button>
      </div>
      <span style="font-size:12px;color:var(--text3);">Pers.</span>
      <button type="button" class="btn btn-ghost btn-sm" data-action="steps" data-id="${rid}" style="color:var(--accent2);border-color:var(--border);">📋 Zubereitung</button>
      <button type="button" class="btn btn-outline btn-sm" data-action="edit" data-id="${rid}">✏️ Bearbeiten</button>
      <button type="button" class="btn btn-danger btn-sm" data-action="delete" data-id="${rid}">🗑</button>
    </div>
  `;

  // Attach events via data attributes to avoid inline onclick issues with IDs
  header.querySelector('.recipe-select-cb').addEventListener('change', function() {
    toggleRecipeSelected(recipe.id);
  });
  header.querySelector('[data-action="dec"]').addEventListener('click', function(e) {
    e.stopPropagation(); changeTarget(recipe.id, -1);
  });
  header.querySelector('[data-action="inc"]').addEventListener('click', function(e) {
    e.stopPropagation(); changeTarget(recipe.id, 1);
  });
  header.querySelector('[data-action="set"]').addEventListener('change', function(e) {
    e.stopPropagation(); setTarget(recipe.id, this.value);
  });
  header.querySelector('[data-action="steps"]').addEventListener('click', function(e) {
    e.stopPropagation(); showRecipeSteps(recipe.id);
  });
  header.querySelector('[data-action="edit"]').addEventListener('click', function(e) {
    e.stopPropagation(); showView('recipe-edit', recipe.id);
  });
  header.querySelector('[data-action="delete"]').addEventListener('click', function(e) {
    e.stopPropagation(); deleteRecipe(recipe.id);
  });

  card.appendChild(header);
  return card;
}

function toggleRecipeSelected(id) {
  const r = STATE.recipes.find(r => String(r.id) === String(id));
  if (r) { r.selectedForList = !r.selectedForList; saveState(); renderView(); }
}

function selectAll(val) {
  STATE.recipes.forEach(r => r.selectedForList = val);
  saveState(); renderView();
}

function changeTarget(id, delta) {
  const r = STATE.recipes.find(r => String(r.id) === String(id));
  if (r) { r.targetPeople = Math.max(1, r.targetPeople + delta); r.manualOverrides = {}; saveState(); renderView(); }
}

function setTarget(id, val) {
  const n = parseInt(val);
  if (!n || n < 1) return;
  const r = STATE.recipes.find(r => String(r.id) === String(id));
  if (r) { r.targetPeople = n; r.manualOverrides = {}; saveState(); renderView(); }
}

function showRecipeSteps(id) {
  const recipe = STATE.recipes.find(r => String(r.id) === String(id));
  if (!recipe) return;

  const scaled = getScaledIngredients(recipe);

  // Sort alphabetically, only show ingredients with a real amount separately from "nach Bedarf"
  const withAmount = [...scaled].filter(i => i.scaledAmount !== null).sort((a,b) => a.name.localeCompare(b.name, 'de'));
  const withoutAmount = [...scaled].filter(i => i.scaledAmount === null).sort((a,b) => a.name.localeCompare(b.name, 'de'));
  const sortedIng = [...withAmount, ...withoutAmount];

  const ingGridItems = sortedIng.map(ing => {
    if (ing.scaledAmount !== null) {
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);gap:10px;">
        <span style="font-style:italic;color:var(--text);">${escHtml(ing.name)}</span>
        <strong style="color:var(--accent);white-space:nowrap;">${formatAmt(ing.scaledAmount)}${ing.scaledUnit ? ' ' + ing.scaledUnit : ''}</strong>
      </div>`;
    } else {
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);gap:10px;">
        <span style="font-style:italic;color:var(--text);">${escHtml(ing.name)}</span>
        <span style="color:var(--text3);font-size:12px;">nach Bedarf</span>
      </div>`;
    }
  }).join('');

  // Build steps — highlight ingredients WITH scaled amounts inline
  // Build a lookup: ingredient name (lowercase) → scaled display string
  const ingLookup = {};
  for (const ing of scaled) {
    const k = ing.name.toLowerCase().trim();
    const amt = ing.scaledAmount !== null ? ` (${formatAmt(ing.scaledAmount)}${ing.scaledUnit ? ' ' + ing.scaledUnit : ''})` : '';
    ingLookup[k] = { name: ing.name, amt };
  }
  const lines = recipe.rawText.split('\n');
  const steps = [];
  for (const line of lines) {
    const t = line.trim();
    if (!t || t.startsWith('--')) continue;
    // Skip all >> metadata lines
    if (t.startsWith('>>') || /^servings:/i.test(t)) continue;
    const cleaned = t
      .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, (_, name) => {
        const info = ingLookup[name.trim().toLowerCase()];
        return '<strong style="color:var(--accent2);">' + escHtml(name.trim()) + '</strong>'
          + (info?.amt ? '<span style="color:var(--accent);font-size:0.88em;"> ' + escHtml(info.amt) + '</span>' : '');
      })
      .replace(/@([^{@#~\n\s,\.!?;]+)/g, (_, name) => {
        const info = ingLookup[name.trim().toLowerCase()];
        return '<strong style="color:var(--accent2);">' + escHtml(name.trim()) + '</strong>'
          + (info?.amt ? '<span style="color:var(--accent);font-size:0.88em;"> ' + escHtml(info.amt) + '</span>' : '');
      })
      .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
      .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1');
    if (cleaned.trim()) steps.push(cleaned.trim());
  }

  const stepsHtml = steps.length === 0
    ? '<p style="color:var(--text3);font-style:italic;padding:12px 0;">Keine Zubereitungsschritte vorhanden.</p>'
    : steps.map((s, i) => `
      <div style="display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border2);align-items:flex-start;">
        <div style="min-width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fdf6ec;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;">${i+1}</div>
        <div style="flex:1;line-height:1.75;font-size:14.5px;">${s}</div>
      </div>`).join('');

  const { metadata: recipeMeta } = parseCooklang(recipe.rawText);
  const metaIcons = { time:'&#9201;', temp:'&#127777;', calories:'&#128293;', protein:'Protein', carbs:'Kohlenhydrate', fat:'Fett' };
  const metaBadges = ['time','temp','calories','protein','carbs','fat']
    .filter(k => getMeta(recipeMeta,k))
    .map(k => '<span class="badge badge-gray">' + metaIcons[k] + ' ' + escHtml(getMeta(recipeMeta,k)) + '</span>').join('');

  showModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:${metaBadges ? '10px' : '22px'};padding-bottom:16px;border-bottom:${metaBadges ? 'none' : '2px solid var(--border2)'}">
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-style:italic;color:var(--accent);flex:1;">${escHtml(recipe.name)}</div>
      <span class="badge badge-green">für ${recipe.targetPeople} Personen</span>
      <span class="badge badge-gray">Basis: ${recipe.basePeople} Pers.</span>
    </div>
    ${metaBadges ? '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:16px;border-bottom:2px solid var(--border2);">' + metaBadges + '</div>' : ''}
    <div style="margin-bottom:24px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:10px;">Zutaten</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0 32px;">${ingGridItems}</div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:4px;">Zubereitung</div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:10px;">Zutaten sind <strong style="color:var(--accent2);">hervorgehoben</strong></p>
      ${stepsHtml}
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border2);">
      <button class="btn btn-primary" onclick="closeModal()">Schließen</button>
    </div>
  `);
}

function addFolderModal() {
  const val = document.getElementById('new-folder-input')?.value?.trim();
  if (!val || STATE.groups.includes(val)) return;
  STATE.groups.push(val);
  document.getElementById('new-folder-input').value = '';
  saveState();
  if (window._renderFolderList) window._renderFolderList();
}

function deleteFolderModal(group) {
  const count = STATE.recipes.filter(r => r.group === group).length;
  if (count > 0) {
    // Move recipes to first remaining group or Sonstiges
    const fallback = STATE.groups.find(g => g !== group) || 'Sonstiges';
    STATE.recipes.forEach(r => { if (r.group === group) r.group = fallback; });
  }
  STATE.groups = STATE.groups.filter(g => g !== group);
  saveState();
  if (window._renderFolderList) window._renderFolderList();
}

      <div class="field" style="margin:0;">
        <label class="field-label">Ordner</label>
        <select id="ed-group">
          ${STATE.groups.map(g => `<option value="${escHtml(g)}" ${editorState.group === g ? 'selected' : ''}>${escHtml(g)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="margin:0;">
        <label class="field-label">Basis (Pers.)</label>
        <input type="number" id="ed-base" min="1" value="${editorState.basePeople}" style="width:80px;">
      </div>
      <div class="field" style="margin:0;">
        <label class="field-label">Ziel (Pers.)</label>
        <input type="number" id="ed-target" min="1" value="${editorState.targetPeople}" style="width:80px;">
      </div>
    </div>
  `;
  c.appendChild(meta);

  // TABS
  const tabBar = document.createElement('div');
  tabBar.className = 'tabs';
  tabBar.innerHTML = `
    <button class="tab ${editorState.tab === 'edit' ? 'active' : ''}" onclick="switchEditorTab('edit')">✏️ Cooklang Editor</button>
    <button class="tab ${editorState.tab === 'preview' ? 'active' : ''}" onclick="switchEditorTab('preview')">📐 Vorschau & Korrekturen</button>
    <button class="tab ${editorState.tab === 'steps' ? 'active' : ''}" onclick="switchEditorTab('steps')">📋 Zubereitung</button>
  `;
  c.appendChild(tabBar);

  const tabContent = document.createElement('div');
  tabContent.id = 'editor-tab-content';
  c.appendChild(tabContent);

  renderEditorTab();
}

function switchEditorTab(tab) {
  syncEditorFields();
  editorState.tab = tab;
  
  // Update tab button active states
  const tabs = document.querySelectorAll('.tabs .tab');
  tabs.forEach(t => {
    t.classList.remove('active');
    if (t.textContent.includes('Editor') && tab === 'edit') t.classList.add('active');
    if (t.textContent.includes('Vorschau') && tab === 'preview') t.classList.add('active');
    if (t.textContent.includes('Zubereitung') && tab === 'steps') t.classList.add('active');
  });
  
  renderEditorTab();
}

function syncEditorFields() {
  const name = document.getElementById('ed-name');
  const group = document.getElementById('ed-group');
  const base = document.getElementById('ed-base');
  const target = document.getElementById('ed-target');
  const rawText = document.getElementById('ed-rawtext');
  if (name) editorState.name = name.value;
  if (group) editorState.group = group.value;
  if (base) editorState.basePeople = parseInt(base.value) || 4;
  if (target) editorState.targetPeople = parseInt(target.value) || 4;
  if (rawText) editorState.rawText = rawText.value;
}

function renderEditorTab() {
  const tc = document.getElementById('editor-tab-content');
  if (!tc) return;
  tc.innerHTML = '';

  if (editorState.tab === 'edit') {
    const div = document.createElement('div');
    div.style.display = 'grid';
    div.style.gridTemplateColumns = '1fr 260px';
    div.style.gap = '16px';
    div.innerHTML = `
      <div>
        <textarea class="code-editor" id="ed-rawtext" placeholder="-- Rezeptname\n\n@Zutat{Menge%Einheit} Zubereitungstext...">${escHtml(editorState.rawText)}</textarea>
      </div>
      <div>
        <div class="syntax-hint">
          <div class="comment">-- Kommentare</div>
          <div style="margin-top:8px;"><span class="ingredient">@Hackfleisch</span><span style="color:#aaa;">{</span><span class="amount">500%g</span><span style="color:#aaa;">}</span></div>
          <div><span class="ingredient">@Zwiebel</span><span style="color:#aaa;">{</span><span class="amount">1%Stück</span><span style="color:#aaa;">}</span></div>
          <div><span class="ingredient">@Salz</span><span style="color:#aaa;">{}</span> <span style="color:#6b5940;">← ohne Menge</span></div>
          <div style="margin-top:12px;color:#8a7060;font-size:11px;">EINHEITEN:</div>
          <div style="color:#a09080;font-size:11px;line-height:1.8;">g · kg · ml · l<br>EL · TL<br>Stück · Prise<br>Bund · Packung<br>Dose · Glas</div>
          <div style="margin-top:10px;color:#8a7060;font-size:11px;">g → kg ab 1000g<br>ml → l ab 1000ml</div>
        </div>
      </div>
    `;
    tc.appendChild(div);

  } else if (editorState.tab === 'preview') {
    syncEditorFields();
    const { ingredients } = parseCooklang(editorState.rawText);
    const scaled = ingredients.map((ing, i) => scaleIngredient(ing, editorState.basePeople, editorState.targetPeople, editorState.manualOverrides, i));
    const overrideCount = Object.keys(editorState.manualOverrides).length;
    const factor = editorState.targetPeople / editorState.basePeople;

    if (scaled.length === 0) {
      tc.innerHTML = `<div class="empty-state"><div class="icon">🧪</div><h3>Keine Zutaten erkannt</h3><p>Füge im Editor Zutaten mit @ hinzu.</p></div>`;
      return;
    }

    const div = document.createElement('div');
    div.className = 'card';

    let headerHtml = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <h3 style="font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--accent);">Zutaten für ${editorState.targetPeople} Personen</h3>
      <span class="badge badge-gray">Basis: ${editorState.basePeople} Pers. · Faktor: ×${parseFloat(factor.toFixed(3))}</span>
      ${overrideCount > 0 ? `<span class="badge badge-warm">✎ ${overrideCount} manuelle Korrektur${overrideCount !== 1 ? 'en' : ''}</span>
        <button class="btn btn-ghost btn-xs" onclick="clearAllOverrides()">Alle zurücksetzen</button>` : ''}
    </div>`;

    let tableHtml = `<table>
      <thead><tr>
        <th>Zutat</th>
        <th style="text-align:right;">1 Person</th>
        <th style="text-align:right;">${editorState.targetPeople} Personen</th>
        <th>Status</th>
        <th>Korrektur</th>
      </tr></thead><tbody>`;

    for (const ing of scaled) {
      const onePAmt = ing.amount !== null ? (() => {
        const a = ing.amount / editorState.basePeople;
        const { amount, unit } = smartUnit(a, ing.unit);
        return `${formatAmt(amount)}${unit ? ' ' + unit : ''}`;
      })() : '—';

      const scaledStr = ing.scaledAmount !== null ? `${formatAmt(ing.scaledAmount)}${ing.scaledUnit ? ' ' + ing.scaledUnit : ''}` : '—';

      const isEditing = editorState.editingOverrideKey === ing.key;
      let correctionCell = '';
      if (isEditing) {
        correctionCell = `<div class="override-form">
          <input type="number" id="ov-amt" value="${ing.scaledAmount ?? ''}" style="width:75px;">
          <select id="ov-unit">${UNITS.map(u => `<option value="${u}" ${ing.scaledUnit === u ? 'selected' : ''}>${u || '—'}</option>`).join('')}</select>
          <button class="btn btn-green btn-xs" onclick="saveOverride('${ing.key}')">✓</button>
          <button class="btn btn-ghost btn-xs" onclick="cancelOverride()">✕</button>
        </div>`;
      } else {
        correctionCell = `<div style="display:flex;gap:5px;">
          <button class="btn btn-outline btn-xs" onclick="startOverride('${ing.key}')">Korrigieren</button>
          ${ing.overridden ? `<button class="btn btn-ghost btn-xs" onclick="clearOverride('${ing.key}')" title="Zurücksetzen">✕</button>` : ''}
        </div>`;
      }

      tableHtml += `<tr style="${ing.overridden ? 'background:#fffbf0;' : ''}">
        <td style="font-style:italic;">${escHtml(ing.name)}</td>
        <td style="text-align:right;color:var(--text3);">${onePAmt}</td>
        <td style="text-align:right;font-weight:600;">${scaledStr}</td>
        <td>${ing.overridden ? '<span class="badge badge-warm">✎ korrigiert</span>' : '<span style="font-size:12px;color:var(--text3);">berechnet</span>'}</td>
        <td>${correctionCell}</td>
      </tr>`;
    }

    tableHtml += '</tbody></table>';
    div.innerHTML = headerHtml + tableHtml;
    tc.appendChild(div);

  } else if (editorState.tab === 'steps') {
    syncEditorFields();
    
    // Parse ingredients with scaling
    const { ingredients } = parseCooklang(editorState.rawText);
    const factor = editorState.targetPeople / editorState.basePeople;
    
    // Build ingredients HTML
    let ingHtml = '';
    if (ingredients.length > 0) {
      ingHtml = ingredients.map(ing => {
        let amtStr = '';
        if (ing.amount !== null) {
          const scaled = ing.amount * factor;
          const { amount, unit } = smartUnit(scaled, ing.unit);
          amtStr = formatAmt(amount) + (unit ? ' ' + unit : '');
        } else if (ing.unit) {
          amtStr = ing.unit;
        }
        return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2);">
          <span style="font-weight:500;">${escHtml(ing.name)}</span>
          <span style="color:var(--accent);font-weight:600;">${amtStr || 'nach Bedarf'}</span>
        </div>`;
      }).join('');
    } else {
      ingHtml = `<div style="color:var(--text3);font-style:italic;">Keine Zutaten gefunden</div>`;
    }
    
    // Parse steps and clean cooklang syntax: @Ingredient{amount%unit} -> Ingredient (bold)
    const lines = editorState.rawText.split('\n');
    const steps = [];
    for (const line of lines) {
      const t = line.trim();
      if (!t || t.startsWith('--') || t.startsWith('>>') || /^servings:/i.test(t)) continue;
      const cleaned = t
        .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, '<strong>$1</strong>')
        .replace(/@([^{@#~\n\s]+)/g, '<strong>$1</strong>')
        .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
        .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1');
      if (cleaned.trim()) steps.push(cleaned.trim());
    }
    
    let stepsHtml = '';
    if (steps.length === 0) {
      stepsHtml = `<div class="empty-state"><div class="icon">📋</div><h3>Keine Zubereitungsschritte</h3><p>Schreibe Zubereitungstext im Editor.</p></div>`;
    } else {
      stepsHtml = steps.map((s, i) => `
        <div style="display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border2);align-items:flex-start;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fdf6ec;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;margin-top:1px;">${i+1}</div>
          <div style="flex:1;line-height:1.7;font-size:15px;">${s}</div>
        </div>
      `).join('');
    }
    
    // Create side-by-side layout
    const container = document.createElement('div');
    container.style.cssText = 'display:grid;grid-template-columns:280px 1fr;gap:24px;';
    container.innerHTML = `
      <div class="card" style="height:fit-content;position:sticky;top:20px;">
        <h3 style="font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--accent);margin-bottom:12px;">
          🥗 Zutaten
        </h3>
        <div style="font-size:13px;color:var(--text3);margin-bottom:12px;">${editorState.targetPeople} Personen</div>
        <div>${ingHtml}</div>
      </div>
      <div class="card">
        <h3 style="font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--accent);margin-bottom:4px;">📋 Zubereitung</h3>
        <p style="font-size:12.5px;color:var(--text3);margin-bottom:16px;">Zutaten sind <strong>fett</strong> hervorgehoben</p>
        <div>${stepsHtml}</div>
      </div>
    `;
    tc.appendChild(container);
  }
}

function startOverride(key) {
  editorState.editingOverrideKey = key;
  renderEditorTab();
}

function cancelOverride() {
  editorState.editingOverrideKey = null;
  renderEditorTab();
}

function saveOverride(key) {
  const amt = parseFloat(document.getElementById('ov-amt').value);
  const unit = document.getElementById('ov-unit').value;
  if (!isNaN(amt)) {
    editorState.manualOverrides[key] = { amount: amt, unit };
    // Also write live to STATE so shopping list / Zubereitung reflect it immediately
    if (editingRecipeId) {
      const r = STATE.recipes.find(r => String(r.id) === String(editingRecipeId));
      if (r) { r.manualOverrides = { ...editorState.manualOverrides }; saveState(); }
    }
  }
  editorState.editingOverrideKey = null;
  renderEditorTab();
}

function clearOverride(key) {
  delete editorState.manualOverrides[key];
  if (editingRecipeId) {
    const r = STATE.recipes.find(r => String(r.id) === String(editingRecipeId));
    if (r) { r.manualOverrides = { ...editorState.manualOverrides }; saveState(); }
  }
  renderEditorTab();
}

function clearAllOverrides() {
  editorState.manualOverrides = {};
  if (editingRecipeId) {
    const r = STATE.recipes.find(r => String(r.id) === String(editingRecipeId));
    if (r) { r.manualOverrides = {}; saveState(); }
  }
  renderEditorTab();
}

function saveRecipe() {
  syncEditorFields();
  if (!editorState.name.trim()) { alert('Bitte einen Rezeptnamen eingeben.'); return; }
  if (!editorState.rawText.trim()) { alert('Bitte Rezepttext eingeben.'); return; }

  const recipe = {
    id: editingRecipeId || Date.now(),
    name: editorState.name.trim(),
    group: editorState.group,
    basePeople: editorState.basePeople,
    targetPeople: editorState.targetPeople,
    rawText: editorState.rawText,
    manualOverrides: editorState.manualOverrides,
    selectedForList: editorState.selectedForList
  };

  if (editingRecipeId) {
    const idx = STATE.recipes.findIndex(r => r.id === editingRecipeId);
    if (idx !== -1) STATE.recipes[idx] = recipe;
  } else {
    STATE.recipes.push(recipe);
  }
  editorState = {};
  saveState();
  showView('overview');
}

// IMPORT .cook FILES
// ═══════════════════════════════════════════════════════════════
function importCookFiles(input) {
  handleDroppedFiles(input.files);
}

function handleDroppedFiles(files) {
  const cookFiles = [...files].filter(f => f.name.endsWith('.cook'));
  if (cookFiles.length === 0) { alert('Keine .cook Dateien gefunden.'); return; }
  const pending = [];
  let loaded = 0;
  for (const file of cookFiles) {
    const reader = new FileReader();
    reader.onload = e => {
      const name = file.name.replace(/\.cook$/, '').replace(/-/g, ' ').replace(/_/g, ' ');
      const parsed = parseCooklang(e.target.result);
      pending.push({ name, rawText: e.target.result, servings: parsed.servings || null });
      loaded++;
      if (loaded === cookFiles.length) showImportFolderDialog(pending);
    };
    reader.readAsText(file);
  }
}

function showImportFolderDialog(pending) {
  const listHtml = pending.map(p => '<li style="padding:2px 0;font-style:italic;color:var(--text2);">' + escHtml(p.name) + '</li>').join('');
  const btnHtml = STATE.groups.map(g =>
    '<button class="btn btn-outline" style="text-align:left;justify-content:flex-start;width:100%;" onclick="doImportRecipes(' + "'pending_import'" + ', ' + "'"+g+"'" + ')">' + escHtml(g) + '</button>'
  ).join('');
  // Store pending on window temporarily
  window._importPending = pending;
  showModal(
    '<div class="modal-title">In welchen Ordner?</div>' +
    '<p style="color:var(--text3);font-size:13px;margin-bottom:10px;">' + pending.length + ' Rezept' + (pending.length !== 1 ? 'e' : '') + ' bereit:</p>' +
    '<ul style="margin:0 0 16px 18px;font-size:13px;">' + listHtml + '</ul>' +
    '<div style="display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;">' + btnHtml + '</div>' +
    '<div class="modal-actions" style="margin-top:14px;"><button class="btn btn-outline" onclick="closeModal()">Abbrechen</button></div>'
  );
}

function doImportRecipes(_, group) {
  const pending = window._importPending || [];
  for (const item of pending) {
    const bp = item.servings || 1;
    STATE.recipes.push({
      id: Date.now() + Math.random(),
      name: item.name, group,
      basePeople: bp, targetPeople: bp,
      noServingsInfo: !item.servings,
      rawText: item.rawText,
      manualOverrides: {}, selectedForList: true
    });
  }
  window._importPending = null;
  saveState(); closeModal(); renderView();
}

// SHOPPING LIST
// ═══════════════════════════════════════════════════════════════
let shoppingMode = 'detailed';


// Normalize ingredient name for grouping (handles singular/plural)
// Returns normalized key for grouping - we'll use the original names for display
function normalizeForGrouping(name) {
  const lower = name.toLowerCase().trim();
  
  // Remove common German plural endings to create grouping key
  // -en ending (Bananen -> Banan, Tomaten -> Tomat)
  if (lower.endsWith('en') && lower.length > 4) {
    return lower.slice(0, -2);
  }
  // -n ending after -e (Banane -> Banan)
  if (lower.endsWith('e') && lower.length > 3) {
    return lower.slice(0, -1);
  }
  // -er ending for specific words (Eier -> Ei)
  if (lower === 'eier') return 'ei';
  if (lower === 'ei') return 'ei';
  // -s ending (Kiwis -> Kiwi)
  if (lower.endsWith('s') && lower.length > 3 && !lower.endsWith('ss')) {
    return lower.slice(0, -1);
  }
  
  return lower;
}

function buildShoppingData() {
  // Returns {allItems, byCat, summarized, byRecipe, catOrder}
  const selected = STATE.recipes.filter(r => r.selectedForList);
  const allItems = [];
  for (const recipe of selected) {
    const scaled = getScaledIngredients(recipe);
    for (const ing of scaled) {
      const nameLower = ing.name.toLowerCase().trim();
      const category = findCategory(nameLower);
      allItems.push({ name: ing.name, nameLower, amount: ing.scaledAmount, unit: ing.scaledUnit, recipe: recipe.name, recipeId: recipe.id, category });
    }
  }
  // Add manual items
  for (const mi of (STATE.manualShoppingItems || [])) {
    const nameLower = mi.name.toLowerCase().trim();
    const category = mi.category || findCategory(nameLower) || 'Sonstiges';
    if (mi.active === false) continue;
    allItems.push({ name: mi.name, nameLower, amount: mi.amount || null, unit: mi.unit || null,
      recipe: '✚ Manuell hinzugefügt', recipeId: null, category, manual: true, id: mi.id, note: mi.note || null });
  }
  // Detailed by category
  const byCat = {};
  for (const item of allItems) {
    if (!byCat[item.category]) byCat[item.category] = [];
    byCat[item.category].push(item);
  }
  Object.keys(byCat).forEach(c => byCat[c].sort((a,b) => a.name.localeCompare(b.name,'de')));
  // Summarized: only merge if units are compatible (g+kg, ml+l, or identical)
  function unitGroup(u) {
    if (!u || u === 'Stueck') return 'piece';
    if (u === 'g' || u === 'kg' || u === 'Prise' || u === 'TL' || u === 'EL') return 'weight';
    if (u === 'ml' || u === 'l') return 'volume';
    return u;
  }
  const gm = {};
  for (const item of allItems) {
    // Use normalized name for grouping key (handles Banane/Bananen as same)
    const normalizedName = normalizeForGrouping(item.name);
    const k = normalizedName + '||' + unitGroup(item.unit);
    if (!gm[k]) {
      gm[k] = { name: item.name, nameLower: item.nameLower, amount: item.amount, unit: item.unit, recipes: [item.recipe], category: item.category, manual: item.manual || false, note: item.note || null };
    } else {
      // Keep the longer name (usually the plural form)
      if (item.name.length > gm[k].name.length) {
        gm[k].name = item.name;
        gm[k].nameLower = item.nameLower;
      }
      if (item.amount !== null && gm[k].amount !== null) {
        const r = fromBaseAmount(toBaseAmount(gm[k].amount, gm[k].unit) + toBaseAmount(item.amount, item.unit), gm[k].unit);
        gm[k].amount = r.amount; gm[k].unit = r.unit;
      } else if (item.amount !== null && gm[k].amount === null) { gm[k].amount = item.amount; gm[k].unit = item.unit; }
      if (!gm[k].recipes.includes(item.recipe)) gm[k].recipes.push(item.recipe);
      if (item.manual) gm[k].manual = true;
      if (item.note && !gm[k].note) gm[k].note = item.note;
    }
  }
  const summarized = {};
  for (const item of Object.values(gm)) {
    if (!summarized[item.category]) summarized[item.category] = [];
    summarized[item.category].push(item);
  }
  Object.keys(summarized).forEach(c => summarized[c].sort((a,b) => a.name.localeCompare(b.name,'de')));
  // By recipe – merge duplicate ingredient names within each recipe
  const byRecipe = selected.map(recipe => {
    const scaled = getScaledIngredients(recipe);
    const merged = {};
    for (const ing of scaled) {
      const k = ing.name.toLowerCase().trim();
      if (!merged[k]) {
        merged[k] = { ...ing };
      } else {
        if (ing.scaledAmount !== null && merged[k].scaledAmount !== null) {
          const base = toBaseAmount(merged[k].scaledAmount, merged[k].scaledUnit) + toBaseAmount(ing.scaledAmount, ing.scaledUnit);
          const r = fromBaseAmount(base, merged[k].scaledUnit);
          merged[k].scaledAmount = r.amount; merged[k].scaledUnit = r.unit;
        } else if (ing.scaledAmount !== null && merged[k].scaledAmount === null) {
          merged[k].scaledAmount = ing.scaledAmount; merged[k].scaledUnit = ing.scaledUnit;
        }
      }
    }
    const items = Object.values(merged).sort((a,b) => a.name.localeCompare(b.name,'de'));
    return { recipe, items };
  });
  const catOrder = [...STATE.categories.filter(c => Object.keys(byCat).includes(c)), ...Object.keys(byCat).filter(k => !STATE.categories.includes(k))];
  return { allItems, byCat, summarized, byRecipe, catOrder, selected };
}

function renderShopping() {
  setTopbar('Einkaufsliste', `
    <button class="btn btn-outline btn-sm" onclick="exportShoppingListMobile()">📱 Export</button>
    <button class="btn btn-outline btn-sm" onclick="printShoppingList()">🖨️ Drucken</button>
  `);

  const c = document.getElementById('content');
  const selected = STATE.recipes.filter(r => r.selectedForList);

  const activeManualItems = (STATE.manualShoppingItems || []).filter(i => i.active !== false);
  if (selected.length === 0 && activeManualItems.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="icon">🛒</div><h3>Keine Einträge</h3><p>Wähle in der Übersicht Rezepte aus oder füge manuell Artikel hinzu.</p></div>`;
    return;
  }

  const { allItems, byCat, summarized, byRecipe, catOrder } = buildShoppingData();

  // Mode toggle
  const modeDiv = document.createElement('div');
  modeDiv.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;';
  modeDiv.innerHTML = `
    <div style="display:flex;background:white;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;">
      <button class="btn ${shoppingMode === 'detailed' ? 'btn-primary' : 'btn-ghost'}" onclick="setShoppingMode('detailed')" style="border-radius:0;border:none;">📋 Ausführlich</button>
      <button class="btn ${shoppingMode === 'compact' ? 'btn-primary' : 'btn-ghost'}" onclick="setShoppingMode('compact')" style="border-radius:0;border:none;border-left:1px solid var(--border);">📝 Zusammengefasst</button>
      <button class="btn ${shoppingMode === 'byrecipe' ? 'btn-primary' : 'btn-ghost'}" onclick="setShoppingMode('byrecipe')" style="border-radius:0;border:none;border-left:1px solid var(--border);">📂 Nach Rezepten</button>
    </div>
    <span style="font-size:13px;color:var(--text3);">${selected.length} Rezept${selected.length !== 1 ? 'e' : ''} · ${allItems.length} Positionen</span>
    <button class="btn btn-ghost btn-sm" onclick="STATE.shoppingChecked={};saveState();renderView()">☐ Alle abhaken</button>
  `;
  c.appendChild(modeDiv);

  // Description for current mode
  const descriptions = {
    detailed: '📋 <b>Ausführlich</b> — Jede Zutat einzeln mit Rezeptzuordnung',
    compact: '📝 <b>Zusammengefasst</b> — Gleiche Zutaten mit kompatibler Einheit zusammengerechnet',
    byrecipe: '📂 <b>Nach Rezepten</b> — Zutaten nach Rezepten gruppiert'
  };
  const descDiv = document.createElement('div');
  descDiv.style.cssText = 'background:#f8f5f0;border:1px solid var(--border2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--text2);';
  descDiv.innerHTML = descriptions[shoppingMode];
  c.appendChild(descDiv);

  if (shoppingMode === 'byrecipe') {
    // Render by recipe
    for (const { recipe, items } of byRecipe) {
      const section = document.createElement('div');
      section.className = 'shopping-category';
      const hdr = document.createElement('div');
      hdr.className = 'shopping-category-header';
      hdr.innerHTML = `<span style="font-size:20px;">🍽️</span><span class="shopping-category-title">${escHtml(recipe.name)}</span><span style="font-size:12px;color:var(--text3);">${recipe.targetPeople} Personen · ${items.length} Zutaten</span>`;
      section.appendChild(hdr);
      for (const ing of items) {
        const checkKey = `${ing.name}::${ing.scaledUnit}::${recipe.name}`;
        const checked = STATE.shoppingChecked[checkKey];
        const itemDiv = document.createElement('div');
        itemDiv.className = `shopping-item ${checked ? 'checked' : ''}`;
        const amtStr = fmtShoppingAmt(ing.scaledAmount, ing.scaledUnit);
        itemDiv.innerHTML = `
          <input type="checkbox" class="shopping-check" ${checked ? 'checked' : ''} onchange="toggleShoppingCheck('${checkKey.replace(/'/g,"\\'")}', this)">
          <span class="shopping-name" style="${checked ? 'text-decoration:line-through;color:var(--text3);font-style:italic;' : 'font-style:italic;'}">${escHtml(ing.name)}</span>
          <span class="shopping-amount" style="${checked ? 'color:var(--text3);' : ''}">${amtStr}</span>
        `;
        section.appendChild(itemDiv);
      }
      c.appendChild(section);
    }
    
    // Add manual items section
    const manualItems = allItems.filter(it => it.manual);
    if (manualItems.length > 0) {
      const manualSection = document.createElement('div');
      manualSection.className = 'shopping-category';
      const manualHdr = document.createElement('div');
      manualHdr.className = 'shopping-category-header';
      manualHdr.innerHTML = `<span style="font-size:20px;">✚</span><span class="shopping-category-title">Manuell hinzugefügt</span><span style="font-size:12px;color:var(--text3);">${manualItems.length} Artikel</span>`;
      manualSection.appendChild(manualHdr);
      for (const item of manualItems) {
        const checkKey = `${item.name}::${item.unit || ''}::manual`;
        const checked = STATE.shoppingChecked[checkKey];
        const itemDiv = document.createElement('div');
        itemDiv.className = `shopping-item ${checked ? 'checked' : ''}`;
        const amtStr = fmtShoppingAmt(item.amount, item.unit);
        const notePart = item.note ? `<span style="font-size:11px;color:var(--text3);font-style:italic;margin-left:8px;">📝 ${escHtml(item.note)}</span>` : '';
        itemDiv.innerHTML = `
          <input type="checkbox" class="shopping-check" ${checked ? 'checked' : ''} onchange="toggleShoppingCheck('${checkKey.replace(/'/g,"\\'")}', this)">
          <span class="shopping-name" style="${checked ? 'text-decoration:line-through;color:var(--text3);font-style:italic;' : 'font-style:italic;'}">${escHtml(item.name)}</span>
          <span class="shopping-amount" style="${checked ? 'color:var(--text3);' : ''}">${amtStr}</span>
          ${notePart}
        `;
        manualSection.appendChild(itemDiv);
      }
      c.appendChild(manualSection);
    }
    return;
  }

  // Detailed or Compact
  const activeCats = shoppingMode === 'detailed' ? Object.keys(byCat) : Object.keys(summarized);
  const orderedCats = [...STATE.categories.filter(c => activeCats.includes(c)), ...activeCats.filter(k => !STATE.categories.includes(k))];

  for (const cat of orderedCats) {
    let items = shoppingMode === 'detailed' ? byCat[cat] : summarized[cat];
    if (!items || items.length === 0) continue;

    const section = document.createElement('div');
    section.className = 'shopping-category';
    section.innerHTML = `<div class="shopping-category-header">
      <span style="font-size:22px;">${getCatEmoji(cat)}</span>
      <span class="shopping-category-title">${cat}</span>
      <span style="font-size:12px;color:var(--text3);">${items.length} Artikel</span>
    </div>`;

    for (const item of items) {
      const checkKey = `${item.name}::${item.unit}::${item.recipe || ''}`;
      const checked = STATE.shoppingChecked[checkKey];
      const itemDiv = document.createElement('div');
      itemDiv.className = `shopping-item ${checked ? 'checked' : ''}`;
      const amtStr = fmtShoppingAmt(item.amount, item.unit);
      let recipePart = '';
      if (shoppingMode === 'detailed') {
        if (item.manual) {
          recipePart = '<span class="badge badge-manual" style="font-size:11px;cursor:pointer;" onclick="showView(\'manual-shopping\')">✚ Manuell</span>';
        } else {
          recipePart = `<span class="shopping-recipe-tag" onclick="openRecipeByName('${escHtml(item.recipe).replace(/'/g, "\\'")}')">${escHtml(item.recipe)}</span>`;
        }
      } else {
        const recipeList = item.recipes || [item.recipe];
        const tags = recipeList.map(r => r === '✚ Manuell hinzugefügt'
          ? '<span class="badge badge-manual" style="font-size:11px;cursor:pointer;" onclick="showView(\'manual-shopping\')">✚ Manuell</span>'
          : `<span class="shopping-recipe-tag" onclick="openRecipeByName('${escHtml(r).replace(/'/g, "\\'")}')">${escHtml(r)}</span>`
        ).join(' ');
        recipePart = '<div style="width:100%;display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;">' + tags + '</div>';
      }
      const notePart = item.note ? '<span style="font-size:11px;color:var(--text3);font-style:italic;margin-left:4px;">📝 ' + escHtml(item.note) + '</span>' : '';
      itemDiv.innerHTML = `
        <input type="checkbox" class="shopping-check" ${checked ? 'checked' : ''} onchange="toggleShoppingCheck('${checkKey.replace(/'/g,"\\'")}', this)">
        <span class="shopping-name" style="${checked ? 'text-decoration:line-through;color:var(--text3);font-style:italic;' : 'font-style:italic;'}">${escHtml(item.name)}</span>
        <span class="shopping-amount" style="${checked ? 'color:var(--text3);' : ''}">${amtStr}</span>
        ${recipePart}
        ${notePart}
      `;
      section.appendChild(itemDiv);
    }
    c.appendChild(section);
  }
}

function setShoppingMode(mode) {
  shoppingMode = mode;
  renderView();
}

function closePrintOverlay() {
  var el = document.getElementById('print-overlay');
  if (el) el.remove();
}

function doExportMobile(mode) {
  const { allItems, byCat, summarized, byRecipe, catOrder } = buildShoppingData();
  const listId = 'list_' + Date.now();
  const dateStr = new Date().toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  
  // Text export mode - copy to clipboard
  if (mode === 'text') {
    let text = '🛒 EINKAUFSLISTE\n';
    text += dateStr + '\n';
    text += '═'.repeat(30) + '\n\n';
    
    const orderedCats = [...STATE.categories.filter(c => Object.keys(summarized).includes(c)), ...Object.keys(summarized).filter(k => !STATE.categories.includes(k))];
    
    for (const cat of orderedCats) {
      const items = summarized[cat];
      if (!items || items.length === 0) continue;
      
      text += getCatEmoji(cat) + ' ' + cat.toUpperCase() + '\n';
      
      for (const item of items) {
        const amtStr = fmtShoppingAmt(item.amount, item.unit);
        const recipes = item.recipes || [item.recipe];
        const recipeStr = recipes.filter(r => r).join(', ');
        
        text += '☐ ' + item.name;
        if (amtStr) text += ' — ' + amtStr;
        text += '\n';
        if (recipeStr) text += '   → ' + recipeStr + '\n';
        if (item.note) text += '   📝 ' + item.note + '\n';
      }
      text += '\n';
    }
    
    // Copy to clipboard
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        alert('✓ Einkaufsliste in die Zwischenablage kopiert!\n\nFüge sie jetzt in deine Notizen-App ein (Apple Notes, Google Keep, etc.)');
      }).catch(() => {
        showTextExportFallback(text);
      });
    } else {
      showTextExportFallback(text);
    }
    return;
  }
  
  // Build HTML using array join for cleaner code
  const lines = [];
  lines.push('<!DOCTYPE html>');
  lines.push('<html lang="de">');
  lines.push('<head>');
  lines.push('<meta charset="UTF-8">');

  lines.push('.category-count { font-size: 12px; color: #998570; }');

  lines.push('.item:active { background: #f0ebe3; }');
