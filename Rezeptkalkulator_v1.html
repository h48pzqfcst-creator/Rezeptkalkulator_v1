        const recipeStr = recipes.filter(r => r && r !== '✚ Manuell hinzugefügt').join(', ');
        
        lines.push('<label class="item" id="item' + itemIndex + '" for="cb' + itemIndex + '">');
        lines.push('<input type="checkbox" class="checkbox" id="cb' + itemIndex + '">');
        lines.push('<div class="item-content">');
        lines.push('<span class="item-name">' + escHtml(item.name) + '</span>');
        if (amtStr) lines.push('<span class="item-amount">' + amtStr + '</span>');
        if (item.note) lines.push('<div class="item-note">📝 ' + escHtml(item.note) + '</div>');
        // Show recipes as individual badges
        const recipesToShow = (item.recipes || [item.recipe]).filter(r => r && r !== '✚ Manuell hinzugefügt');
        if (recipesToShow.length > 0 || item.manual) {
          lines.push('<div class="item-recipes">');
          for (const r of recipesToShow) {
            lines.push('<span class="item-recipe">→ ' + escHtml(r) + '</span>');
          }
          if (item.manual) {
            lines.push('<span class="item-recipe manual">✚ Manuell</span>');
          }
          lines.push('</div>');
        }
        lines.push('</div></label>');
        itemIndex++;
      }
      lines.push('</div>');
    }
  }

  const totalItems = itemIndex;

  lines.push('</div>');
  lines.push('<div class="progress-bar">');
  lines.push('<div class="progress-row">');
  lines.push('<div class="progress-track"><div class="progress-fill" id="pf"></div></div>');
  lines.push('<div class="progress-text" id="pt">0/' + totalItems + '</div>');
  lines.push('</div>');
  lines.push('<div class="done-message" id="dm">✓ Alles erledigt!</div>');
  lines.push('</div>');
  
  // JavaScript - using simple var and function syntax
  lines.push('<' + 'script>');
  lines.push('(function() {');
  lines.push('  var total = ' + totalItems + ';');
  lines.push('  var KEY = "shop_' + listId + '";');
  lines.push('  ');
  lines.push('  function getCheckedCount() {');
  lines.push('    var count = 0;');
  lines.push('    for (var i = 0; i < total; i++) {');
  lines.push('      var cb = document.getElementById("cb" + i);');
  lines.push('      if (cb && cb.checked) count++;');
  lines.push('    }');
  lines.push('    return count;');
  lines.push('  }');
  lines.push('  ');
  lines.push('  function updateProgress() {');
  lines.push('    var checked = getCheckedCount();');
  lines.push('    var pct = total > 0 ? Math.round((checked / total) * 100) : 0;');
  lines.push('    var pf = document.getElementById("pf");');
  lines.push('    var pt = document.getElementById("pt");');
  lines.push('    var dm = document.getElementById("dm");');
  lines.push('    if (pf) pf.style.width = pct + "%";');
  lines.push('    if (pt) pt.textContent = checked + "/" + total;');
  lines.push('    if (dm) dm.className = (checked === total && total > 0) ? "done-message show" : "done-message";');
  lines.push('  }');
  lines.push('  ');
  lines.push('  function saveState() {');
  lines.push('    var states = [];');
  lines.push('    for (var i = 0; i < total; i++) {');
  lines.push('      var cb = document.getElementById("cb" + i);');
  lines.push('      states.push(cb ? cb.checked : false);');
  lines.push('    }');
  lines.push('    try { localStorage.setItem(KEY, JSON.stringify(states)); } catch(e) {}');
  lines.push('  }');
  lines.push('  ');
  lines.push('  function loadState() {');
  lines.push('    try {');
  lines.push('      var saved = localStorage.getItem(KEY);');
  lines.push('      if (saved) {');
  lines.push('        var states = JSON.parse(saved);');
  lines.push('        for (var i = 0; i < Math.min(states.length, total); i++) {');
  lines.push('          var cb = document.getElementById("cb" + i);');
  lines.push('          if (cb && states[i]) cb.checked = true;');
  lines.push('        }');
  lines.push('      }');
  lines.push('    } catch(e) {}');
  lines.push('  }');
  lines.push('  ');
  lines.push('  // Load saved state');
  lines.push('  loadState();');
  lines.push('  updateProgress();');
  lines.push('  ');
  lines.push('  // Listen for checkbox changes');
  lines.push('  document.addEventListener("change", function(e) {');
  lines.push('    if (e.target && e.target.className === "checkbox") {');
  lines.push('      saveState();');
  lines.push('      updateProgress();');
  lines.push('    }');
  lines.push('  });');
  lines.push('})();');
  lines.push('</' + 'script>');
  lines.push('</body>');
  lines.push('</html>');

  const html = lines.join('\n');
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'einkaufsliste_' + new Date().toISOString().slice(0,10) + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showPrintPreview(mode) {
  const { allItems, byCat, summarized, byRecipe, catOrder, selected } = buildShoppingData();

  // Helper: format amount
  function fa(item) { return fmtShoppingAmt(item.amount, item.unit); }
  function faS(ing) { return fmtShoppingAmt(ing.scaledAmount, ing.scaledUnit); }

  // Build preview DOM
  const old = document.getElementById('print-overlay');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'print-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#f0ebe1;z-index:9999;overflow-y:auto;';

  // Toolbar (hidden on print)
  const toolbar = document.createElement('div');
  toolbar.className = 'print-toolbar';
  toolbar.style.cssText = 'display:flex;gap:10px;align-items:center;padding:14px 28px;background:#fdf6ec;border-bottom:2px solid #d9cdb8;position:sticky;top:0;z-index:2;flex-wrap:wrap;';

  const btnExport = document.createElement('button');
  btnExport.style.cssText = 'padding:9px 22px;background:#5c3d1e;color:#fdf6ec;border:none;border-radius:7px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;';
  btnExport.textContent = '⬇️  Als HTML herunterladen (im Browser als PDF speichern)';
  btnExport.addEventListener('click', function() { downloadAsHtml(mode, page); });

  const btnClose = document.createElement('button');
  btnClose.style.cssText = 'padding:9px 18px;background:white;color:#5c3d1e;border:1.5px solid #d9cdb8;border-radius:7px;cursor:pointer;font-size:14px;font-family:inherit;';
  btnClose.textContent = '✕ Schließen';
  btnClose.addEventListener('click', function() { overlay.remove(); });

  const tipSpan = document.createElement('span');
  tipSpan.style.cssText = 'font-size:12px;color:#998570;';
  tipSpan.textContent = 'Datei herunterladen → im Browser öffnen → Strg+P → "Als PDF speichern"';

  toolbar.appendChild(btnExport);
  toolbar.appendChild(btnClose);
  toolbar.appendChild(tipSpan);
  overlay.appendChild(toolbar);

  // Page
  const page = document.createElement('div');
  page.style.cssText = 'max-width:680px;margin:28px auto;background:white;padding:36px 40px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.10);font-family:Georgia,serif;color:#1e160a;font-size:14px;line-height:1.6;';

  // Header
  const pageTitle = mode === 'detailed' ? '📋 Ausführlich' : mode === 'compact' ? '📝 Zusammengefasst' : '📂 Nach Rezepten';
  const recipeNames = selected.map(r => r.name + ' (' + r.targetPeople + ' Pers.)').join(', ');

  const headDiv = document.createElement('div');
  headDiv.style.cssText = 'margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #d9cdb8;';
  headDiv.innerHTML = '<div style="font-family:Georgia,serif;font-size:26px;font-style:italic;color:#5c3d1e;margin-bottom:4px;">Einkaufsliste</div>'
    + '<div style="font-size:13px;color:#998570;margin-bottom:4px;">Rezepte: ' + escHtml(recipeNames) + '</div>'
    + '<div style="font-size:13px;font-weight:600;color:#a0622a;">' + pageTitle + '</div>';
  page.appendChild(headDiv);

  // Table
  const table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:separate;border-spacing:0 4px;font-size:14px;';
  const tbody = document.createElement('tbody');

  function addCatHeader(label) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 3;
    td.style.cssText = 'padding:14px 0 6px;font-weight:700;color:#5c3d1e;font-size:13px;letter-spacing:0.04em;border-bottom:2px solid #d9cdb8;';
    td.textContent = label;
    tr.appendChild(td); tbody.appendChild(tr);
  }
  function addRow(name, amt, recipes, note, isManual) {
    const tr = document.createElement('tr');
    tr.style.cssText = 'background:#fefcf9;';
    const td1 = document.createElement('td'); 
    td1.style.cssText = 'padding:10px 12px 10px 14px;border-bottom:4px solid white;font-style:italic;border-radius:8px 0 0 8px;'; 
    td1.textContent = name;
    const td2 = document.createElement('td'); 
    td2.style.cssText = 'padding:10px 12px;border-bottom:4px solid white;font-weight:700;color:#5c3d1e;white-space:nowrap;'; 
    td2.textContent = amt;
    const td3 = document.createElement('td'); 
    td3.style.cssText = 'padding:10px 14px 10px 12px;border-bottom:4px solid white;font-size:11px;border-radius:0 8px 8px 0;'; 
    // Build recipe badges
    let badgeHtml = '';
    if (recipes && recipes.length > 0) {
      for (const r of recipes) {
        if (r && r !== '✚ Manuell hinzugefügt') {
          badgeHtml += '<span style="display:inline-block;background:#f5f0e8;color:#7a6b55;padding:2px 8px;border-radius:12px;margin-right:4px;margin-bottom:2px;">→ ' + escHtml(r) + '</span>';
        }
      }
    }
    if (isManual) {
      badgeHtml += '<span style="display:inline-block;background:#e8f0e8;color:#4a7c59;padding:2px 8px;border-radius:12px;margin-right:4px;">✚ Manuell</span>';
    }
    if (note) {
      badgeHtml += '<span style="display:inline-block;color:#998570;font-style:italic;">📝 ' + escHtml(note) + '</span>';
    }
    td3.innerHTML = badgeHtml;
    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
    tbody.appendChild(tr);
  }

  if (mode === 'detailed') {
    for (const cat of catOrder) {
      const items = byCat[cat];
      if (!items || !items.length) continue;
      addCatHeader(getCatEmoji(cat) + ' ' + cat);
      for (const it of items) addRow(it.name, fa(it), [it.recipe], it.note, it.manual);
    }
  } else if (mode === 'compact') {
    for (const cat of catOrder) {
      const items = summarized[cat];
      if (!items || !items.length) continue;
      addCatHeader(getCatEmoji(cat) + ' ' + cat);
      for (const it of items) addRow(it.name, fa(it), it.recipes || [], it.note, it.manual);
    }
  } else {
    for (const { recipe, items } of byRecipe) {
      addCatHeader('🍽️  ' + recipe.name + '  —  ' + recipe.targetPeople + ' Personen');
      for (const ing of items) addRow(ing.name, faS(ing), [], null, false);
    }
    // Add manual items section
    const manualItems = allItems.filter(it => it.manual);
    if (manualItems.length > 0) {
      addCatHeader('✚  Manuell hinzugefügt  —  ' + manualItems.length + ' Artikel');
      for (const it of manualItems) addRow(it.name, fa(it), [], it.note, true);
    }
  }

  table.appendChild(tbody);
  page.appendChild(table);
  overlay.appendChild(page);
  document.body.appendChild(overlay);
}

function downloadAsHtml(mode, pageEl) {
  var modeLabel = mode === 'detailed' ? 'Ausfuehrlich' : mode === 'compact' ? 'Zusammengefasst' : 'Nach-Rezepten';
  var filename = 'Einkaufsliste-' + modeLabel + '.html';
  var pageHtml = pageEl.outerHTML;
  var parts = [
    '<!DOCTYPE html><html lang="de"><head>',
    '<meta charset="UTF-8">',
    '<meta name="viewport" content="width=device-width, initial-scale=1">',
    '<title>Einkaufsliste</title>',
    '<style>',
    '* { box-sizing: border-box; margin: 0; padding: 0; }',
    'body { background: #f0ebe1; font-family: Georgia, serif; padding: 24px; }',
    '.page { max-width: 680px; margin: 0 auto; background: white; padding: 36px 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }',
    '@media print { body { background: white; padding: 0; } .page { box-shadow: none; border-radius: 0; } @page { margin: 15mm; size: A4; } }',
    '</style></head><body>',
    pageHtml,
    '</body></html>'
  ];
  var fullHtml = parts.join('');
  var blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
}


function toggleShoppingCheck(key, el) {
  if (el.checked) STATE.shoppingChecked[key] = true;
  else delete STATE.shoppingChecked[key];
  saveState();
  // Just toggle styling without full re-render
  const item = el.closest('.shopping-item');
  const name = item.querySelector('.shopping-name');
  if (el.checked) { item.classList.add('checked'); name.style.textDecoration = 'line-through'; name.style.color = 'var(--text3)'; }
  else { item.classList.remove('checked'); name.style.textDecoration = 'none'; name.style.color = ''; }
}

function findCategory(nameLower) {
  if (STATE.ingredientDB[nameLower]) {
    const v = STATE.ingredientDB[nameLower];
    return typeof v === 'object' ? v.category : v;
  }
  for (const [key, entry] of Object.entries(STATE.ingredientDB)) {
    const cat = typeof entry === 'object' ? entry.category : entry;
    if (nameLower.includes(key) || key.includes(nameLower)) return cat;
  }
  return 'Sonstiges';
}

function getCatEmoji(cat) {
  const map = { "Gemüse":"🥦","Obst":"🍎","Fleisch & Fisch":"🥩","Milchprodukte & Käse":"🧀","Kühlung":"❄️","Brot & Backwaren":"🍞","Gewürze & Kräuter":"🌿","Konserven & Gläser":"🥫","Nudeln & Reis & Getreide":"🍝","Öle & Soßen":"🫙","Getränke":"🥤","Tiefkühl":"🧊","Sonstiges":"📦" };
  return map[cat] || '🛒';
}

  if (dbNewIngCat) sel.value = dbNewIngCat;
}

function renderIngTable() {
  const el = document.getElementById('ing-table');
  if (!el) return;
  const search = (document.getElementById('db-search')?.value || dbSearch).toLowerCase();
  const filter = document.getElementById('db-filter')?.value || dbFilterCat;

  // Support both old format (string) and new format ({name, category, defaultUnit})
  const normDB = Object.entries(STATE.ingredientDB).map(([key, val]) => {
    const cat = typeof val === 'object' ? (val.category || 'Sonstiges') : val;
    const displayName = typeof val === 'object' ? (val.name || key) : key;
    return { key, displayName, cat };
  });

  const searchWords = search.split(/\s+/).filter(Boolean);
  const filtered = normDB.filter(({key, displayName, cat}) => {
    if (filter !== 'Alle' && cat !== filter) return false;
    if (!search) return true;
    const haystack = (key + ' ' + displayName.toLowerCase());
    return searchWords.every(w => haystack.includes(w));
  }).sort((a, b) => a.cat.localeCompare(b.cat) || a.displayName.localeCompare(b.displayName));

  if (filtered.length === 0) { el.innerHTML = `<div style="color:var(--text3);padding:20px;text-align:center;font-style:italic;">Keine Einträge gefunden</div>`; return; }

  el.innerHTML = `<div style="font-size:12px;color:var(--text3);margin-bottom:8px;">${filtered.length} Einträge</div>
    <table>
      <thead><tr><th>Zutat</th><th>Kategorie</th><th style="width:40px;"></th></tr></thead>
      <tbody>
        ${filtered.map(({key, displayName, cat}) => `
          <tr>
            <td style="font-style:italic;">${escHtml(displayName)}</td>
            <td>
              <select onchange="updateIngCat('${escHtml(key)}',this.value)" style="border:none;background:transparent;color:var(--accent2);cursor:pointer;font-size:13px;font-family:inherit;">
                ${STATE.categories.map(c => `<option value="${escHtml(c)}" ${cat === c ? 'selected' : ''}>${escHtml(c)}</option>`).join('')}
              </select>
            </td>
            <td><button onclick="deleteIngredient('${escHtml(key)}')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='#ccc'">✕</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function addGroup() {
  const val = document.getElementById('new-group').value.trim();
  if (!val || STATE.groups.includes(val)) return;
  STATE.groups.push(val);
  document.getElementById('new-group').value = '';
  saveState(); renderGroupList();
}

function deleteGroup(group) {
  if (STATE.recipes.some(r => r.group === group)) {
    if (!confirm(`Ordner "${group}" löschen? Rezepte werden nach "Sonstiges" verschoben.`)) return;
    STATE.recipes.forEach(r => { if (r.group === group) r.group = 'Sonstiges'; });
  }
  STATE.groups = STATE.groups.filter(g => g !== group);
  saveState(); renderGroupList();
}

function addCategory() {
  const val = document.getElementById('new-cat').value.trim();
  if (!val || STATE.categories.includes(val)) return;
  STATE.categories.push(val);
  document.getElementById('new-cat').value = '';
  saveState(); renderCatList(); renderIngCatSelect(); renderIngTable();
  const dbFilter = document.getElementById('db-filter');
  if (dbFilter) dbFilter.innerHTML = `<option value="Alle">Alle Kategorien</option>${STATE.categories.map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('')}`;
}

function deleteCategory(cat) {
  if (!confirm(`Kategorie "${cat}" löschen? Zutaten werden zu "Sonstiges" verschoben.`)) return;
  STATE.categories = STATE.categories.filter(c => c !== cat);
  for (const k of Object.keys(STATE.ingredientDB)) { const v = STATE.ingredientDB[k]; const vcat = typeof v === 'object' ? v.category : v; if (vcat === cat) { if (typeof v === 'object') STATE.ingredientDB[k] = {...v, category:'Sonstiges'}; else STATE.ingredientDB[k] = 'Sonstiges'; } }
  saveState(); renderCatList(); renderIngTable();
}

function addIngredient() {
  const name = (document.getElementById('new-ing')?.value || '').trim().toLowerCase();
  const cat = document.getElementById('new-ing-cat')?.value || STATE.categories[0];
  if (!name) return;
  STATE.ingredientDB[name] = cat;
  document.getElementById('new-ing').value = '';
  saveState(); renderIngTable();
}

function updateIngCat(name, cat) {
  const v = STATE.ingredientDB[name];
  if (typeof v === 'object' && v !== null) STATE.ingredientDB[name] = { ...v, category: cat };
  else STATE.ingredientDB[name] = cat;
  saveState();
}

function deleteIngredient(name) {
  delete STATE.ingredientDB[name];
  saveState(); renderIngTable();
}

function escHtml(str) {

    const k = ing.name.toLowerCase().trim();

  hdr.innerHTML = '<div style="font-family:\'Playfair Display\',serif;font-size:22px;font-style:italic;color:var(--accent);flex:1;">' + escHtml(recipe.name) + '</div>'

  wrap.appendChild(hdr);

  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:minmax(160px,1fr) 2fr;gap:32px;';

  const ingCol = document.createElement('div');
  ingCol.innerHTML = '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#998570;margin-bottom:10px;">Zutaten</div>';
  for (const ing of [...withAmount, ...withoutAmount]) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #ede6d8;gap:8px;';
    row.innerHTML = ing.scaledAmount !== null
      ? '<span style="font-style:italic;">' + escHtml(ing.name) + '</span><strong style="color:#5c3d1e;white-space:nowrap;">' + formatAmt(ing.scaledAmount) + (ing.scaledUnit ? ' ' + ing.scaledUnit : '') + '</strong>'
      : '<span style="font-style:italic;">' + escHtml(ing.name) + '</span><span style="color:#998570;font-size:12px;">nach Bedarf</span>';
    ingCol.appendChild(row);
  }
  grid.appendChild(ingCol);

  const stepsCol = document.createElement('div');
  stepsCol.innerHTML = '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#998570;margin-bottom:10px;">Zubereitung</div>';
  const lines = recipe.rawText.split('\n');
  let stepNum = 0;
  for (const line of lines) {
    const t = line.trim();
    if (!t || t.startsWith('--') || (t.startsWith('>>') || /^servings:/i.test(t))) continue;
    const cleaned = t
      .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, (_, n) => {
        const a = ingLookup[n.trim().toLowerCase()] || '';
        return '<strong style="color:#a0622a;">' + escHtml(n.trim()) + '</strong>' + (a ? '<span style="color:#5c3d1e;font-size:0.88em;">' + escHtml(a) + '</span>' : '');

      .replace(/@([^{@#~\n\s,\.!?;]+)/g, (_, n) => {
        const a = ingLookup[n.trim().toLowerCase()] || '';

      })
      .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
      .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1');
    if (!cleaned.trim()) continue;
    stepNum++;
    const s = document.createElement('div');
    s.style.cssText = 'display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #ede6d8;align-items:flex-start;';

      + '<div style="flex:1;line-height:1.75;font-size:14px;">' + cleaned.trim() + '</div>';
    stepsCol.appendChild(s);
  }
  if (stepNum === 0) stepsCol.innerHTML += '<p style="color:#998570;font-style:italic;">Keine Schritte vorhanden.</p>';
  grid.appendChild(stepsCol);
  wrap.appendChild(grid);
  return wrap;
}

function buildStepsData(recipe) {
  const scaled = getScaledIngredients(recipe);
  const withAmount = [...scaled].filter(i => i.scaledAmount !== null).sort((a,b) => a.name.localeCompare(b.name,'de'));
  const withoutAmount = [...scaled].filter(i => i.scaledAmount === null).sort((a,b) => a.name.localeCompare(b.name,'de'));
  const ingLookup = {};
  for (const ing of scaled) {
    const k = ing.name.toLowerCase().trim();
    ingLookup[k] = ing.scaledAmount !== null ? ' (' + formatAmt(ing.scaledAmount) + (ing.scaledUnit ? ' ' + ing.scaledUnit : '') + ')' : '';
  }
  const lines = recipe.rawText.split('\n');
  const steps = [];
  for (const line of lines) {
    const t = line.trim();
    if (!t || t.startsWith('--') || (t.startsWith('>>') || /^servings:/i.test(t))) continue;
    const cleaned = t
      .replace(/@([^{@#~\n]+?)\{[^}]*\}/g, (_, name) => {
        const amt = ingLookup[name.trim().toLowerCase()] || '';
        return '<strong style="color:var(--accent2);">' + escHtml(name.trim()) + '</strong>' + (amt ? '<span style="color:var(--accent);font-size:0.88em;">' + escHtml(amt) + '</span>' : '');
      })
      .replace(/@([^{@#~\n\s,\.!?;]+)/g, (_, name) => {
        const amt = ingLookup[name.trim().toLowerCase()] || '';
        return '<strong style="color:var(--accent2);">' + escHtml(name.trim()) + '</strong>' + (amt ? '<span style="color:var(--accent);font-size:0.88em;">' + escHtml(amt) + '</span>' : '');
      })
      .replace(/#([^{@#~\n]+?)(?:\{[^}]*\})?/g, '$1')
      .replace(/~([^{@#~\n]*)\{([^}]*)\}/g, (_, n, b) => { const p=b.split('%'); const num=p[0].trim(); const unit=(p[1]||'').trim(); return n.trim() ? n.trim() : (num&&unit ? num+' '+unit : num||unit||''); }).replace(/~([^{@#~\n\s,\.!?;]+)/g, '$1');
    if (cleaned.trim()) steps.push(cleaned.trim());
  }
  return { sortedIng: [...withAmount, ...withoutAmount], steps };
}

        + '<span style="color:var(--text3);font-size:12px;">nach Bedarf</span>';

  if (steps.length === 0) {
    stepsCol.innerHTML += '<p style="color:var(--text3);font-style:italic;">Keine Schritte vorhanden.</p>';

  cont.innerHTML = '';

  wrap.style.cssText = 'max-width:620px;margin:0 auto;display:flex;flex-direction:column;gap:20px;';

  // ── Add form ──
  const addCard = document.createElement('div');
  addCard.className = 'card';

  const title = document.createElement('h3');
  title.style.cssText = "font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--accent);margin-bottom:14px;";
  title.textContent = '✚ Artikel zur Einkaufsliste hinzufügen';
  addCard.appendChild(title);

  const info = document.createElement('p');
  info.style.cssText = 'font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.6;';
  info.innerHTML = 'Nur <strong>aktivierte</strong> Einträge (Haken gesetzt) erscheinen in der Einkaufsliste. Wird automatisch in die richtige Kategorie einsortiert – oder wähle manuell eine Kategorie.';
  addCard.appendChild(info);

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.id = 'mi-name';
  nameInput.placeholder = 'Artikelname (z.B. Alufolie, Spülmittel...)';
  nameInput.style.cssText = 'width:100%;box-sizing:border-box;font-size:14px;margin-bottom:10px;';
  addCard.appendChild(nameInput);

  const row2 = document.createElement('div');
  row2.style.cssText = 'display:flex;gap:8px;margin-bottom:10px;';

  const amtInput = document.createElement('input');
  amtInput.type = 'number';
  amtInput.id = 'mi-amount';
  amtInput.placeholder = 'Menge (optional)';
  amtInput.min = '0';
  amtInput.step = 'any';
  amtInput.style.cssText = 'flex:1;font-size:14px;';
  row2.appendChild(amtInput);

  const unitSel = document.createElement('select');
  unitSel.id = 'mi-unit';
  unitSel.style.cssText = 'flex:1;font-size:14px;';
  ['','g','kg','ml','l','EL','TL','Stück','Packung','Dose','Flasche','Bund','Prise','Scheibe','nach Bedarf'].forEach(u => {
    const opt = document.createElement('option');
    opt.value = u; opt.textContent = u || '— Einheit —';
    unitSel.appendChild(opt);
  });
  row2.appendChild(unitSel);
  addCard.appendChild(row2);

  // ── Category selection row ──
  const row3 = document.createElement('div');
  row3.style.cssText = 'display:flex;gap:8px;margin-bottom:10px;align-items:center;';

  const catLabel = document.createElement('span');
  catLabel.style.cssText = 'font-size:13px;color:var(--text3);white-space:nowrap;';
  catLabel.textContent = 'Kategorie:';
  row3.appendChild(catLabel);

  const catSel = document.createElement('select');
  catSel.id = 'mi-category';
  catSel.style.cssText = 'flex:1;font-size:14px;';
  const catAutoOpt = document.createElement('option');
  catAutoOpt.value = '';
  catAutoOpt.textContent = '— Automatisch —';
  catSel.appendChild(catAutoOpt);
  const categories = STATE.categories || ["Gemüse","Obst","Fleisch & Fisch","Milchprodukte & Käse","Kühlung","Brot & Backwaren","Gewürze & Kräuter","Konserven & Gläser","Nudeln & Reis & Getreide","Öle & Soßen","Getränke","Tiefkühl","Sonstiges"];
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    catSel.appendChild(opt);
  });
  row3.appendChild(catSel);

  // ── Note field ──
  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.id = 'mi-note';
  noteInput.placeholder = 'Notiz (optional, z.B. "Bio", "Marke XY"...)';
  noteInput.style.cssText = 'width:100%;box-sizing:border-box;font-size:14px;margin-bottom:10px;';

  addBtn.className = 'btn btn-primary';

  addCard.appendChild(addBtn);

  const listCard = document.createElement('div');
  listCard.className = 'card';

  wrap.appendChild(listCard);

}




function renderManualList(container) {
  if (!container) container = document.getElementById('manual-list-card');
  if (!container) return;
  container.innerHTML = '';
  const items = STATE.manualShoppingItems || [];

  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:var(--text3);font-style:italic;text-align:center;padding:20px;';
    empty.textContent = 'Noch keine Einträge. Füge oben Artikel hinzu.';
    container.appendChild(empty);
    return;
  }

  // Header row with select-all / deselect-all
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;';

  const hdrLeft = document.createElement('div');
  hdrLeft.style.cssText = 'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);';
  const activeCount = items.filter(i => i.active !== false).length;
  hdrLeft.textContent = activeCount + ' von ' + items.length + ' aktiv';
  hdr.appendChild(hdrLeft);

  const hdrRight = document.createElement('div');
  hdrRight.style.cssText = 'display:flex;gap:8px;';

  const btnAll = document.createElement('button');
  btnAll.className = 'btn btn-ghost btn-sm';
  btnAll.textContent = '✓ Alle';
  btnAll.style.fontSize = '12px';
  btnAll.addEventListener('click', () => {
    (STATE.manualShoppingItems||[]).forEach(i => i.active = true);
    saveState(); renderManualList(container);
  });

  const btnNone = document.createElement('button');
  btnNone.className = 'btn btn-ghost btn-sm';
  btnNone.textContent = '✗ Keine';
  btnNone.style.fontSize = '12px';
  btnNone.addEventListener('click', () => {
    (STATE.manualShoppingItems||[]).forEach(i => i.active = false);
    saveState(); renderManualList(container);
  });

  hdrRight.appendChild(btnAll);
  hdrRight.appendChild(btnNone);
  hdr.appendChild(hdrRight);
  container.appendChild(hdr);

  // Item rows
  for (const item of items) {
    const isActive = item.active !== false;
    const cat = item.category || findCategory(item.name.toLowerCase()) || 'Sonstiges';
    const amtStr = item.amount != null ? (formatAmt(item.amount) + (item.unit ? ' ' + item.unit : '')) : (item.unit || '');

    const rowWrapper = document.createElement('div');
    rowWrapper.style.cssText = 'padding:9px 0;border-bottom:1px solid var(--border2);' + (isActive ? '' : 'opacity:0.45;');

    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;';

    // Checkbox
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = isActive;
    cb.style.cssText = 'width:18px;height:18px;accent-color:var(--green);flex-shrink:0;cursor:pointer;';
    cb.addEventListener('change', () => {
      item.active = cb.checked;
      saveState();
      rowWrapper.style.opacity = cb.checked ? '' : '0.45';
      nameSpan.style.textDecoration = cb.checked ? '' : 'line-through';
      const hdrLeftEl = container.querySelector('div > div');
      if (hdrLeftEl) {
        const ac = (STATE.manualShoppingItems||[]).filter(i => i.active !== false).length;
        hdrLeftEl.textContent = ac + ' von ' + (STATE.manualShoppingItems||[]).length + ' aktiv';
      }
    });
    row.appendChild(cb);

    const nameSpan = document.createElement('span');
    nameSpan.style.cssText = 'font-style:italic;flex:1;color:var(--text);' + (isActive ? '' : 'text-decoration:line-through;');
    nameSpan.textContent = item.name;
    row.appendChild(nameSpan);

    if (amtStr) {
      const amtSpan = document.createElement('span');
      amtSpan.style.cssText = 'color:var(--accent);font-weight:600;white-space:nowrap;';
      amtSpan.textContent = amtStr;
      row.appendChild(amtSpan);
    }

    const catBadge = document.createElement('span');
    catBadge.className = 'badge badge-gray';
    catBadge.style.fontSize = '11px';
    catBadge.textContent = cat;
    row.appendChild(catBadge);

    // Edit button
    const editBtn = document.createElement('button');
    editBtn.style.cssText = 'background:none;border:none;color:#aaa;cursor:pointer;font-size:14px;padding:0 4px;';
    editBtn.textContent = '✏️';
    editBtn.title = 'Bearbeiten';
    editBtn.addEventListener('mouseover', () => editBtn.style.color = 'var(--accent)');
    editBtn.addEventListener('mouseout',  () => editBtn.style.color = '#aaa');
    editBtn.addEventListener('click', () => showEditManualItemDialog(item.id));
    row.appendChild(editBtn);

    // Delete button
    const delBtn = document.createElement('button');
    delBtn.style.cssText = 'background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 4px;';
    delBtn.textContent = '✕';
    delBtn.addEventListener('mouseover', () => delBtn.style.color = 'var(--red)');
    delBtn.addEventListener('mouseout',  () => delBtn.style.color = '#ccc');
    delBtn.addEventListener('click', () => removeManualItem(item.id));
    row.appendChild(delBtn);
    rowWrapper.appendChild(row);

    // Show note if present
    if (item.note) {
      const noteRow = document.createElement('div');
      noteRow.style.cssText = 'margin-left:28px;margin-top:4px;font-size:12px;color:var(--text3);font-style:italic;';
      noteRow.innerHTML = '📝 ' + escHtml(item.note);
      rowWrapper.appendChild(noteRow);
    }

    container.appendChild(rowWrapper);
  }

  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn btn-ghost btn-sm';
  clearBtn.style.cssText = 'margin-top:14px;color:var(--red);border-color:var(--red);';
  clearBtn.textContent = '🗑 Alle entfernen';
  clearBtn.addEventListener('click', () => {
    STATE.manualShoppingItems = []; saveState(); renderManualList(container);
  });
  container.appendChild(clearBtn);
}

// Edit dialog for manual shopping items
function showEditManualItemDialog(itemId) {
  const item = (STATE.manualShoppingItems || []).find(i => String(i.id) === String(itemId));
  if (!item) return;

  // Create modal overlay
  const overlay = document.createElement('div');
  overlay.id = 'edit-manual-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(30,22,10,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:#fdf6ec;border-radius:14px;padding:28px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.35);';

  // Title
  const title = document.createElement('div');
  title.style.cssText = "font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--accent);margin-bottom:18px;";
  title.textContent = '✏️ Artikel bearbeiten';
  box.appendChild(title);

  // Name field
  const nameLabel = document.createElement('label');
  nameLabel.style.cssText = 'display:block;font-size:12px;color:var(--text3);margin-bottom:4px;';
  nameLabel.textContent = 'Artikelname';
  box.appendChild(nameLabel);
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = item.name || '';
  nameInput.style.cssText = 'width:100%;box-sizing:border-box;font-size:14px;margin-bottom:12px;padding:8px;border:1px solid var(--border);border-radius:6px;';
  box.appendChild(nameInput);

  // Amount and Unit row
  const row1 = document.createElement('div');
  row1.style.cssText = 'display:flex;gap:10px;margin-bottom:12px;';

  const amtDiv = document.createElement('div');
  amtDiv.style.cssText = 'flex:1;';
  const amtLabel = document.createElement('label');
  amtLabel.style.cssText = 'display:block;font-size:12px;color:var(--text3);margin-bottom:4px;';
  amtLabel.textContent = 'Menge';
  amtDiv.appendChild(amtLabel);
  const amtInput = document.createElement('input');
  amtInput.type = 'number';
  amtInput.value = item.amount != null ? item.amount : '';
  amtInput.min = '0';
  amtInput.step = 'any';
  amtInput.style.cssText = 'width:100%;box-sizing:border-box;font-size:14px;padding:8px;border:1px solid var(--border);border-radius:6px;';
  amtDiv.appendChild(amtInput);
  row1.appendChild(amtDiv);

  const unitDiv = document.createElement('div');
  unitDiv.style.cssText = 'flex:1;';
  const unitLabel = document.createElement('label');
  unitLabel.style.cssText = 'display:block;font-size:12px;color:var(--text3);margin-bottom:4px;';
  unitLabel.textContent = 'Einheit';
  unitDiv.appendChild(unitLabel);
  const unitSel = document.createElement('select');
  unitSel.style.cssText = 'width:100%;box-sizing:border-box;font-size:14px;padding:8px;border:1px solid var(--border);border-radius:6px;';
  ['','g','kg','ml','l','EL','TL','Stück','Packung','Dose','Flasche','Bund','Prise','Scheibe','nach Bedarf'].forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u || '— Keine —';
    if (u === (item.unit || '')) opt.selected = true;
    unitSel.appendChild(opt);
  });
  unitDiv.appendChild(unitSel);
  row1.appendChild(unitDiv);
  box.appendChild(row1);

  // Category field
  const catLabel = document.createElement('label');
  catLabel.style.cssText = 'display:block;font-size:12px;color:var(--text3);margin-bottom:4px;';
  catLabel.textContent = 'Kategorie';
  box.appendChild(catLabel);
  const catSel = document.createElement('select');
  catSel.style.cssText = 'width:100%;box-sizing:border-box;font-size:14px;padding:8px;border:1px solid var(--border);border-radius:6px;margin-bottom:12px;';
  const categories = STATE.categories || ["Gemüse","Obst","Fleisch & Fisch","Milchprodukte & Käse","Kühlung","Brot & Backwaren","Gewürze & Kräuter","Konserven & Gläser","Nudeln & Reis & Getreide","Öle & Soßen","Getränke","Tiefkühl","Sonstiges"];
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    if (c === (item.category || 'Sonstiges')) opt.selected = true;
    catSel.appendChild(opt);
  });
  box.appendChild(catSel);

  // Note field
  const noteLabel = document.createElement('label');
  noteLabel.style.cssText = 'display:block;font-size:12px;color:var(--text3);margin-bottom:4px;';
  noteLabel.textContent = 'Notiz';
  box.appendChild(noteLabel);
  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.value = item.note || '';
  noteInput.placeholder = 'z.B. Bio, Marke XY...';
  noteInput.style.cssText = 'width:100%;box-sizing:border-box;font-size:14px;padding:8px;border:1px solid var(--border);border-radius:6px;margin-bottom:20px;';
  box.appendChild(noteInput);

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost';
  cancelBtn.textContent = 'Abbrechen';
  cancelBtn.addEventListener('click', () => overlay.remove());
  btnRow.appendChild(cancelBtn);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = '💾 Speichern';
  saveBtn.addEventListener('click', () => {
    const newName = nameInput.value.trim();
    if (!newName) { nameInput.focus(); return; }
    item.name = newName;
    const amtVal = parseFloat(amtInput.value);
    item.amount = isNaN(amtVal) ? null : amtVal;
    item.unit = unitSel.value || null;
    item.category = catSel.value || 'Sonstiges';
    item.note = noteInput.value.trim() || null;
    saveState();
    overlay.remove();
    renderManualList();
  });
  btnRow.appendChild(saveBtn);
  box.appendChild(btnRow);

  overlay.appendChild(box);
  document.body.appendChild(overlay);

  // Close on overlay click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  // Focus name input
  nameInput.focus();
  nameInput.select();
}


function addManualItem() {
  const nameEl = document.getElementById('mi-name');
  const name = (nameEl?.value || '').trim();
  if (!name) { if (nameEl) nameEl.focus(); return; }
  const amtVal = parseFloat(document.getElementById('mi-amount')?.value);
  const unit = document.getElementById('mi-unit')?.value || '';
  const manualCategory = document.getElementById('mi-category')?.value || '';
  const note = (document.getElementById('mi-note')?.value || '').trim();
  
  // Determine category: use manual selection if provided, otherwise auto-detect, fallback to Sonstiges
  let category;
  if (manualCategory) {
    category = manualCategory;
  } else {
    category = findCategory(name.toLowerCase()) || 'Sonstiges';
  }
  
  if (!STATE.manualShoppingItems) STATE.manualShoppingItems = [];
  STATE.manualShoppingItems.push({
    id: Date.now() + Math.random(),
    name,
    amount: isNaN(amtVal) ? null : amtVal,
    unit: unit || null,
    active: true,
    category: category,
    note: note || null
  });
  saveState();
  if (nameEl) nameEl.value = '';
  const amtEl = document.getElementById('mi-amount');
  if (amtEl) amtEl.value = '';
  const unitEl = document.getElementById('mi-unit');
  if (unitEl) unitEl.value = '';
  const catEl = document.getElementById('mi-category');
  if (catEl) catEl.value = '';
  const noteEl = document.getElementById('mi-note');
  if (noteEl) noteEl.value = '';
  if (nameEl) nameEl.focus();
  renderManualList();
}




function removeManualItem(id) {
  STATE.manualShoppingItems = (STATE.manualShoppingItems || []).filter(i => String(i.id) !== String(id));
  saveState(); renderManualList();
}

// ═══════════════════════════════════════════════════════════════
// RESET DIALOG
// ═══════════════════════════════════════════════════════════════
function showResetDialog() {
  const recipeCount = STATE.recipes.length;
  const overrideCount = STATE.recipes.reduce((s,r) => s + Object.keys(r.manualOverrides||{}).length, 0);
  const manualCount = (STATE.manualShoppingItems||[]).length;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(30,22,10,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:#fdf6ec;border-radius:14px;padding:28px 32px;max-width:460px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,0.35);';

  box.innerHTML = '<div style="font-size:32px;margin-bottom:10px;">⚠️</div>'
    + '<div style="font-family:Georgia,serif;font-size:19px;font-weight:700;color:#5c3d1e;margin-bottom:6px;">Daten zurücksetzen</div>'
    + '<p style="color:#6b5940;font-size:13px;line-height:1.6;margin-bottom:18px;">Wähle aus, was zurückgesetzt werden soll.</p>';

  const options = [
    { key: 'recipes',   label: 'Rezepte',                icon: '📋', detail: recipeCount + ' gespeicherte Rezepte',              checked: true },
    { key: 'overrides', label: 'Manuelle Korrekturen',   icon: '✎',  detail: overrideCount + ' Korrekturen',                     checked: true },
    { key: 'groups',    label: 'Ordner',                 icon: '📁', detail: STATE.groups.length + ' Ordner',                    checked: false },
    { key: 'shopping',  label: 'Einkaufsliste (Häkchen)',icon: '🛒', detail: 'Abhak-Status zurücksetzen',                        checked: false },
    { key: 'manual',    label: 'Manuell hinzufügen',       icon: '✚',  detail: manualCount + ' manuelle Einträge',                 checked: false },
  ];

  const checks = {};
  const optWrap = document.createElement('div');
  optWrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;margin-bottom:18px;';

  let btnConfirm;

  options.forEach(opt => {
    const row = document.createElement('label');
    row.style.cssText = 'display:flex;align-items:center;gap:12px;background:white;border:1.5px solid #e0d5c5;border-radius:9px;padding:10px 14px;cursor:pointer;';
    if (opt.checked) { row.style.borderColor = '#c0392b'; row.style.background = '#fff8f6'; }

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = opt.checked;
    cb.style.cssText = 'width:17px;height:17px;accent-color:#c0392b;flex-shrink:0;cursor:pointer;';
    checks[opt.key] = cb;

    cb.addEventListener('change', () => {
      row.style.borderColor = cb.checked ? '#c0392b' : '#e0d5c5';
      row.style.background = cb.checked ? '#fff8f6' : 'white';
      if (btnConfirm) {
        btnConfirm.disabled = !Object.values(checks).some(c => c.checked);
        btnConfirm.style.opacity = btnConfirm.disabled ? '0.4' : '1';
      }
    });

    const iconEl = document.createElement('span');
    iconEl.style.cssText = 'font-size:18px;flex-shrink:0;';
    iconEl.textContent = opt.icon;

    const textWrap = document.createElement('div');
    textWrap.style.cssText = 'flex:1;';
    const labelEl = document.createElement('div');
    labelEl.style.cssText = 'font-size:14px;font-weight:600;color:#5c3d1e;';
    labelEl.textContent = opt.label;
    const detailEl = document.createElement('div');
    detailEl.style.cssText = 'font-size:12px;color:#998570;';
    detailEl.textContent = opt.detail;

    textWrap.appendChild(labelEl);
    textWrap.appendChild(detailEl);
    row.appendChild(cb);
    row.appendChild(iconEl);
    row.appendChild(textWrap);
    optWrap.appendChild(row);
  });

  const warn = document.createElement('div');
  warn.style.cssText = 'background:#fff3cd;border:1px solid #f0d060;border-radius:8px;padding:10px 14px;font-size:12px;color:#7d5a00;margin-bottom:18px;';
  warn.textContent = 'Nicht ausgewähltes bleibt erhalten. Diese Aktion kann nicht rückgängig gemacht werden.';

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;';

  const btnCancel = document.createElement('button');
  btnCancel.className = 'btn btn-outline';
  btnCancel.textContent = 'Abbrechen';
  btnCancel.addEventListener('click', () => document.body.removeChild(overlay));

  btnConfirm = document.createElement('button');
  btnConfirm.className = 'btn btn-primary';
  btnConfirm.style.cssText = 'background:#c0392b;border-color:#c0392b;';
  btnConfirm.textContent = 'Zurücksetzen';
  btnConfirm.addEventListener('click', () => {
    if (checks.recipes?.checked)   STATE.recipes = [];
    if (checks.overrides?.checked) STATE.recipes.forEach(r => { r.manualOverrides = {}; });
    if (checks.groups?.checked)    STATE.groups = [];
    if (checks.shopping?.checked)  STATE.shoppingChecked = {};
    if (checks.manual?.checked)    STATE.manualShoppingItems = [];
    saveState();
    document.body.removeChild(overlay);
    renderView();
  });

  btnRow.appendChild(btnCancel);
  btnRow.appendChild(btnConfirm);
  box.appendChild(optWrap);
  box.appendChild(warn);
  box.appendChild(btnRow);
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}


// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadState();
renderView();
</script>
